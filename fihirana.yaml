  id: 479
  number: 479
  title: "O! MIJOROA FA JESOSY MPANJAKA"
  composer: "F. Ambresin"
  author: "F. Ramanantsialonina"
  key: "Do dia Eb 3/4 Kingakinga"
  theme1: "FIAINANA KRISTIANA"
  theme2: "Ady sy Fandresena"
  lyrics: |
  
  1. O ! mijoroa fa Jesosy Mpanjaka,
  	No mampahery sy miaro anao.
  	Ka na dia mafy ny ady ho zaka,
  	Resy Satana, Jeso momba anao.
  	Ka na dia mafy ny ady ho zaka,
  	Resy Satana, Jeso momba anao.
  
  2. O ! Miadia aza reraka akory
  	Ary manàna finoana ianao
  	Ka na dia be 'reo zava-mahory,
  	Jeso antsoy mba hanafaka anao.
  	Ka na dia be 'reo zava-mahory,
  	Jeso antsoy mba hanafaka anao.
  
  3. 'Reo fahavalo manimba ny tena,
  	Aza manahy fa Jeso no jereo
  	Afaka hanampy anao amin-kery
  	Mba handovana ilay tany vao.
  	Afaka hanampy anao amin-kery
  	Mba handovana ilay tany vao.
  
  4. O ! ry sakaiza mpitolona mafy
  	Jeso Mpandresy sy miaro anao
  	Izy niaritra sadi nihafy
  	Koa aza ketraka foana ianao.
  	Izy niaritra sadi nihafy
  	Koa aza ketraka foana ianao.
  	
  
- 
  id: 480
  number: 480
  title: "O! RY NAMAKO AVIA"
  composer: "W. Bradbury"
  author: "F. Ramanantsialonina"
  key: "Do dia G 3/4 "
  theme1: "FIAINANA KRISTIANA"
  theme2: "Ady sy Fandresena"
  lyrics: |
  
  1. O ! ry namako avia
  	'Ndeha isika hiara-dia
  	Mahereza miomana,
  	Atrakao ny lohanao.
  	Fa na sarotra ny ady
  	Mijoroa ho kiady
  	He ! manàna fikasana,
  	Ao Kanana lovanao.
  
  2. Ao ny Tompo mampahery,
  	Olombery tiany
  	Izy tena tsy mandao ;
  	Vonona handray anao.
  	Aza lavinao 'lay feo
  	'Zany antso mba ekeo.
  	Ka Jesosy no jereo.
  	Dia handresy ianao.
  
  3. Na dia sarotra ny dia,
  	Aza ketraka ianao.
  	Fa Jesosy zoky tia
  	No mpiantoka anao.
  	Ao ny lovanao ry mpino
  	Ka ny lanitra banjino,
  	Eny, kely sisa izao,
  	Dia hiadana ianao.
  	
  
- 
  id: 481
  number: 481
  title: "RAHA MAFY IZAO NY MAHORY"
  composer: "H. H. Lemmel"
  author: "Rajoelison"
  key: "Do dia F 3/4 Milantolanto"
  theme1: "FIAINANA KRISTIANA"
  theme2: "Ady sy Fandresena"
  lyrics: |
  

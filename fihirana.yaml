  	Dia taomy mba ho tia ;
  	Raha sendra fahoriana,
  	Sakano tsy hania.
  
  ISAN'ANDININY :
  
  Ry Jeso ô ! tazano
  	Ny lalanay izao,
  	Tariho sy tantano
  	Ho ao am-balanao;
  	Anio dia mikasa
  	Hanolo-tena koa.
  	Fa nenina ny lasa
  	Hiezaka tokoa.
  	Ry Jeso ô ! tazano, sns.
  
  2. Anio no hafaliako,
  	Ny foko lasanao,
  	Ny maminao no tiako,
  	Hatao ny sitrakao.
  	Ny androko rehetra,
  	Atolotro Anao ;
  	Anao tsy misy fetra,
  	Ka raiso, anjakao :
  	Ry Jeso ô ! tazano, sns.
  

  	No manana ny soa
  	'Zahao ny tanimboly,
  	'Zay fatratra tokoa,
  	Fa he 'reo voninkazo
  	Mamerovero ao,
  	Toa nofy 'zay handazo,
  	Andeha mba jereo.
  
  2. Ireo 'zay mahavatra
  	Handray ny voka-tsoa,
  	Ka tena tsy hahantra,
  	Tsy reraka tokoa ;
  	Jereo 'reo taninketsa
  	Mampanantena voa,
  	Fa soa tsy manam-petra
  	Sy hanim-be tokoa.
  

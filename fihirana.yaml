  key: "Do dia E 4/4 "
  theme1: "FIAINANA KRISTIANA"
  theme2: "Ady sy Fandresena"
  lyrics: |
  
  1. Injao mirohondrohona
  	Ny ranomasim-be
  	Ny onja manoloana
  	Mamely mafy re
  	Ka very hevitra
  	Ny firenena re.
  	Ny feon'ny rivotra
  	Mihamitsoka re.
  
  2. Tsy misy raha eto
  	'Zay mandry fahizay
  	fa ady mampisento
  	Sy tebiteby indray.
  	Eo aminao, Jeso,
  	No fiadanana.
  	Mionona e ny fo,
  	Fahasambarana.
  
  3. Ny fon'ny manan-daza
  	Ho reraka izao,
  	Matahotra ny loza
  	Hitranga ao ho ao.
  	Mikaroka ny soa
  	Dia fiadanana
  	Kanefa ny mifoha
  	Fikorontanana.
  
  4. Ianao irery Tompo
  	No iantsampazako,
  	Raha he mifofofo
  	Ny onja tazako,
  	Ianao ry Jeso tia
  	Tsy atakaloko,
  	Fihiniko satria
  	Mpanonjy aroko.
  	
  
- 

  	ny familian’ny samboko,
  	(ny samboko)
  	Izy no kapiteniko
  	(sy kapiteniko)
  	Atopatopan’ny onja
  	Ity samboko
  	Nefa tsy mba manahy,
  	na ho fefika ao an-dalana ao
  	Satria Jeso (satria Jeso)

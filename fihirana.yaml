  	No voninkazo koa,
  	Hamerovero any
  	An-tokantrano soa ;
  	Tezao mba hihatsara
  	Ny fofo-manitray,
  	Mba tsy harahin-tsento
  	Ny toetra anananay.
  
  4. 'Zahay no toy ny ketsa
  	Ho vanona tokoa,
  	Hamoa tsy misy fetra,
  	Sy tena hahasoa ;
  	Ny fiangonantsik
  	Hahita valiny,
  	Ny fivavahantsika
  	handroso hery koa.
  

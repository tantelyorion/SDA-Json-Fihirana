  	Izay rehetra mahasoa
  	Ka ny otanay afaho
  	Fa manimba anay tokoa.
  	Mampianara any haniry
  	Mba hanao ny sitrakao,
  	Hahazoanay ny hery
  	Eo am-pelatananao.
  	
  

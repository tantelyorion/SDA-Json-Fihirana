  3. Mamy re ny teny fikasana
  	Ivelomako an-tany ety.
  	Soa indrindra koa ilay Kanana
  	'Zay miandry ao an-koatra ary.
  	Fitiavana mitafotafo
  	No mameno ny kapoakako !
  	He ! ny aiko novidiany lafo ;
  	Azo antoka ny lovako.
  	
  
- 
  id: 450
  number: 450
  title: "JESO O! AVIA"
  composer: "C. H. Gabriel"
  author: "Rajoelison"
  key: "Do dia E 3/4 "
  theme1: "FIAINANA KRISTIANA"
  theme2: "Fanoloran-tena sy Fanamasinana"
  lyrics: |
  
  1. Jeso ô, avia, diovinao tokoa,
  	Aoka ho lapanao, ny foko re anio.
  	Ô, tsy mendrika fa he nandà ny soa ;
  	Nefa, Jeso, ny ranao dia mahadio.
  	Jeso (Jeso tia)
  	Eny, Jeso : (Jeso tia)
  	Iriko 'zao ny fanadiovanao, Jeso.
  
  2. Jeso ô, avia, manjakà tokoa
  	Ao am-poko re, izay vohako izao
  	'Lay fiadananao, mandresy ny manjo,
  	Aoka hameno ny kapaokan-janakao,
  	Jeso (Jeso tia)
  	Eny, Jeso : (Jeso tia)
  	Iriko 'zao ny fiadananao, Jeso.
  
  3. Jeso ô, avia, entonao izao
  	Ato am-poko re, hanjary toetrako
  	Ny hamasinanao 'zay tena endrikao
  	Mba hanavao ny saina sy fanahiko
  	Jeso (Jeso tia)
  	Eny, Jeso : (Jeso tia)
  	Iriko 'zao ny hamasinanao, Jeso.
  
  4. Jeso ô, avia, raiso avokoa
  	'Zao ny fiainako ho voninahitrao ;
  	Ho fanilo re, hitarika tokoa
  	'Reo namako ho tonga eo an-tongotrao.
  	Jeso (Jeso tia)
  	Eny, Jeso : (Jeso tia)
  	Iriko 'zao ny voninahitrao, Jeso.
  	
  
- 
  id: 451
  number: 451
  title: "HANARAKA NY DIANAO"
  composer: "(Tsy fantatra)"
  author: "Rajoelison"
  key: "Do dia G 6/4 "
  theme1: "FIAINANA KRISTIANA"
  theme2: "Fanoloran-tena sy Fanamasinana"
  lyrics: |
  
  1. Hanaraka ny dianao,
  	Jeso no mba iriko izao ;
  	Na amin'ny mora,
  	Na be ny akora,
  	Hanaraka ny dianao.
  
  2. Hanahaka ny toetranao,
  	Jeseo, no mba iriko izao,
  	Halemy fanahy
  	Kanefa ho sahy ;
  	Hanahaka ny toetranao !
  
  3. Hiara-miasa aminao,
  	Jeso, no mba iriko izao :
  	Hamonjy ny very,
  	Hamehy ny fery :
  	Hiara-miasa aminao !
  
  4. Hiara-miaritra aminao,
  	Jeseo, no mba iriko izao,
  	Ka na dia hijaly
  	Dia hahay mifaly :
  	Hiara-miaritra aminao.
  
  5. Hiara-monina aminao
  	Jeseo, no mba iriko izao :
  	Hitoetra eo ambony,
  	Tsy hanota intsony :
  	Hiara-monina aminao.
  
- 
  id: 452
  number: 452
  title: "RY TOMPO O, ATOLOTRO ANAO"
  composer: "I. A. Ramboniarisoa"
  author: "I. A. Ramboniarisoa"
  key: "Do dia Eb 3/4 "
  theme1: "FIAINANA KRISTIANA"
  theme2: "Fanoloran-tena sy Fanamasinana"
  lyrics: |
  
  1. Ry Tompo ô, atolotro Anao
  Ny tenako Anio ;
  Fa vonona hanompo Anao.
  Raiso ho Anao doria.
  
  2
  Ny masoko tariho, Jeso,
  Hijery tsara Anao,
  Hifidy lalana marina
  Izay tinendrinao.
  
  3Ny feoko havaozy anio,
  Hitory ny hafatrao.
  Ho fiderana ny herinao,
  Raiso ho Anao, Jeso.
  
  4
  Ny tanako atolotro koa.
  Hanao ny asanao.
  He ! sitrako ho tantananao,
  Raiso ho Anao anio.
  
  5
  Ny tongotro ho fanirakao,
  N'aiza n'aiza aleha
  Fa raha Ianao no Mpitarika
  Tsy misy tsy handeha.
  
  6. Ny heriko, ny fahaizako,
  Atolotro Anao
  Satria Ianao no heriko ety
  'Zay ifikirako.
  
  7. Ny fiainako, ekeko hatrizao
  Hitoeranao, Jeso,
  Fa anilanao dia mahasambatra
  Feno hafaliana.
  
- 
  id: 453
  number: 453
  title: "NITADY \'LAY MPIANDRY"
  composer: "(Tsy fantatra)"
  author: "Rajoelison"
  key: "Do dia F 6/4 "
  theme1: "FIAINANA KRISTIANA"
  theme2: "Fanoloran-tena sy Fanamasinana"
  lyrics: |
  
  1. Nitady 'Lay Mpiandry
  Nitady ahy, re ;
  Ka tsy tafandry mandry
  Na dia alina e,
  Nijery tao am-bala,
  Ka indro fa tsy tao
  'Ty ondry 'zay malala.
  Niainga Izy 'zao.
  
- 
  id: 454
  number: 454
  title: "JESOSY NO MANJAKA"
  composer: "De Fellemberg"
  author: "S. Razanajatovo"
  key: "Do dia Eb 6/8 "
  theme1: "FIAINANA KRISTIANA"
  theme2: "Fanoloran-tena sy Fanamasinana"
  lyrics: |
  
  1. Jesosy no manjaka
  	Aty am-poko izao.
  	Izaho koa hitoetra
  	Anilany hatrizao.
  	Nandao ny lanitra Izy,
  	Nitady ahy mpania.
  	Niantso, niangavy :
  	<<Mpanota ô, avia>>.
  
  2. Jesosy no mibaiko
  	Ny fiainako izao.
  	Ny feony no henoiko
  	Hatrany, hatrizao.
  	Tsaroako dia tsaroako
  	Ny nanatonany ahy
  	Niteny tao am-poko :
  	<<Izaho Mpamonjy tia>>.
  
  3. Jesosy no jereko
  	Hatrany, hatrizao
  	Ny tiany no ataoko
  	Fa mamiko izao
  	Tsy mba very intsony
  	Izay manolo-tena
  	Fa efa voavonjin'
  	Ny ran'ny fanekena.
  
  4. Jesosy no mitondra
  	Ny diako hatrizao.
  	Ny tanany mitsotra
  	Fihiniko izao.
  	Tsy mba ireri intsony,
  	Noho <<'lay fanekena>>,
  	Fa olom-boavonjy
  	<<Hisatro-diadema>>.
  	
  
- 
  id: 455
  number: 455
  title: "AZOKO ANIO"
  composer: "D. Razafinadramanana"
  author: "D. Razafinadramanana"
  key: "Do dia Eb 12/8 "
  theme1: "FIAINANA KRISTIANA"
  theme2: "Fanoloran-tena sy Fanamasinana"
  lyrics: |
  
  1. Azoko anio 'zao
  	Ny famonjenao,
  	Ry Tompo masina ô,
  	Mpamonjy soa.
  	Ny fanavotana vitanao
  	Ho fifalian'ny fo.
  	Atolotro Anao manokana
  	Ny tenako ho fanatitra anio ;
  	Kanefa indrisy, nofo malemy,
  	Mora mirona, mora mania
  	Ka ny herinao no andrasako.
  
  2. Izay alehako, jereo Jeso ô
  	Fa saro-dalana, mahaketraka.
  	Ny loza sy ny antambo koa
  	Manampy trotraka.
  	Korontam-bato, fiakaram-be,
  	Hantsana lalina, hain'andro koa,
  	Ny rivo-doza, ny onjan-drano
  	Indray mitrena, mianjera koa
  	Ka ny sandrinao no tanjako.
  
  3. Ny fanantenako ny fiavianao
  	No manazava ny aizin'ny fo ;
  	Ary ny finoako izany re
  	No manda mafiko.
  	O! tsy ahoako ny eso manjo,
  	Ny latsa sy fanenjehana koa.
  	Fampahoriana an-tery setra,
  	Tsy mahakivy ny olonao
  	Fa ny tananao no tazoniko.
  
  4. 'Zao no fivavako, Jeso, henoinao,
  	Sento mangina ao am-poko izao :
  	Na sarotra aza re ny aleha,
  	Tohizako ny dia.
  	Enga anie ka ny sitraponao
  	No ho ekeko manomboka anio.
  	Na maro aza ireo mpankahala,
  	'Zaho jeso ô ! hanaraka anao.
  	Manomboka anio, ho mandrakizay.
  	Amena !
  	
  
- 
  id: 456
  number: 456
  title: "REKO \'ZAO"
  composer: "R. K. Carter"
  author: "Rajoelison"
  key: "Do dia F 3/4 Malefaka sy miadana"
  theme1: "FIAINANA KRISTIANA"
  theme2: "Fanoloran-tena sy Fanamasinana"
  lyrics: |
  
  1. Reko 'zao ny feon'ny Tompo
  	Miantso hoe : avia ianao,
  	Raiso koa ny vokovoko,
  	Manaraha Ahy 'zao.
  
  ISAN'ANDININY :
  	Eny, mandra-pahafaty
  	Hanarahako Anao ;
  	Ka na iza hanabanty
  	'Zaho tsy handao anao.
  
  2. Nefa anie ka lala-mafy
  	'Zay mankany Kalvary,
  	Feno tahotra sy rafy
  	'Lay mitondra mankary.
  	Eny, mandra-pahafaty, sns.
  
  3. 'Ngamba hafoin'ireo malala
  	Ka tebahiny tokoa,
  	Holazaina hoe : adala !
  	Ka mangirifiry fo.
  	Eny, mandra-pahafaty, sns.
  
  4. Tombotsoa sesehena,
  	Voninahitra sy zo,
  	Laza soa sy harena,
  	Mety hilaozaza avokoa.
  	Eny, mandra-pahafaty, sns.
  
  5. Jeso ô, handeha ihany
  	'Zaho 'zay navotanao
  	Raha mbola eto an-tany,
  	Ny iriko : ho tia Anao.
  	Eny, mandra-pahafaty, sns.
  
  6. Eo an-dranon'ny batisa
  	Hanarahako Anao ;
  	Ka ny androko 'zay sisa
  	Holaniako anilanao.
  	Eny, mandra-pahafaty, sns.
  
  7. Ho mpanompo mahatoky
  	Hatrety ka hatrary 
  	Ô! ampionao ry Zoky,
  	Dia ho tody soa ary.
  	Eny, mandra-pahafaty, sns.
  	
  
- 
  id: 457
  number: 457
  title: "HANARAKA ANAO"
  composer: "W. S. Martin"
  author: " Rajoelison"
  key: "Do dia Bb 6/4 "
  theme1: "FIAINANA KRISTIANA"
  theme2: "Fanoloran-tena sy Fanamasinana"
  lyrics: |
  
  1. Hanaraka Anao no iriko,
  	Na aiza no alehanao,
  	Jesoy, 'zay re no tiako :
  	Handeha eo anilanao.
  
  ISAN'ANDININY :
  	Isan'andro sy isan'ora
  	Ho Anao, ho Anao,
  	Ka na iza no hanakora :
  	Ho Anao, aminao.
  	(Tsy hiala aminao).
  
  2. Hanaraka Anao mba hanompo ;
  	Na aiza iantsoana,
  	Ho tahaka Anao, er ry Tompo,
  	Tsy kivy na sarotra atao.
  	Isan'andro, sns.
  
  3. Hanaraka Anao na dia mafy
  	Ny adin'i Getsemane,
  	Hiara-mandresy 'lay rafy
  	Amim-pivavahana e !
  	Isan'andro, sns.
  
  4. Hanaraka Anao any ambony
  	'Zay be voninahitra ary
  	Ka tsy hahitana intsony
  	Ny zava-mahory ety.
  	Isan'andro, sns.
  
- 
  id: 458
  number: 458
  title: "RY JESOSY MASINA Ô"
  composer: "A. Raoeliarijaona"
  author: "A. Raoeliarijaona"
  key: "Do dia Ab 4/4 "
  theme1: "FIAINANA KRISTIANA"
  theme2: "Fanoloran-tena sy Fanamasinana"
  lyrics: |
  
  1. RY JESOSY MASINA Ô !
  	1. Ry Jesosy Masina ô,
  	Mpampihavana,
  	Tompo sy fanasina,
  	Fitiavana.
  	Hira no ventesinay
  Hidera Anao.
  Ka ny saotra entinay
  	Ho raisinao.
  
  ISAN'ANDININY :
  
  Fanatitra atolotray
  	Ny fo, fanahinay.
  	Ary izany tenanay,
  	Ho Anao mandrakizay.
  	Ekeo re ho sitrakao
  	Ka ho fonenanao,
  	Fa izany indrindra
  	No tadiavinao.
  
  2. Jeso ô, ekeo anio
  	Ny fisaoranay.
  	Mihainoa ka mba valio
  	'Zany vavakay.
  	Tianay ho tempolinao
  	'Zany tenanay,
  	Ka hihavana aminao
  	Tokoa 'zahay.
  	Fanatitra, sns
  
  3. Jeso ô, miandrandra Anao
  	Ny madinikao?
  	Miandry Anao mba hanavao
  	'Zao tontolo 'zao.
  	Ka ny hira maminay,
  	Tompo sy Mpitahy,
  	Dia ventesinay indray :
  	Fanatitra, sns
  	
- 
  id: 459
  number: 459
  title: "NY FOKO RY MPAMONJY"
  composer: "A. Hawks"
  author: "Rakoto sy Rabary"
  key: "Do dia Ab 3/4 "
  theme1: "FIAINANA KRISTIANA"
  theme2: "Fanoloran-tena sy Fanamasinana"
  lyrics: |
  
  1. NY FOKO RY MPAMONJY (TA459)
  	1. Ny foko ry Mpamonjy !
  	Mangetaheta Anao,
  	Maniry lalandava
  	Hikambana aminao.
  
  ISAN'ANDININY :
  
  Tsy afaka ao am-poko
  	Ny faniriana Anao,
  	Oneno re ny, foko,
  	Ho lapanao !
  
  2. Ny androm-pahoriana,
  	Raha lapanao ny fo,
  	Manjary fitahiana
  	Izay manadio ny fo.
  	Tsy afaka ao, sns.
  
  3. Ny ora fifaliana,
  	Raha ao anilanao,
  	Mamelom-paniriana
  	Hanao ny sitrakao.
  	Tsy afaka ao, sns.
  
  4. Ho lao ny fahotako
  	Raha akaikezinao,
  	Tsy misy hadalako
  	Izay tsy afakao.
  	Tsy afaka ao, sns.
  
  5. Finaritra ny saiko
  	raha ipetrahanao,
  	Fa reraka ny aiko
  	Raha halavirinao.
  	Tsy afaka ao, sns.
  
- 
  id: 460
  number: 460
  title: "AN-TANANAO, RY RAY MALALA"
  composer: "A. H. Ackley"
  author: "Rajoelison"
  key: "Do dia Bb 3/4 Majeur Milantolanto"
  theme1: "FIAINANA KRISTIANA"
  theme2: "Fanoloran-tena sy Fanamasinana"
  lyrics: |
  
  1. An-tananao, ry Ray malala,
  	Ny fiainako tontolo izao
  	Tazony aho tsy hiala,
  	Ho mahatoky aminao.
  
  ISAN'ANDININY
  
  Na saro-dàlana na mora,
  	Hanaraka Anao tokoa.
  	Eny, isan'andro, isan'ora
  	Ho eo an-tananao ny fo.
  
  2. He! fantatrao ny fahalemeko,
  	Ny ady mafy 'zay manjo;
  	Tsy takona aminao ny sento.
  	Tohano ny finoako.
  	Na saro-dàlana,sns.
  
  3. Raha toa lavitra ny fetra
  	Ka kivy re 'ty zanakao,
  	Tafio ny herinao rehetra,
  	Hanohy indray ny dia izao.
  	Na saro-dàlana,sns.
  
  4. An-tananao, ry Ray Tsitoha,
  	Ny hasambarako ety ;
  	Ho eo ihany raha hifoha.
  	Handray ny lova soa ary !
  	Na saro-dàlana,sns.
  
- 
  id: 461
  number: 461
  title: "O! ANARANA MAMIKO INDRINDRA"
  composer: "Jeanne Ratsirison"
  author: "Jeanne Ratsirison"
  key: "Do dia F 3/4 "
  theme1: "FIAINANA KRISTIANA"
  theme2: "Fanoloran-tena sy Fanamasinana"
  lyrics: |
  
  1. O ! anarana mamiko indrindra,
  	Kanto loatra, sy mirindra,
  	Nanolorana ny famonjena izao,
  	Jeso ny anara-masinao.
  
  ISAN'ANDININY :
  	Jeso ô, Mpamonjy tena tia,
  	Jeso 'Zay Mpitantana ny dia.
  	Jeso, raiso hanjakanao
  	'Zany foko re ho lapanao.
  
  2. Raha sendra andro mibaliaka
  	Miramiran'endrika, sariaka,
  	'La anaranao tsy manam-paharoa
  	No deraiko fatratra tokoa.
  	Jeso ô, Mpamonjy tena tia, sns
  
  3. Raha ho avy Ianao, Mpamonjy tia,
  	Ka hifarana hatreo ny dia
  	O ! Jesosy, 'Lay anaranao indray
  	No anjarako mandrakizay.
  	Jeso ô, Mpamonjy tena tia, sns
  	
  
- 
  id: 462
  number: 462
  title: "SAMY MANEHO NY LAZANY"
  composer: "Tyrolese Carol"
  author: "Esther Bary"
  key: "Do dia F 4/4 "
  theme1: "FIAINANA KRISTIANA"
  theme2: "Fanoloran-tena sy Fanamasinana"
  lyrics: |
  
  1. Samy maneho ny lazany
  	Ireo mpirehareha.
  	Fahaizana sy harena
  	Aderaderany.
  	Raha 'zany no asandrany,
  	Ny antsika kosa re ?
  	Ny tenantsika atolotra
  	'Lay Mpanjaka lehibe.
  
  2. Fo tia Anao sy misaotra
  	Midera sy manoa,
  	No indro aterinay ho Anao
  	Ho fanomezana.
  	Ho rakitra maharitra,
  	Omena an-tsitrapo,
  	Omenay, ry Tompo Tsitoha,
  	Ho voninahitrao.
  
  3. Ny andraikitra madinika
  	Omeny dia atao.
  	Jeso ho faly
  	Ny mandinika ny asa 'zay atao.
  	'Zay re no fanomezana
  	Atolotray Anao,
  	Raiso fa nikelezao
  	Tompo ô mba ekeo.
  	
  
- 
  id: 463
  number: 463
  title: "ATAOVY AO AM-BAVAKO"
  composer: "Harold A. Miller"
  author: "Esther Bary"
  key: "Do dia Eb 6/4 "
  theme1: "FIAINANA KRISTIANA"
  theme2: "Fanoloran-tena sy Fanamasinana"
  lyrics: |
  
  1. Ataovy ao am-bavako
  	'Zay hoteneniko.
  	Ny hira sy vavaka
  	Mba ho toy ny Anao.
  
  ISAN'ANDININY :
  	'Zaho te hitovy
  	Aminao Jesosy.
  	Ampio aho, Tompo ô,
  	Hitombo isan'andro.
  
  2. Ny fomba fihevitro,
  	Ny asa sy fiainako,
  	Entiko eo aminao
  	Hotarihinao.
  	'Zaho te hitovy, sns
  
  3. Fa mihelina tokoa
  	Sy mandalo ny ety,
  	Eo aminao Tompo soa
  	Mahatsara ahy.
  	'Zaho te hitovy, sns
  
  4. Ampianaro mba hahay
  	Hampijoro ho iray
  	Ny fo, saina sy fanahy
  	Ry Tompo mpiahy.
  	'Zaho te hitovy, sns
  	
  
- 
  id: 464
  number: 464
  title: "DISO NY LALAN\'NY FIAINANA"
  composer: "Georges S. Schuler - Mamy J. Ratsirison"
  author: "A. R. Marnoël"
  key: "Do dia C 6/4 "
  theme1: "FIAINANA KRISTIANA"
  theme2: "Fanoloran-tena sy Fanamasinana"
  lyrics: |
  
  1. Diso ny lalan'ny fiainana,
  	Maro ny ory tokoa,
  	Ento ny mazava handresy
  	Ny haizina;
  	Ovay ny ratsy ho soa.
  
  ISAN'ANDININY :
  	Amboary aho mba ho mpanasoa,
  	Ka avy amiko hiseho Jeso.
  	Amboary, Tompo,
  	Mba ho mpanasoa.
  	Amboary ho mpanasoa aho anio.
  
  2. Tantarao ny fitiavan'i Kristy
  	Sy ny famelany koa.
  	Hino ny hafa raha lazainao ity
  	Ka arahinao tokoa.
  	Amboary aho, sns
  
  3. Manomeza toy ny nandraisanao,
  	Mitiava toy ny Tompo.
  	Ampio ny ory 'zay mila anao
  	Ataovy an-tsitrapo.
  	Amboary aho, sns
  
  4. Nampanantena aho
  	Fa hanompo Anao
  	Na aiza hanendrenao,
  	Ho any aho.
  	Izay hataoko
  	Ho voninahitrao
  	Hanara-dia Anao
  	Ry Mpampianatro.
  	
  
- 
  id: 465
  number: 465
  title: "TOA MANONTANY TENA AHO"
  composer: "Harry E. Storrs"
  author: "A. R. Marnoël"
  key: "Do dia G 4/4 Moramora"
  theme1: "FIAINANA KRISTIANA"
  theme2: "Fanoloran-tena sy Fanamasinana"
  lyrics: |
  
  1. Toa manontany tena aho, Jeso ;
  	'Zay soa mba vitako ho Anao
  	Izay nanetry tena ka voaeso,
  	Maty, nanavotra ahy toy izao
  
  ISAN'ANDININY :
  	Moa mba mikaroka
  	Ny very ve aho ?
  	Moa nanafaka ny mifatotra
  	Sy nanampy,
  	Namonjy sy mitalaho
  	Mba hizaka ny avotrao ?
  
  2. Be ny fotoana verivery foana
  	Fa vitsy no nomena Anao
  	Ny fitiavako Anao tsy lalim-paka
  	Fa voasinton'izao tontolo izao.
  	Moa mba mikaroka, sns
  
  3. Tsy hangina intsony aho, Jeso,
  	Fa hilaza ny aminao.
  	Ry namako, andeha mba venteso
  	Ka zarao ny avotra izay natao.
  	Moa mba mikaroka, sns
  	
  
- 
  id: 466
  number: 466
  title: "AMPANGINO NY IZAHO-KO"
  composer: "Dera Arson"
  author: "Dera Arson"
  key: "Do dia A na B 3/4 "
  theme1: "FIAINANA KRISTIANA"
  theme2: "Fanoloran-tena sy Fanamasinana"
  lyrics: |
  
  1. Ampangino ny izahoko, ry Tompo ô.
  	Ampangino hihainoako ny feonao.
  	Fa manelingelina ny hidiranao ato am-po.
  	O ! ampangino tanteraka Tompo ô.
  
  ISAN'ANDININY :
  	Ianao izay neken'ny rivotra Jeso ô,
  	Ianao neken'ny ranomasina
  	Ianao nibaiko ny afo
  	O ! ampangino ny izahoko.
  
  2. Raha mila te ho sosotra ilay izahoko,
  	Dia teneno moramora re, ry Tompo ô.
  	Mba hitandro voninahitra ho Anao irery e !
  	Fa fihavanana no sitrakao.
  
  3. Raha mila te hirehareha, Tompo ô,
  	Te hanindrahindra 'reo talenta nomenao.
  	Ampangino, ampangino ny izaho ato am-po
  	Fa tsinontsinona aho re, Tompo ô.
  
  4. Raha tia fanakianana aho, Tompo ô,
  	Fanakianana tsy mba mamokatra ho Anao.
  	Ampangino, aza avelanao hiteniteny re
  	F'zaho koa tsy mahavita be.
  
  5. Raha levona tanteraka ny izahoko
  	Ka tsy izaho intsony re no velona ato am-po,
  	Dia ny herinao anie hanosika ahy hankato
  	O ! tanteraho 'zay sitrakao, Tompo ô.
  	
  
- 
  id: 467
  number: 467
  title: "EO AM-PELATANANAO"
  composer: "D. Rasolonjatovo"
  author: "D. Rasolonjatovo"
  key: "Do dia Db 3/4 "
  theme1: "FIAINANA KRISTIANA"
  theme2: "Fanoloran-tena sy Fanamasinana"
  lyrics: |
  
  1. -PELATANANAO
  
  Eo am-pelatananao, Ray ô,
  	No apetrako izao.
  	Ny fiainako tontolo
  	Eo am-pelatananao.
  	Marobe ny fahavalo
  	Te hamotraka ahy izao ;
  	Nefa ianao miaro
  	Ny eo am-pelatananao.
  	(An-tananao)
  	Na ho mora na ho mafy
  	'Zao fiainako izao,
  	Dia vonona aho hihafy
  	Fa am-pelatananao
  
  2. Eo am-pelatananao, Ray ô,
  	No apetrako tokoa.
  	Ny fiainako rehetra,
  	Na ho ratsy na ho soa.
  	Eny, izao rehetra izao
  	Miovaova sy mora lo;
  	Ny eo am-pelatananao.
  	No haharitra tokoa.
  	(An-tananao)
  	Na ho mamy na hangidy
  	Ny fiainako (ety),
  	Apetrako ny safidy
  	Ho eo am-pelatananao.
  
  3. Eo am-pelatananao, Ray ô,
  	Ho anio sy rahatrizay.
  	Ny eo am-pelatananao, Ray ô,
  	Ray ô, tsy hangaihay.
  	Na ny eso na ny latsa
  	Tsy hampaninona ahy izao
  	Fa ho sitrana ny ratra
  	Eo am-pelatananao.
  	(An-tananao)
  	Hatrizao sy ho doria
  	Ho anao dia ho anao,
  	Mamy loatra ny fitia
  	Eo am-pelatananao.
  	
  
- 
  id: 468
  number: 468
  title: "IANAO, RY KRISTY TOMPO"
  composer: "I. D. Sankey"
  author: "J. Andrianaivoravelona zanany"
  key: "Do dia E 6/4 "
  theme1: "FIAINANA KRISTIANA"
  theme2: "Fanoloran-tena sy Fanamasinana"
  lyrics: |
  
  1. Ianao, ry Kristy Tompo,
  	No hasiniko izao,
  	Avy aho fa mpanompo
  	Hiankohoka aminao,
  	Raisonao ny dera, saotra
  	Tena mendrika ho Anao ;
  	He ! ny foko faly loatra,
  	Faly mba hanaja Anao.
  
  2. 'Zao no tena faniriako :
  	Ny velona aminao,
  	Ka hitoeranao ny foko,
  	Fa tsy holalovanao ;
  	Eny, Tompo ô ! monena,
  	Mba monena ao tokoa,
  	'Zay no tena famonjena,
  	'Zay no mahafatra-po.
  
  3. Tsy ho orin-java-tsoa
  	'Zay rehetra itoeranao,
  	Tena sambatra tokoa,
  	Raha ny fo no lapanao,
  	Mandrosoa, fa vohako
  	Ho anao ny foko 'zao ;
  	Eny, Tompo, fa vohako,
  	Koa midira Ianao.
  	
  
- 
  id: 469
  number: 469
  title: "RY JESO KRISTY TOMPO"
  composer: "S. W. Martin"
  author: "H. Rabehasy"
  key: "Do dia F 4/4 "
  theme1: "FIAINANA KRISTIANA"
  theme2: "Fanoloran-tena sy Fanamasinana"
  lyrics: |
  
  1. Ry Jeso Kristy Tompo,
  	O ! ampio ny olonao !
  	Ampianaro mba hanompo
  	Sy hanao ny sitrakao ;
  	Malemy aho re
  	Ka omeo ny herinao
  	Tsy hivily tsy hania
  	Fa hanara-dia Anao.
  
  ISAN'ANDINY :
  	O ! vonjeo, ô ! vonjeo,
  	Ka tantano sy jereo ;
  	Aza afoy izahay,
  	Fa Ianao no avotray.
  
  2. Ny foko mba diovy,
  	Ry Mpamonjy lehibe !
  	Ka ambeno sy arovy,
  	Sao dia very aho re :
  	Iriko indrindra koa
  	Ny hitombo sy hamoa,
  	Ka ny voka-tsoa rehetra
  	Ho Anao, ry Jeso ô !
  	O ! vonjeo, sns
  
  3. Mba raisona, ry Tompo !
  	Ho Anao tokoa izao
  	'zay anananay rehetra,
  	Ka anarano fo izao,
  	Fa maty Hianao
  	Noho ny fitiavanao,
  	Ka tsy hainao hadinoina
  	Ny fitiavanao anay :
  	O ! vonjeo, sns
  
  
  
- 
  id: 470
  number: 470
  title: "IRIKO E, RY JESO"
  composer: "J. Andrianaivoravelona"
  author: "J. Andrianaivoravelona"
  key: "Do dia E 4/4 Miadankadana"
  theme1: "FIAINANA KRISTIANA"
  theme2: "Fanoloran-tena sy Fanamasinana"
  lyrics: |
  
  1. Iriko e, ry Jeso !
  	Hitovy aminao
  	Izay tsy manan-keloka,
  	Fa masina tokoa ;
  	Iriko e, ry Jeso !
  	Ho tonga toa Anao,
  	Namonjy sy nanafaka
  	fanahy, aina koa.
  
  2. Iriko, ry Mpamonjy
  	Mba ho sakaizanao,
  	Hiaraka ory aminao ;
  	Iriko, ry Mpamonjy !
  	Hanara-dia Anao
  	Ny hazo fijaliana
  	Ho entiko izao.
  
  3. Iriko, ry Mpandresy !
  	Hiaraka aminao
  	Ho eo an-toby lehibe,
  	Ho miaramilanao ;
  	Iriko, ry Mpandresy !
  	Hanaraka Anao,
  	Mitondra ny fanevanao,
  	Handray ny herinao.
  
  4. Iriko, ry Mpanjaka !
  	Ho ao an-dapanao
  	Hiara-paly aminao
  	Fa tonga zanakao ;
  	Iriko, ry Mpanjaka !
  	Ho eo anilanao
  	Handray ny lova atolotrao,
  	mpanjaka be fitia !
  	
  
- 
  id: 471
  number: 471
  title: "MBA OMEO AHY"
  composer: "P. P. Bliss"
  author: "G. Mondain"
  key: "Do dia Eb 12/4 "
  theme1: "FIAINANA KRISTIANA"
  theme2: "Fanoloran-tena sy Fanamasinana"
  lyrics: |
  
  1. Mba omeo ahy
  	Fo madio tokoa,
  	Afaka ahiahy
  	Ho Anao tokoa.
  	'Zaho dia malaina,
  	O ! mba hafanao re
  	Mba hikely aina
  	Hahefako be
  
  2. Mbola manangoly
  	Ny fakam-panahy,
  	Ao koa ny devoly
  	Ta hamotraka ahy.
  	Tompo ô ! ampio
  	Ny mpanomponao 'zao,
  	Ary mba tafio
  	Herim-po vaovao.
  
  3. Atolory ahy
  	Zotom-po sy hery,
  	Fahendrem-panahy,
  	Fo mahay mietry,
  	Ampianaro ako
  	Mba hanolo-tena,
  	Ka mba hatanjaho
  	Ny finoako.
  
  4. Dia hamasino
  	Ny saiko, ry Tompo !
  	Ka omeo fo mino,
  	Fo mahay manompo,
  	Fo mahay mihafy,
  	Fo miravoravo,
  	Na dia voa mafy
  	Fo toy ny Anao.
  	
  
- 
  id: 472
  number: 472
  title: "HE MANOLO-TENA AHO"
  composer: "Dera Arson"
  author: "Dera Arson"
  key: "Do dia G 4/4 Mieritreritra"
  theme1: "FIAINANA KRISTIANA"
  theme2: "Fanoloran-tena sy Fanamasinana"
  lyrics: |
  
  1. He ! manolo-tena aho, Tompo ô.
  	Mba ho Anao,
  	Ho Anao mandrakizay.
  	Ka ny andro sisa hiainako
  	Homeko Anao, raiso, izao
  
  ISAN'ANDININY :
  	O ! mba tohano Tompo ô
  	(Tohano Tompo ô)Ny diako, ny voadiko
  	('Zany, 'zany voadiko)
  	Mba hanompo Anao
  	('Zaho ta hanompo, ta hanompo Anao)
  	Mandrakizay, mandrakizay
  	(Ho mandrakizay).
  
  2. Ampy izay ny fiainana lasa
  	'Zay nampalahelo Anao, ry Tompoko.
  	Ka manomboka anio, Jeso ô,
  	Ampio aho ho Anao.
  	O ! mba tohano, sns
  
  3. Aoka izay ny filalaovan-dratsy
  	Nampisaraka ahy taminao ;
  	Fa ny ho mpandova lanitra
  	Iriko izao, Jesosy ô.
  	O ! mba tohano, sns
  
  4. O, ry Jesosiko be fitia
  	Izay nifidy ahy ho ondrinao
  	Mba tantano re izany dia,
  	Ho tonga any aminao!.
  	O ! mba tohano, sns
  	
  
- 
  id: 473
  number: 473
  title: "RAHA AZOKO IZAO TANY IZAO"
  composer: "Swedish Hymn - Mamy J. Ratsirison"
  author: "A. R. Marnoël"
  key: "Do dia D 3/4 "
  theme1: "FIAINANA KRISTIANA"
  theme2: "Fahononan-tena"
  lyrics: |
  
  1. Raha azoko izao tany izao
  	Nefa tsy azoko Jeso Mpamonjy,
  	Dia ho aiza re no hisy ahy
  	Raha ho rava izao tontolo izao ?
  	Raha azoko izao tany izao
  	Nefa tsy azoko Jeso Mpamonjy,
  	Moa ny fifalian'izao tany izao
  	Hitovy amin'ny an'i Jeso ?
  
  2. Mahafaly ahy amin'i Jeso :
  	Azoko ny zavatra rehetra.
  	Ireo otako voavela tokoa,
  	Ny alehako zakainy koa.
  	Na tsy manana aho afa-tsy i Jeso,
  	Tsy misy ilaiko intsony eto
  	Fa ahy ny zavatra rehetra
  	Ao amin'i Jeso Tompoko.
  	
  

  theme1: "HIRA FANAMPINY"
  theme2: null
  lyrics: |
  
  1. Miara-dia Aminy,
  	Dia Jeso Zanany;
  	Voninahitra omeny anao,
  	‘Ndeha isika hankatò,
  	Izy homba tokoa
  	Ka hiray, hino sy hankatò.
  

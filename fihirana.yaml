  	Fa maharitra mandrakizay
  	No atlotrao ety an-tany
  	Hamonjena olom-bery indray.
  	Efa nenina ny lasa, sns.
  
  3. Ray ô ! indro fa miha-mazava
  	Aminay ny fitiavanao ;

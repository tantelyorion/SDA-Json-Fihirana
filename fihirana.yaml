  id: 328
  number: 328
  title: "MIANTSO ANAO JESOSY"
  composer: "M. Randriamiandriray"
  author: "M. Randriamiandriray"
  key: "Do dia F na Eb 4/4 "
  theme1: "FITORIANA NY FILAZANTSARA"
  theme2: "Antso"
  lyrics: |
  

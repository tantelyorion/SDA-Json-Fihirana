  id: 384
  number: 384
  title: "NY FAHOTANA"
  composer: "J. Randrianarison"
  author: "J. Randrianarison"
  key: "Do dia Eb 4/4 "
  theme1: "FIAINANA KRISTIANA"
  theme2: "Fibebahana - Fiovam-po"
  lyrics: |
  

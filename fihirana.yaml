  id: 1
  number: 1
  title: "RY MPONINA AN-TANY O!"
  composer: "L. Bourgeois"
  author: "Rakotonjanahary"
  key: "Do dia G 4/4 "
  theme1: "SALAMO"
  theme2: null
  lyrics: |
  
  1. Ry mponina an-tany ô,
  	Avia manandratra feo
  	Ka mba derao ny Tomponao;
  	Hirao ny voninahiny.
  
  2. Andriana ambony hasina,
  	Izy nanao antsika izao.
  	Isika no malalany,
  	Fa ondry izay fiandriny.
  
  3. Midira eo an-tranony
  	Amin'ny fihobiana,
  	Ataovy ren'ny lanitra
  	Ny akon'ny fisaorana.
  
  4. Andriamanitra dia Ray,
  	Mamindra fo sy marina,
  	Mitsimbina ny zanany,
  	Hatramin'ny taranany.
  	
- 
  id: 2
  number: 2
  title: "DERAIKO IANAO"
  composer: "C. Malan"
  author: "Rakotonjanahary"
  key: "Do dia Db 4/4 Allegreto"
  theme1: "SALAMO"
  theme2: null
  lyrics: |
  
  1. Deraiko Ianao,
  	Isan'andro rehetra,
  	Andriamanitra ô.
  	Ny marina handre
  	Ny aingan'ny Fanahy
  	Manentana ny fo.(2x)
  
  2. Ry Kristiana ô,
  	Ankalazao ny Tompo,
  	Ilay Mpamonjinao;
  	Ry voafidiny,
  	Sambatra, tafavory
  	Ambany elany.(2x)
  
  3. Anjely masina,
  	Manan-kery hamonjy,
  	Aron'ny zanany,
  	Ambenany tokoa
  	Raha hitany fa misy
  	Loza manambana.(2x)
  
  4. Ny fanjakany koa,
  	Fanjakana izay misy
  	Fahamarinana.
  	Izay mialoha eo,
  	Tsy manana ahiahy
  	Fa tsara antoka.(2x)
  
  5. Mibanjina Anao
  	Ny olona Jehovah,
  	Anjara lovanay
  	Fikirinay Ianao
  	Fa anay mandrakizay
  	Omeo fiadanana. (2x)
  
- 
  id: 3
  number: 3
  title: "NY TOMPO ANKALAZAO"
  composer: "16 è siecle"
  author: "Rakotonjanahary"
  key: "Do dia Eb 4/4 Moderato"
  theme1: "SALAMO"
  theme2: null
  lyrics: |
  
  1. Hy Tompo ankalazao,
  	An-dapany masina,
  	Fa izy re no nanao
  	Ny tany sy ny lanitra.
  	Derao re hatraiza hatraiza
  	Derao ny indrafony,
  	Derao koa ny heriny,
  	Hery, toky ho antsika.
  
  2. Hoderaina anie,
  	Hatrany am-parany,
  	Ny anaran-tsoany
  	Isaorana anie
  	Htrany amin'ny avo.
  	Ry mponina an-tany ô,
  	Ry olona velona,
  	Derao Izy : Haleloia !
  
- 
  id: 4
  number: 4
  title: "IZAHO DIA HIDERA ANAO"
  composer: "I. Bourgeois"
  author: "Rakotonjanahary"
  key: "Do dia D 4/4 Allegro"
  theme1: "SALAMO"
  theme2: null
  lyrics: |
  
  1. Izaho die hidera Anao
  	Amin'ny foko manontolo,
  	Hasandratro ny feoko
  	Eo antrehan'ny Mpanjaka.
  	Eran'ny toera-masinao,
  	No hanandratako ny loha,
  	Hihoby ny anaranao,
  	Ry Mpitana ny fanekena.
  
  2. Niely be ny lazanao
  	Noho ny teninao mahery.
  	Fiononako re Ianao
  	Raha hidonam-pahoriana,
  	Ireo mpanjaka maro koa
  	Hiankohoka ary hitsaoka,
  	Raha vao reny ny feonao
  	Manome hery mahasahy.
  
  3. Feno ny fiderana Anao
  	Izao tontolo hita maso.
  	Izay vahoaka mandre
  	Ho velon-kira koa mahita.
  	Ianao, Andriamanitra ô,
  	Dia mijery anay mahantra
  	Ka na dia toa lavitra
  	Dia mamelona any rehetra.
  
  4. Raha torovana ny fo
  	Ka ketraka sy very toky
  	Noho ny adin-tsaina be
  	Izay mandreraka tsy zaka
  	Dia ny fahamarinanao
  	No mampiarina ny voa ;
  	Ka na dia toa reraka
  	Dia mbola afaka hidera
  
- 
  id: 5
  number: 5
  title: "TOY NY DIERA AN-TANY"
  composer: "16 è siecle"
  author: "Rakotonjanahary"
  key: "Do dia G 4/4 Dolce"
  theme1: "SALAMO"
  theme2: null
  lyrics: |
  
  1. Toy ny diera eran-tany maina,
  	Anan-ketaheta ao,
  	Ny fanahiko, ry Tompo,
  	Mba maniry rano koa.
  	O, ry Tompo velona,
  	Ranon'aina Ianao,
  	Koa mandra-pahoviana
  	No mba hahitako Anao.
  
  2. Tena mafy fianjera
  	Tamiko ny tananao :
  	Zanakao fa tsy jerenao,
  	'Zany no tolokoko.
  	Mihainoa Tompo ô,
  	Mamindrà fo amiko,
  	Masina Ianao Jehovah,
  	Masina Tsitoha indrindra.
  
  3. Ranomaso lalandava
  	No fiahiko ety
  	Hoy ny latsam-pahavalo,
  	"Aiza Andriamanitrao ?"
  	Nefa hitanay Iano,
  	Tao ant-tempolinao:
  	Nivavahanay rehetra,
  	Nohobinay, noderanay.
  
  4. Ry fanahiko, nahoana
  	No dia reraka ianao ?
  	Ao Andriamanintsika,
  	Ao Izy ka jereo
  	Fa fanasitranana,
  	Ho anao ny tavany
  	Vatolampy velona Izy,
  	Iboiboihan-dRanon'aina.
  	
- 
  id: 6
  number: 6
  title: "RY TOMPO O, MPAMINDRA FO"
  composer: "I. D. Sankey"
  author: "Rajoelison"
  key: "Do dia E 6:4 Dolce"
  theme1: "SALAMO"
  theme2: null
  lyrics: |
  
  1. Ry Tompo ô, Mpamindra fo
  	Sy feno fiantrana koa,
  	Mpamela heloka tokoa,
  	Vonoy ny hadisoako.
  	Manatona Aho 'zao,
  	Na meloka Aminao,
  	Noho ny hasoavanao,
  	Sasao madio ny foko.
  
  2. Tsy te hiala tsiny re
  	Fa tena diso lehibe,
  	He! ratsy hatrany ambohoka e!
  	Ianao no nanotako.
  	Manatona Anao 'zao,
  	Na meloka aminao,
  	Noho ny hasoavanao,
  	Sasao madio ny foko.
  
  3. Ny fahamarinana ao am-po
  	No tena sitrakao tokoa,
  	Avia, diovy avokoa
  	Ny heloko rehetra.
  	Manatona Anao 'zao,
  	Na meloka aminao,
  	Noho ny hasoavanao,
  	Izay tsy misy fetra.
  
  4. O,amorony fo madio,
  	Ankehitriny eny anio;
  	Fanahy tsara mba ampio,
  	Tohano tsy ho resy.
  	Hamerina aminao
  	'Reo olon-diso izao,
  	No faniriako hatrizao,
  	Ry Kristy, 'Zay Mpandresy !
  	
- 
  id: 7
  number: 7
  title: "RY TOMPO \'ZAY FONENANAY"
  composer: "H. A. Miller"
  author: "Rajoelison"
  key: "Do dia E 3/4 "
  theme1: "SALAMO"
  theme2: null
  lyrics: |
  
  1. Ry Tompo 'zay fonenanay
  	Sy manda mafy hatrizay,
  	Asandratray ho aminao
  	Ny saotra sy ny dera izao
  
  2. Ny heloka izay vita izao
  	Ataonao anatrehanao.
  	He indro menatra izahay,
  	O, mamelà, ry Tomponay.
  
  3. Ampianaro ny fo
  	hahay hihevitra tokoa
  	Fa fohy re ny andro ety
  	Ka manakaiky ny ary.
  
  4. O, miverena Ianao,
  	Ry Tompo, aza afoinao.
  	Ny hasoavan-dehibe
  	Hitoetra aminay anie.
  
- 
  id: 8
  number: 8
  title: "MIDERA AN\'I JEHOVAH"
  composer: "M. Randriamiarana"
  author: "M. Randriamiarana"
  key: "Do dia F 3/4 "
  theme1: "SALAMO"
  theme2: null
  lyrics: |
  
  1. Miderà an'Ii Jehovah,
  	Ry firenena rehetra;
  	Miderà Azy ry olona rehetra.
  	Fa lehibe
  	Ny famindram-pony amintsika.
  	Ary mandrakizay
  	Ny fahamarinan'i Jehovah
  	Haleloia.
  
- 

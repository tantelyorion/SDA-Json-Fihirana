  	Sy hiroso,
  	Handray ny Anao,
  	Hiara-miezaka aminao
  	Hanatratra toetra vao.
  	O, Hatony,
  	Ka tazony
  	'Ndrao diso Anao.
  
  2. Eto an-tany
  	Mitomany,
  	Resin'ny manjo.
  	Ao an-koatra
  	tsara loatra,
  	Mahafaly fo.
  	O ! omany aho 'zao
  	Mba ho mendrika ho ao.
  	Omeo ahy
  	Ny Fanahy
  	Hitondra hakao.
  
  3. Be ny ratsy
  	'Zay mandrafy
  	Ho toheriko,
  	Ray malala,
  	Aza miala,
  	Ianao no heriko,
  	Raha mandresy fantatrao
  	Fa ho voninahitrao ;
  	Aza miala, Ray malala,
  	Handreseko 'zao.
  
  4. Raha sendra

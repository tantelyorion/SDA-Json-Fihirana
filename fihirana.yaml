  id: 489
  number: 489
  title: "RY MIARAMILA ! MANDROSOA IZAO"
  composer: "S. Baring-Gould"
  author: "J. T. Price"
  key: "Do dia F 4/4 "
  theme1: "FIAINANA KRISTIANA"
  theme2: "Ady sy Fandresena"
  lyrics: |
  
  1. Ry miaramila ! mandrosoa izao,
  	Kristy Kapiteny mialoha anao ;
  	Ao aloha tafita,
  	Loza, ratra be,
  	Fitsaharana tsy misy
  	Misikina re:
  
  ISAN'ANDININY
  
  Ry miaramila ! mandrosoa izao,
  	Kristy Kapiteny mialoha anao.
  
  2. Any lehy ratsy no manotrika,
  	Any ny tsipika no milatsaka ;
  	Tano ny finoana
  	Ho ampinganao,
  	Entonao ho fandresena
  	Izao rehetra izao :
  	Ry miaramila ! sns.
  
  3. Aza miamboho na miherika,
  	Ao an-tratranao ny fiarovana ;
  	Aza mba matahotra
  	Fa sahia, fandrao
  	Raha tsy mandresy
  	Dia ho resy ianao ;
  	Ry miaramila ! sns.
  

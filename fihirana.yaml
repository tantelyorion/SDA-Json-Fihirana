  	Ho tena akaikinao,
  	No faniriako ka avia,
  	Hatony aho izao.
  
  2. Akaikinao no mahatamàna,
  	Ny tena akaikinao,
  	Fa eo dia lavitra Satana
  	Satria resinao.
  
  3. Akaikinao no misy hery,
  	Dia eo akaikinao ;
  	Hizorana andalan-tery
  	Mankany aminao.
  
  4. Akaikinao no fahoriana,
  	Raha tena akaikinao,
  	Dia mody re ho fifaliana

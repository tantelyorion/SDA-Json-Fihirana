  id: 338
  number: 338
  title: "O! RY MAHANTRA SY ORY"
  composer: "R. Randriamandimbisoa"
  author: "A. Emiliarison"
  key: "Do dia F 6/4 "
  theme1: "FITORIANA NY FILAZANTSARA"
  theme2: "Antso"
  lyrics: |
  
  1. O ! ry mahantra sy ory
  	Jeso miantso anao
  	Hividy ilay volamena voadio
  	Mba hanan-karena ianao.
  
  ISAN'ANDININY :
  	Vohay, ô, vohay !
  	(Vohay ny fo ! Vohay ny fo !)
  	Vohay re honenan'i Jeso.
  	Vohay ny fo anio tokoa !
  	O ! mba vohay re ny fo
  	(Vohay ny fo)
  
  2. Ry malahelo sy jamba,
  	Jeso mitady anao.
  	Nanomana odimaso izao
  	Hampahiratra anao.
  	Vohay ny fo, sns.
  
  3. Mitanjaka ve ianao ?
  	Vonona Jeso izao
  	Hanome fitafy fotsy sy vao
  	Tsy hisehoan'ny henatrao.
  	Vohay ny fo, sns.
  
  4. Tompo Jeso no mandona
  	Ao am-ponao izao
  	He ! miangavy, mifona ho anao.
  	O ! mba vohay re ny fo.
  	Vohay ny fo, sns.
  	
  
- 
  id: 339
  number: 339
  title: "INJANY FEO MIANTSO"
  composer: "R. Rabenasolo"
  author: "R. Rabenasolo"
  key: "Do dia Eb 6/8 "
  theme1: "FITORIANA NY FILAZANTSARA"
  theme2: "Antso"
  lyrics: |
  
  1. Injany feo miantso,
  	Manako eran-tany,
  	Miangavy tsy miato,
  	Tsy renao va izany ?
  	Manasa ny mpanota
  	Hanatona ny Tompo,
  	Hibebaka tokoa,
  	Hiaiky heloka.
  
  2. Injao mamelovelo
  	'Lay feon'ny Tompo soa.
  	Ny fony malahelo,
  	Ianao tiany tokoa.
  	Ny onjam-pitahiana
  	Iriny ho anao,
  	Halany ny fahakiviana,
  	Izy no fiainanao.
  
  3. Ekeko avy hatrany,
  	'Lay antso be fitia.
  	Jesosy irery ihany
  	No antenaiko ety.
  	Ry Jeso mofon'aina
  	Sy loharanon-tsoa.
  	Ny foko karankaina,
  	Omeo fiadanam-po.
  	
  
- 
  id: 340
  number: 340
  title: "O! HENOY"
  composer: "D. Rasolonjatovo"
  author: "D. Rasolonjatovo"
  key: "Do dia Ab 3/4 Miadana"
  theme1: "FITORIANA NY FILAZANTSARA"
  theme2: "Antso"
  lyrics: |
  
  1. O ! henoy, O ! henoy
  	Fa injeo miantso anao
  	'Lay Tomponao.
  	Mamalia fa Izy tia.
  	Ka miantso anao.
  	Mamalia dieny izao.
  
  ISAN'ANDININY :
  	Mitsangàna, mitsangàna,
  	Aza ela miantso anao
  	'Lay Tompo tia
  	Mitsangàna, mitsangàna,
  	Aza ela anio
  	Ary eny matokia.
  
  2. O ! jereo, O ! jereo
  	Fa indro eo
  	Izy maty ho anao.
  	Mitenena, manenena
  	Ka omeo ny fo
  	Hosoloiny vaovao.
  	Mitsangàna, mitsangàna, sns.
  
  3. O ! diniho, O ! diniho
  	Ka ario ny ota maro
  	Izay natao
  	Ka ario dieny anio,
  	O ! ario tokoa
  	Fa tsy mahasoa anao.
  	Mitsangàna, mitsangàna, sns.
  	
  
- 
  id: 341
  number: 341
  title: "O! MANDROSOA IZAO"
  composer: "SAH377"
  author: "A. R. Marnoël"
  key: "Do dia C 4/4 "
  theme1: "FITORIANA NY FILAZANTSARA"
  theme2: "Antso"
  lyrics: |
  
  1. O! mandrosoa izao
  	Kristy miantso anao
  	Hiaraka aminy
  	Sy ho tantanany.
  	Tiany tokoa sy maminy
  	Izay miandany aminy.
  
  2. O! mandrosoa izao,
  	Ialao ny hevitrao.
  	Ianao ho mpandresy
  	An'ady misesy
  	Fa Izy no hiaro anao ;
  	Ny fanahy hampahery anao.
  
  3. O! mandrosoa izao
  	Hodioviny ianao
  	Amin'ny rany soa
  	Hahafahanao koa
  	Hanaraka ny lalany
  	Ka mba ho tonga zanany.
  	
  
- 
  id: 342
  number: 342
  title: "NY MPAMONJY NO MITADY FIHAVANANA"
  composer: "I. D. Sankey"
  author: "Rabary"
  key: "Do dia G 9/4 "
  theme1: "FITORIANA NY FILAZANTSARA"
  theme2: "Antso"
  lyrics: |
  
  1. Ny Mpamonjy no mitady
  	Fihavanana aminao ;
  	Izy no manambitamby
  	Hanatonanao izao ;
  	Sao manjary fandatsana
  	Ny fifonana aminao,
  	Ka ny mety, mihavàna
  	Amin'ny Mpamonjy izao.
  
  2. Diany misy hafanana
  	Ka mangoraka ny fo,
  	Manatona ny Mpamonjy
  	Sao dia mangatsiaka indray.
  	Izao no andro famonjena,
  	Ka vonjeo sao neninao :
  	Ry mpanota, miverena,
  	Izao ankehitriny izao.
  
  3. Sao ity no toriteny
  	Far-fanasana anao ;
  	Sao anio no fotoana
  	Fara-ahavelomanao ;
  	Ka aza mba misalasala,
  	Sao manjary neninao,
  	Raha tsy mety mahalala
  	Izao fotoana mety izao.
  
  4. Indrisy be ny fahotako,
  	Be ny ratsy vitako ;
  	Sao tsy raisin'ny Mpamonjy
  	Ny mpanota tahaka izao ?
  	Miverena, fa ny rany
  	Ampy hahadio anao ;
  	Manatona hosasany
  	'Zao ankehitriny izao.
  	
  
- 
  id: 343
  number: 343
  title: "MANATONA, RY MPANOTA"
  composer: "J. Richardson"
  author: "Ch. Rasoanaivo"
  key: "Do dia Eb 4/4 "
  theme1: "FITORIANA NY FILAZANTSARA"
  theme2: "Antso"
  lyrics: |
  
  1. Manatona, ry mpanota
  	Ory, jamba, very koa !
  	Ianao simban'ny ota,
  	Indro ao ny Tompo soa ;
  	Ry tsy mendrika ho vonjena,
  	Misy 'zay miantra anao ;
  	Fifaliam-be homena,
  	Famelana helokao.
  
  2. Mba henoy ny teny tsara
  	'Zay lazaina aminao,
  	Sao very ny anjara
  	Soa tadiavinao ;
  	Feno antra, mana-kery
  	Jeso no mitaona anao ;
  	Ka ny mino tsy ho very
  	Manatona re izao.
  
  3. Ny miato tsy mba tsara
  	Ny halainanao ario ;
  	Sao helohin'ny Mpitsara
  	Manatona re anio ;
  	He ! miandry ny Mpamonjy
  	Mba faingana ianao.
  	Raha te ho voavonjy,
  	Aza ela ianao.
  	
  
- 
  id: 344
  number: 344
  title: "MOA RENAO VE RY MPANOTA"
  composer: "J. Ratsiminah"
  author: "J. Ratsiminah"
  key: "Do dia A 3/4 "
  theme1: "FITORIANA NY FILAZANTSARA"
  theme2: "Antso"
  lyrics: |
  
  1. Moa renao ve ? ry mpanota ô,
  	Ny feon'i Jeso miantso anao ?
  	Ny ainy no namonjena anao.
  	Todiho anio, ô ! mamalia.
  
  ISAN'ANDININY :
  	Valio Jeso anio, (mba valio)
  	Henoy ny antso (ka raiso re)
  	Fiainana kanto, fiainana kanto
  	No nomaniny ho anao.
  
  2. Ekeo re fa ho anao
  	No nidinany an-tany ety.
  	Ho faly ireo nankato ny Ray
  	Ny helokao dia ho neninao.
  	Valio Jeso anio, sns.
  
  3. Tsy ho ela izao dia ho avy indray
  	Ny Mpanavotra ahy sy Mpamonjinao.
  	Meteza fa iJeso tia
  	Miangavy anao, ô ! mamalia
  	Valio Jeso anio, sns.
  	
  
- 
  id: 345
  number: 345
  title: "FANAHY VERY O, AVIA"
  composer: "L. Bourgeois"
  author: "A. R. Marnoël"
  key: "Do dia Ab 3/4 Mientanentana - Miadankadana"
  theme1: "FITORIANA NY FILAZANTSARA"
  theme2: "Antso"
  lyrics: |
  
  1. Fanahy very ô, avia !
  	Jeso mbola tia.
  	Indro ny tanany mitsotra
  	Hanavotra.
  
  2. Mpanota ô, avia ianao,
  	Mibebaha izao.
  	Ny ota 'zay ekena hadio
  	Anio, anio.
  
  3. Mivesatra entana ô, avia
  	Miantso ny Mesia.
  	Ny otanao toa tafahoatra
  	Voaisotra.
  
  4. O! ry fanahy manjoretra

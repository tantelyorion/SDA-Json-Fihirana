  id: 419
  number: 419
  title: "NY EO AKAIKINAO RY RAY"
  composer: "I. D. Sankey"
  author: "J. Andrianaivoravelona zanany"
  key: "Do dia Eb 4/4 "
  theme1: "FIAINANA KRISTIANA"
  theme2: "Fifaliana sy Fahatokiana"
  lyrics: |
  
  1. Ny eo akikinao, ry Ray,
  	No mamiko izao,
  	Hanjary tena tafaray
  	Ny foko sy ny Anao.
  	Soa re, ry Raiko ô !
  	Raha eo anilanao.
  	Ny hazo fijaliana
  	Ho tonga maivana.
  
  2. Ny eo akikinao, ry Ray,
  	No herin-janakao ;
  	Ianao irery no mahay
  	manampy ahy izao.
  	Soa re, ry Raiko ô !
  	Raha eo anilanao.
  	Ny ota tsy hanapaka
  	Ny olona afaka.
  
  3. Ny eo akikinao, ry Ray,
  	No mandako tokoa ;
  	Ny ratsy dia tsy hahay
  	Handrombaka ahy koa.
  	Soa re, ry Raiko ô !
  	Raha eo anilanao.
  	Ny ora izay manjombona
  	Ho fiadanana.
  
  4. Ny eo akikinao, ry Ray,
  	No fifaliako izao,
  	Ny tanako dia hifandray
  	Amin'ny tananao.
  	Soa re, ry Raiko ô !
  	Raha eo anilanao.
  	Fenoinao fanambinan-tsoa
  	Ilay kapoakako.
  	
  

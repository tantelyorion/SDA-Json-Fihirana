  title: "HIRA MAMPAHERY RE (HO AO AN-TRANO TSY HO ELA)"
  composer: "SDA Hymnal 626"
  author: "Tantely Ravelomanantsoa"
  key: ""
  theme1: "HIRA FANAMPINY"
  theme2: null
  lyrics: |
  
  1. Hira mampahery re no

  	Zava-dehibe imasonao, ry Ray
  	Ny fahafatesan'olo-masina iray
  
  Fa voalaza hoe :
  	Na iza na iza manaiky fa hatao batisa
  	hanamarina an'Andriamanitra
  	Ka mifaly ny anjely an-danitra.
  	
  

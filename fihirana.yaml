  id: 747
  number: 747
  title: "RY TOMPO Ô, TARIHO NY TANINDRAZANAY"
  composer: "M. De Schoulepnikov"
  author: "J. Rabarioël"
  key: "Do dia F 4/4 Allegro risolut"
  theme1: "OLON-TOKANA - OLON-DROA - RODOBE"
  theme2: null
  lyrics: |
  
  1. Ry Tompo ô, tariho
  	Ny tanindrazanay,
  	Ny saina atodio
  	Fa tena tianay,
  	Hanaiky ny mazava
  	Omen'ny teninao,
  	Ka tsy hisalasala
  	hanara-dia Anao.
  	Tantano re, ry Tompo
  	Hanao ny sitrakao,
  	Ho vonona hanompo
  	Handray ny hafatrao,
  	Ny didinao rehetra
  	Nomenao fahizay,
  	No aoka mba ho fetra
  	Hotanterahinay.
  
  2. Ry Tompo ô, vimbino
  	Ny tanindrazanay,
  	Arovy sy tsimbino
  	Mba hiadananay.
  	Omeo saina hendry
  	Ireo mpitondra anay,
  	Hahaizanay mikendry
  	'Zay hahasoa anay.
  	Rah sendra ka variana
  	Tsy mahatsiaro Anao.
  	Fohazy mba ho liana
  	Handray ny hevitrao.
  	Ny sitrakao rehetra
  	No tena sitrakay
  	Fa io no tarigetra
  	'Zay hotratrarinay.
  
  3. Ry Tomponay malala,
  	Ry Vonivatonay
  	Tariho lalandava
  	Ny tanindrazanay.
  	Ny herinao rehetra
  	Ny voninahitrao,
  	No aoka mba hitoetra
  	Ho tazanay izao.
  	Irinay Tompo tsara
  	Hohamasininao,
  	Handraisanay anjara
  	Ho eo anilanao.
  	Vonjeo ny Malagasy
  	Ho olonao tokoa,
  	Ka tsy hilasilasy
  	Hanaraka ny soa.
  
- 
  id: 748
  number: 748
  title: "Ô ! RY FANAHIKO,DERAO JEHOVAH"
  composer: "Psa Uier de Strasbourg"
  author: "Rakotonjanahary"
  key: "Do dia G 4/4 Moderato"
  theme1: "OLON-TOKANA - OLON-DROA - RODOBE"
  theme2: null
  lyrics: |
  
  1. Ô ! ry fanahiko, derao Jehovah
  	Ary izay rehetra ato anaty
  	derao ny Anarany Masina.
  	Andriamanitra fanantenana
  	Mameno soa ny andronao rehetra,
  	Ka isaory, ô ry fanahiko.
  
  2. Navelany ny helokao rehetra
  	Tsy mba nisainy ireo helok'ota
  	Sitrany daholo ny rofinao
  	Ny faty tsy ho tahotrao intsony.
  	Matoky ianao akaiky Azy.
  
  3. Malala-tanana Andriamanintsika
  	Ka ampoky ny soa ny vahoaka.
  	Tsy mba maro teny fa mizara :
  	Rariny an'izay hampahoriana,
  	Hery ho an'izay mangozohozo
  	He ! famindrampo tena lehibe.
  
  4. Ry olombelona marefo aina.
  	Ahitra ihany isika izao no ety;
  	Tsy mateza fa voninahitra
  	Pahon'ny rivotra koa dia lasa,
  	Ka na ny tany naniriana aza
  	Tsy mahalala ny fisiany.
  
  5. Aminao koa ry mandrakizay ô,
  	Dia mandrakizay ny indrafonao;
  	Tovinao ny fampanantenanao
  	Arovanao izay matahotra Anao
  	'Zay mankato ny hasin'ny lalànao
  	Ka mitandrina 'zay voasoratrao.
  
  6. Ray manadino ireo fahotana
  	Nataontsika zanany malala.
  	Raisiny tokoa izay mibebaka
  	Satria fantany ny toe-tsika.
  	Fa vovoka nalaina tamin-tany
  	Ka dioviny amin'indrafo.
  
- 
  id: 749
  number: 749
  title: "ILAY BOKY \'ZAY NODORANA"
  composer: "Ratovondrahety"
  author: "Ratovondrahety"
  key: "Do dia G 4/4 Faly sy mirehitra"
  theme1: "OLON-TOKANA - OLON-DROA - RODOBE"
  theme2: null
  lyrics: |
  
  1. Ilay boky 'zay nodorana
  	Dia may, nefa tsy levona ;
  	Izay natao ho lavenona,
  	Lasa vato fanorenana ;
  	Noheverina ho foana
  	Kanjo mainka koa velona
  	'Lay nafenina, nalevina,
  	No nisandratra nivelatra !
  	(Mba henoy)
  	Iza moa no hahasakana,
  	(Iza moa)
  	Eny, iza no hanohitra
  	(No hanohitra)
  	Ilay teny voasoratra, (ilay teny)
  	Dia ny tenin'Andriamanitra ?
  	(Andriamanitra)
  	'Zao rehetra izao ho levona (levona)
  	Fa ny teny no haharitra (haharitra)
  
  2. Ilay Teny Masina sy to,
  	Manambara ny Mpamonjiko,
  	Tena sarobidy ao am-po
  	Ka vakiko sy iainako :
  	Fifaliana, fiarovako,
  	Fahazavana ao an-dàlako ;
  	Koa tanako ho lovako
  	Sy isaorako ny Tompoko !
  	(Maty aho)
  	Maty aho nefa velona,
  	(Velona)
  	Fa Kristy no ahavelomako,
  	(Ahavelomako)
  	Maty Izy, ho Mpisoloko, (soloko)
  	Noho ny fahotana vitako ;
  	(Ota vitako)
  	Nefa Izy dia natsangana,
  	(Tsangana)
  	Santatry ny fitsanganako. (Haleloia !)
  	
  
- 
  id: 750
  number: 750
  title: "RAIKO Ô MIJERE"
  composer: "G. Raterarison"
  author: "G. Raterarison"
  key: "Do dia Eb 6/4 Mangingina"
  theme1: "OLON-TOKANA - OLON-DROA - RODOBE"
  theme2: null
  lyrics: |
  
  1. Raiko ô ! mijere
  	Miantso ka vonjeo,
  	Fa he mijaly sy feno ratra re,
  	'Ty nofo mitoreo ;
  	Ry mahantra avia maneke,
  	Natao ho anao Getsemane.
  
  2. Jereo Getsemane,
  	Ora nijaliana,
  	Tompo Jesosy tia sy lehibe,
  	Feno fitomaniana ;
  	Nanjary rà ny dinitrao,
  	Nohon'ny otako natao.
  
  3. Indro re Jesosy,
  	Mangoraka ny very ;
  	Nangirifiry re tao Kalvary,
  	Fa tsy nisy nijery ;
  	Ny Rainy koa dia nandao,
  	Noho ny heloka fanao.
  
  4. Manintona ahy izao,
  	Ny hazo fijalianao ;
  	Fa mitarika ahy mba hanavao.
  	Hanadio ny natao ;
  	Ny hazo fijaliana an-tany,
  	Manaiky ny fitondrany.
  
- 
  id: 751
  number: 751
  title: "\'LAY JESOSY NO SAKAIZA"
  composer: "C. C. Converse"
  author: "F. Ramanantsialonina"
  key: "Do dia G 4/4 "
  theme1: "OLON-TOKANA - OLON-DROA - RODOBE"
  theme2: null
  lyrics: |
  
  1. 'Lay Jesosy no sakaiza,
  	Mahatoky tsy mandao.
  	Fa nikolo sy nitaiza,
  	Nanamboatra nanavao.
  	Mahalala ny halemena
  	Ka mananatra tokoa
  	Fa Sakaiza tena tia,
  	Sy Mpanarina ny dia.
  
  2. Jeso no sakaiza tsara,
  	Sy Mpiaro ny fanahy.
  	Izy ihany no anjara,
  	Vonjy sy Mpanafaka ahy.
  	He ! natsotrany ny sandry,
  	Mba handray anao izao,
  	Ka miadana sy mandry,
  	'Zany eo anilanao.
  
  3. Jeso tena mahatoky,
  	Ampy hiadananao.
  	Mofo tena mahavoky,
  	Ary tena tanjakao.
  	Ô ! ry namako atolory
  	Ny fiainanao izao,
  	Aza ketraka akory
  	Izy ampy ho anao.
  
  4. Jeso no Sakaiza hendry,
  	Mpanalàlana anao
  	'Lay Mpamonjy voatendry
  	Mba hanavotra anao.
  	Eny, ho avy tsy ela
  	Mba handray anao izao.
  	Miomàna sao tavela,
  	Ka hanenina ianao.
  
- 
  id: 752
  number: 752
  title: "MPAMONJY BE FIANTRA"
  composer: "S. S. Wesley"
  author: "F. Ramanantsialonina"
  key: "Do dia Eb 4/4 Milanto"
  theme1: "OLON-TOKANA - OLON-DROA - RODOBE"
  theme2: null
  lyrics: |
  
  1. Mpamonjy be fiantra
  	No maty ho anao,
  	Nijaly sy nahantra,
  	Nisolo voina anao.
  	Ny voina sy ny ratra,
  	Zakainy mora re ;
  	Fa Izy feno antra
  	Sy be fitiavana e !
  
  2. Nafoin'ny Rainy tia
  	Nangorohoro re,
  	Hanavotra mpania
  	Hitondra entam-be.
  	Nisento nitaraina,
  	Nohon'ny helokao
  	Ka he niferin'aina
  	Hanavotra anao.
  
  3. Ry Tompoko malala,
  	He ! be ny vitanao,
  	'Ty nofoko adala,
  	Tsy mahavaly izao.
  	Kanefa izany foko,
  	Atolotro Anao
  	Ekeko sady foiko
  	Ho tena lapanao.
  	
  

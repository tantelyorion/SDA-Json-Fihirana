  title: "RAHA HANENO NY TRÔMPETRA"
  composer: "Rajoelison"
  author: "Rajoelison"
  key: "Do dia G 4/4 "
  theme1: "JESOSY KRISTY"
  theme2: "Ny fiverenany - Ny fanjakany"
  lyrics: |
  
  1. Raha haneno ny trômpetra
  	Eny an-drahona izao,
  	Ka ho tapitra hatreo ny andro ety
  	Moa ho vonona hitsena
  	Ny Mpanjaka ve ianao,
  	Sy handova ilay tanàna soa ary ?
  
  ISAN'ANDININY :
  
  Raha ho re (izao) ny fiantsoana
  	Ka ho avy (re mba) hanoloana
  	Ny voavotra rehetra,
  	Moa va ho re ny anaranao izao ?
  
  2. Raha hatsangana amin-kery
  	Ireo nodimandry re,
  	Ka hitafy voninahitra izao ;
  	Ary indreny miara-dia
  	Ny voavonjy marobe,
  	Moa va mba ho anisany ianao ?
  	Raha ho re, sns.
  
  3. Raha avy mba hijinja
  	Ilay Tompom-bokatra,
  	Ka hamory
  	'Reo amboara tsara voa,
  	Dia hampiditra azy ireny
  	Mba ho any an-tsompitra,
  	Moa va ianao ho isany tokoa ?
  	Raha ho re, sns.
  
  4. O ! ry namako variana,
  	Mety ho anio izao
  	No ho avy Kristy,
  	'Lay Mpanjaka re.
  	Koa anio, anio izao ;
  	Dia manatòna ianao
  	Mba hiaraka amin'ireo marobe.
  	Raha ho re ny fiantsoana
  	Ka ho avy hanoloana,
  	Ny voavotra rehetra,
  	Mifalia fa ho re ny anaranao !
  
- 
  id: 158
  number: 158
  title: "MISY RE TANY SOA"
  composer: "J. Hunter"
  author: "Rajoelison"
  key: "Do dia G 6/8 "
  theme1: "JESOSY KRISTY"
  theme2: "Ny fiverenany - Ny fanjakany"
  lyrics: |
  
  1. Misy re tany soa
  	Ary an-koatra ary
  	Hasambarana no ao
  	Fa tsy toy ny ety,
  	Anatrehan'ny Ray,
  	Tena mamy tokoa
  	Izay irin'ny fo
  	Lavorary avokoa.
  
  ISAN'ANDININY :
  
  Fiadanana be
  	No miandry ahy ao
  	Ary koa ho anao
  	O, ry namako izao.
  
  2. Misy koa lapa soa
  	Tena kanto ery,
  	Volamena avokoa
  	Tsy hiofo doria
  	Vatosoa marobe
  	Mitomaratra koa
  	Handravahana re
  	An'ireo todisoa.
  	Fiadanana be, sns.
  
  3. Misy koa ony soa
  	Mikoriana, madio,
  	Tsy ho ritra tokoa
  	Rahampitso sy anio ;
  	Hazon'aina, odre !
  	Milonjehitra voa
  	Mamy anie sady fy,
  	Eo an-daniny roa.
  	Fiadanana be, sns.
  
  4. Misy koa hira soa
  	Horedonina izao
  	Toy ny feon-dranobe
  	Tsy hitsahatra ao ;
  	Hiderana ny Ray,
  	Ary Jesosy koa ;
  	Ny voavonjy tety
  	Dia hiantsa avokoa.
  	Ny fanahy anie,
  	Namako ô, tadidio,
  	Miantso anao, ka ekeo,
  	Sao hangina 'lay feo.
  
- 
  id: 159
  number: 159
  title: "INDRO TAZAKO ILAY LOVAKO"
  composer: "A. Emiliarison"
  author: "A. Emiliarison"
  key: "Do dia Db 6/4 Moderato"
  theme1: "JESOSY KRISTY"
  theme2: "Ny fiverenany - Ny fanjakany"
  lyrics: |
  
  1. Indro tazako ilay lovako
  	Ka hilaozako ny tany eto.
  	Ireo ota vita, vonoina tsy hita,
  	Tazako Jerosalema ô
  
  ISAN'ANDININY :
  
  Ao tsy misy ny toreo
  	Fa sambatra
  	Ao hiadana ireo 'zay sasatra.
  	Fiderana no ho re manako ao.
  	Tazako Jerosalema ô.
  
  2. Mba rahoviana re
  	Izaho no handre
  	Feon'ireo lokanga volamena?
  	Hitako sahady ireo afaka ady
  	Monina ao Jerosalema ô.
  	Ao tsy misy ny toreo, sns.
  
  3. Jeso ô, avia, ny olonao ety
  	Miandry elabe, ô aza ela
  	Fandrao tsy tafita,
  	Ary tsy hahita fiainana
  	Ao Jerosalema.
  	Ao tsy misy ny toreo, sns.
  	
- 
  id: 160
  number: 160
  title: "EFA NAMPIOMANA AHY SY ANAO KRISTY"
  composer: "A. Emiliarison"
  author: "A. Emiliarison"
  key: "Do dia Db 6/8 "
  theme1: "JESOSY KRISTY"
  theme2: "Ny fiverenany - Ny fanjakany"
  lyrics: |
  
  1. Efa nampiomana ahy sy ianao Kristy :
  	<<Indro avy faingana Aho>>.
  	Hojinjaina sy hotsaraina ny olona ety,
  	<<Indro avy faingana Aho>>.
  	Ary eto amiko ny famaliako,
  	<<Indro avy faingana Aho>>.
  	Hamaliako ireo nanao na tsia ny sitrako,
  	<<Indro avy faingana Aho>>.
  
  ISAN'ANDININY :
  
  <<Indro avy faingana Aho>>.
  	Hamaly ny asanao
  	<<Indro avy faingana Aho>>.
  	Miomàna ianao.
  
  2. Sambatra izay manasa ny akanjony
  	<<Indro avy faingana Aho>>.
  	Lanitra no valin'asa 'zay ho azony,
  	<<Indro avy faingana Aho>>.
  	Vetivety, kely sisa dia hifarana eo
  	<<Indro avy faingana Aho>>.
  	Ka anjely alin-kisa no hanandram-peo,
  	<<Indro avy faingana Aho>>.
  	Indro, sns.
  	
- 
  id: 161
  number: 161
  title: "O! MIVONONA RE IANAO"
  composer: "Josué A. Rabarison"

  id: 356
  number: 356
  title: "APETRAKO AN-TANANAO"
  composer: "J. Rabarijoël"
  author: "J. Rabarijoël"
  key: "Do dia D 4/4 "
  theme1: "FITORIANA NY FILAZANTSARA"
  theme2: "Valin\'ny antso"
  lyrics: |
  

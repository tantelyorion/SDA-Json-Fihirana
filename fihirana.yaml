  	Mba tiako ho fantatra
  	Ary aiza no alehanao
  	Moa fantatrao ve ?
  
  ISAN'ANDININY :
  	Tsy aleo ve atolotra
  	Ilay Mpamonjy tia,
  	Ho entiny, hamboariny
  	Ho tena mendrika,
  	Toy iza handeha irery,
  	Ho be faniasia
  	Tsy hahalia làlana
  	Ka dia ho rendrika ?
  
  2. Toa voninkazo tsara loko

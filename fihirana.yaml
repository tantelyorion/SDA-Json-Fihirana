  id: 476
  number: 476
  title: "AO ZIONA AMBONY"
  composer: "J. H. Rosenkrang"
  author: "Rajoelison"
  key: "Do dia F 12/4 "
  theme1: "FIAINANA KRISTIANA"
  theme2: "Ady sy Fandresena"
  lyrics: |
  
  1. Ao Ziona any ambony
  	Misy re fonenan-tsoa
  	Any tsy mba hisy intsony
  	Ranomaso, sento koa
  
  ISAN'ANDININY :
  	Eny ao an-danitra avo,
  	Eo anatrehan-dray,
  	Feno hira maharavo
  	No hihaonantsika indray.
  
  2. Any misy an'i Jeso,
  	'Lay Mpamonjy tena tia,
  	Ka niaritra ny eso
  	Mba hampody ny mpania.
  	Eny ao an-danitra, sns
  
  3. Ao hifankahita tava
  	Amin-kavana tety,
  	Fa ilay alim-be sisava,
  	He ! mazava ny ary.
  	Eny ao an-danitra, sns
  
  4. Koa mahereza ary,
  	Mijere ny Tomponao
  	Dia hahalavorary
  	Sy handresy ianao.
  	Eny ho sambatra ao ambony
  	Eo anatrehan-dray
  	Tsy hisaraka intsony
  	Eny, ho mandrakizay.
  
  
  
- 
  id: 477
  number: 477
  title: "RAHA NY FIAINANA ETY"
  composer: "D. Razafindramanana"
  author: "D. Razafindramanana"
  key: "Do dia F 3/4 "
  theme1: "FIAINANA KRISTIANA"
  theme2: "Ady sy Fandresena"
  lyrics: |
  
  1. Raha ny fiainana ety
  	No mampitomany anao,
  	Mijere lavitra.
  	Nitomany i Jeso,
  	Nitomany anao.
  	Ory, nisento koa,
  	Nety nijaly re
  	Hamonjena anao.
  	Indro raiso izao.
  
  2. Raha mandreraka ny fo
  	Adin-tsaina lalina,
  	Mijere lavitra.
  	Efa maty Jeso,
  	Maty tao Kalvary ;
  	Nivesatra tokoa,
  	Nety ho sasatra,
  	Fianarana
  	Harahinao
  
  3. Raha manonja mafy re
  	'Zany alon-drano be,
  	Mijere lavitra.
  	Indro avy Jeso,
  	Avy tsy ela re ;
  	Ny fahoriana ve,
  	Ny ranomaso koa,
  	Fijaliam-be,
  	Hofoanany.
  
  4. Raha ny fiainana ety
  	No mampitanondrika anao,
  	Mijere lavitra.
  	Efa akaiky Jeso,
  	Avy handray anao ;
  	Ny fahasasaranao,
  	Hadino faingana ;
  	Fiadanam-be,
  	No hasolony.
  	
  
- 
  id: 478
  number: 478
  title: "\'NJANY MISY ANTSO MAFY"

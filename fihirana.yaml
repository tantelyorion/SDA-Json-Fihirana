  id: 595
  number: 595
  title: "RY ZANAKO MANIA"
  composer: "I. D. Sankey"
  author: "E. Andrianjafitrimo"
  key: "Do dia F 4/4 "
  theme1: "TANORA"
  theme2: "Ho an\'ny tanora"
  lyrics: |
  
  1. RY ZANAKO MANIA
  
  1
  	Ry zanako mania !
  	Henoinao izao.
  	Izaho ba fitia
  	Mangora-po anao ;
  	Ry zanako ! modia
  	Sao maty ianao,
  	Fa be ny bibidia ;
  	Modia re !
  
  2. Ny zavatry ny tany
  	Sao mahasimba anao
  	Harena mety lany
  	Tsy mahavonjy anao :
  	Izaho irery ihany
  	No hiadananao ;
  	Ka mbola manontany :
  	Tsy hody va ?
  
  3. Mamiratra jerena
  	Ny lalan-tsitrapo,
  	Fa ankoso-bolamena,
  	Mamitaka ny fo;
  	Ny sitrapon'ny tena
  	Mamery ny ainao,
  	Ario ka miverena
  	Modia re !
  
  4. Izaho Tompon'aina,
  	Nijaly ho anao,
  	Ka, he, nanolotr'aina,
  	Mba hamonjena anao;
  	Ny rako mitaraina,
  	Modia ianao :
  	Ka aza mba malaina,
  	Modia re !
  
  
  
- 
  id: 596
  number: 596
  title: "INDRO NY TOMPO"
  composer: "A. R. Marnoël"
  author: "A. R. Marnoël"
  key: "Do dia Bb 4/4 Marisika"
  theme1: "TANORA"
  theme2: "Ho an\'ny tanora"
  lyrics: |
  
  1. INDRO NY TOMPO
  
  1
  	Indro ny Tompo fa mitsangana
  	Eo am-baravarana
  	Ka mandona moramora
  	Injao ny feony fa miantso
  	Toa mamaramparana
  	Moa tsy renao ry tanora ?
  
  ISAN'ANDININY :
  	O, vohay (? vohay)
  	Ny fonao (ny fonao)
  	Mba hidiran'ny Mpamonjy
  	Tia anao
  	O, vohay (? vohay)
  	Ka ekeo (ka ekeo)
  	Izy mba ho mponina ao.
  
  2. Indro ny hola-tsatro-tsilo izao
  	Dia eo an-dohany,
  	Namonjena anao mpanota
  	Eny, ny lanitra ho anao izao
  	Dia iantohany,
  	Raha ianao mety mamoha.
  	O ! vohay, ny fonao, sns.
  
  3. Indro ny tanany nahinjitra
  	Ary koa ny lanivoa
  	Voagorobaky ny ota
  	'Zany fitiavany anao
  	Manentanentana ny fo,
  	Hitomany, antsoantso.
  	O ! vohay, ny fonao, sns.
  
  4. Eny, tsy ho ela dia hivadika
  	Ny rasa toy izao
  	Ka ianao indray no handona.
  	Amin'izay dia hanenenanao
  	Ny ratsy 'zay natao,
  	Tsy ho hainao ny hifona.
  	O, vohay (? vohay)
  	Dieny izao (dieny izao)
  	Mba hidiran'ny Mpamonjy
  	Ny fonao.
  	O, vohay (? vohay)
  	Ka ekeo (ka ekeo)
  	Izy mba ho mponina ao.
  	
  
- 
  id: 597
  number: 597
  title: "TANORA O, AVIA"
  composer: "M. Lewis"
  author: "M. Rakotonirainy"
  key: "Do dia A 4/4 "
  theme1: "TANORA"
  theme2: "Ho an\'ny tanora"
  lyrics: |
  
  1. Tanora ô, avia meteza
  	Hirotsaka hanafika,
  	Ka asandrato ny faneva ;
  	Samia re marisika !
  
  ISAN'ANDININY :
  	Novonjena tamin'ota
  	Mba hanompo ianao.
  	Koa ampio ireo mpanota
  	Vionjeo, ndrao dia very izao.
  
  2. O ! miverena ry mpanota
  	Izay no hafatra entinao.
  	Jesosy 'Lay nivesatra ota,
  	Ampanekeo 'reo namanao.
  	Novonjena tamin'ota, sns.
  
  3. Ny valisoa dia miandry
  	Ny mpiasa mahatoky re
  	Izay tsy mba tafandrimandry
  	Raha mbola misy very e !
  	Novonjena tamin'ota, sns.
  	
  
- 
  id: 598
  number: 598
  title: "TANORA VAO MIVELATRA"
  composer: "Ratovondrahety"
  author: "Ratovondrahety"
  key: "Do dia C 4/4 Allegreto"
  theme1: "TANORA"
  theme2: "Ho an\'ny tanora"
  lyrics: |
  
  1. Tanora vao mivelatra
  	Ho voninkazo manitra
  	Masoandron'aina mamiratra
  	No hery isandratany
  	He ! tsara re, he, sambatra !
  
  2. Tanora misy bika soa,
  	Mahery, hendry sy mahay ;
  	Mibanjina sy mifantoka
  	Aminareo ny masonay,
  	Mirary soa, mivavaka.
  
  3. Tanora misy tahotra
  	An'Ilay Andriamanitra
  	Nanao tempoly ny tenanao
  	Hitoeran'ny Fanahiny
  	Tandremonao, ambenonao.
  
  4. Tanora ô, andraikitrao
  	Ny fiangonan'i Kristy ;
  	Ataovy asa manokana,
  	Taomy ireo sakaizanao
  	Hiditra ao, honina ao !
  	
  
- 
  id: 599
  number: 599
  title: "RAISO JESO HO LAPANAO"
  composer: "J. Harker"
  author: "Rajoelison"
  key: "Do dia Ab 4/4 "
  theme1: "TANORA"
  theme2: "Ho an\'ny tanora"
  lyrics: |
  
  1. Raiso Jeso ho lapanao ny foko,
  	Iriko re ny fiadananao.
  	Ho entiko 'lay tanambokovoko.
  	Mba hanahafako 'lay endrikao.
  
  2. Raiso, Jeso ny androko rehetra
  	Foiko avokoa mba hanajana Anao.
  	Ho ampoky ny soa tsy misy fetra
  	Ho fitahiana ny olonao.
  
  3. Raiso, Jeso, nu tanako malemy.
  	Fihono mafy eo an-tananao ;
  	Aza afoy raha sehatry ny memy,
  	Fandrao ho kivy ka handà Anao.
  
  4. Raiso, Jeso ny fahatanorako,
  	O ! hamasino ho Anao anio ;
  	Levony avokoa ny fahotako
  	Dia raisonao ny fo ankehitrio.
  
- 
  id: 600
  number: 600
  title: "IZAO NO ANDRON\'NY HATANORAKO"
  composer: "J. Randrianarison"
  author: "J. Randrianarison"
  key: "Do dia E 12/8 "
  theme1: "TANORA"
  theme2: "Ho an\'ny tanora"
  lyrics: |
  
  1. 'Zao no andron'ny hatanorako
  	Hanatonako Anao, ry Mpamonjy ;
  	Izay hany mba fanantenako
  	Itokisako handraisana vonjy.
  
  ISAN'ANDININY :
  	Ka ny voady 'zay ataoko anio.
  	Tanteraho ary koa mba tahio.
  	Hamasinono ho mendrika Anao
  	Ny toetrako hatramin'izao.
  
  2. 'Zao no andron'ny hatanorako
  	Handreseko ny fakam-panahy
  	Ka ny toetra tsy maintsy ialako
  	Dia ireo ratsy 'zay mahazatra ahy.
  	Ka ny voady, sns.
  
  3. 'Zao no andron'ny hatanorako
  	Hitoriako Anao, ry Jesosy,
  	Ka ny toetrako no hilazako
  	Ny finoako Anao tsy voahosy.
  	Ka ny voady, sns.
  	
  
- 
  id: 601
  number: 601
  title: "MIASA RE IZAO"
  composer: "W. H. Doane"
  author: "F. Ramanantsialonina"
  key: "Do dia F 4/4 Marisika"
  theme1: "TANORA"
  theme2: "Ho an\'ny tanora"
  lyrics: |
  
  1. Miasà re izao,
  	Jeso no momba anao
  	Mandra-pahatonga anao
  	Anatrehan'ny Ray.
  	Aza ketraka ianao,
  	Tontosao ny atao,
  	Milofosa tokoa
  	Mba hamory ny voa.
  
  ISAN'ANDININY
  
  Miaingà, miasà
  	Mijoroa eo aloha
  	Ô ! vitao (ô ! vitao)
  	Ny atao (ny atao)
  	Fa homba anao ny Tomposoa.
  
  2. He! tsarovy tokoa
  	miaramiula ianao,
  	Ny hijoro, hanavao,
  	No ilàna anao.
  	Dia tafio avokoa
  	Ny fiadiana mahasoa,
  	Haharesy ianao
  	Sy hahery izao.
  	Miaingà, miasà, sns
  
  3. Ho tanora madio,
  	No voady hatao.
  	Miezaha re anio
  	Mijoroa hanavao.
  	Ny fiainana soa
  	Idealy tokoa.
  	Mahereza hatrizao,
  	Aza kivy ianao.
  	Miaingà, miasà, sns
  
  
  	
  
- 
  id: 602
  number: 602
  title: "INONA NO TIANAO JESO"
  composer: "Mél. TIL102"
  author: "Rajoelison"
  key: "Do dia Bb 3/4 "
  theme1: "TANORA"
  theme2: "Ho an\'ny tanora"
  lyrics: |
  
  1. Inona no tianao, Jeso,
  	Mba hatolotro Anao ?
  	'Zay nitondra latsa, eso,
  	Noho ny fitiavanao.
  	Moa vola sy harena
  	Na talenta, hery koa,
  	Moa azonaoekena ?
  	Sa tadiavinao ny fo ?
  
  2. Inona no tianao, Tompo,
  	Mba ho fiderana Anao ?
  	Dia Ianao izay nanompo
  	Na dia Zanaka izao.
  	Moa ny hira tsara indrindra
  	'Zay miredona tokoa,
  	Tena kanto sy mirindra,
  	Sa tadiavinao ny fo ?
  
  3. Fahatanorana soa
  	Moa ampy ho Anao ?
  	Noho ny avotra analoa
  	Tany Kalvary izao.
  	'Zay ananako rehetra,
  	Andro sy fotoana koa,
  	Foiko re tsy misy fetra,
  	Sa tadiavinao ny fo ?
  
  4. Indro ary, Jeso tia,
  	Fa hafoiko hatrizao,
  	Tony foko izay mania,
  	Raha tadiavinao.
  	O ! amboary sy diovy
  	Ho tempoly, lapa soa,
  	Hamasino sy arovy
  	Fa Anao tokoa, tokoa !
  	
  
- 
  id: 603
  number: 603
  title: "RY TANORA MISEHOA"
  composer: "Raobijaona"
  author: "Raobijaona"
  key: "Do dia D 4/4 "
  theme1: "TANORA"
  theme2: "Ho an\'ny tanora"
  lyrics: |
  
  1. Ry tanora misehoa,
  	Ambarao ny Tomponao.
  	Alatsaho ao am-po,
  	Ny fitiavany anao.
  
  2. Aza very hevitra
  	Eo am-pitoerana.
  	Mitsangàna, mihazavà.
  	Ianao no andrasana.
  
  3. Hararaoty re izao
  	Ny fotoana omena anao.
  	Kely sisa ka vonjeo
  	'Reo fanahy mitoreo.
  
  4. Hoy Jesosy raha tety ;
  	Mandehana mitoria.
  	Fa Izy hanome hery
  	Ho anao, ka matokia.
  	
  
- 
  id: 604
  number: 604
  title: "VAO TANORA AHO IZAO"
  composer: "J. H. Fillmore"
  author: "F. Ramanantsialonina"
  key: "Do dia D 4/4 "
  theme1: "TANORA"
  theme2: "Ho an\'ny tanora"
  lyrics: |
  
  1. Vao tanora aho izao
  	Ka te ho mpiasanao,
  	Ry Jesosy, Zoky tia.
  	Raiso na mpaniasia,
  	Kely hery, tsy mahay,
  	Omeo tky sy ombay.
  	Jeso Kristy, raisonao aho
  	Hiasa ho Anao.
  
  2. Ny Baiboly jiroko
  	Ho fnilon-diako.
  	Hampandroso ahy izao
  	Mba ho voninahitrao,
  	Diovinao ny fiainako,
  	Ka hampio handresy koa
  	Jeso, Kristy, raisonao aho
  	Hiasa ho Anao.
  
  3. Ampianaro mba ho tia
  	Ireo ondry izay mania.
  	Ry Fanahy Masina ô
  	Raisinao ny tanako,
  	Sakambino aho izao
  	Mba hijoro ho Anao.
  	Kristy ô Mpamonjiko
  	Izay no faniriako
  
- 
  id: 605
  number: 605
  title: "NY HATANORANA DIA TOA VONINKAZO"
  composer: "Rev. A. H. Ackey"
  author: "Rajoelison"
  key: "Do dia Eb 6/4 "
  theme1: "TANORA"
  theme2: "Ho an\'ny tanora"
  lyrics: |
  
  1. Ny hatanorana dia toa voninkazo.
  	Raozy mivelatra, manitra ery.
  	Nefa ho vasoka sady halazo,
  	Fa ny maharitra dia ny ary.
  
  ISAN'ANDININY :
  	Eo anilanao no irirko 'zao
  	Akaiky Anao Jeso Mpamonjiko
  	Eo anilanao, eto ka hatrao.
  	Anilanao, ry hany Tokiko.
  
  2. Ny fifaliana dia, indro, mandalo
  	Tsy misy mantsy mateza ety
  	Maro mpisopatra, be fahavalo:
  	Rahoviana re no ho tody ary.
  	Eo anilanao, sns.
  
  3. Ny faniriako, ry Mpamonjy Tsara,
  	Hanompo Anao, raha mbola ety,
  	Rahatrizay dia handray 'lay anjara
  	'Zay voatahiry an-danitra ary.
  	Eo anilanao, sns.
  
  4. Ny hahita Anao no iriko 'zao,
  	Hahita Anao eo anilan'ny Ray
  	Eny,n hahita Anao dieny ety izao;
  	INdrindra ary, sy ho mandrakizay !
  	Eo anilanao, sns.
  	
  
- 
  id: 606
  number: 606
  title: "MANDROSOA IZAO"
  composer: "P. P. Bilhorn"
  author: "F. Ramanantsialonina"
  key: "Do dia C 4/4 "
  theme1: "TANORA"
  theme2: "Ho an\'ny tanora"
  lyrics: |
  
  1. Mandrosoa izao, ry miaramila soa
  	Fa Jesosy no Mpitarika eo aloha.
  	Atsangano izao ilay fanilonao
  	Dia hazavao izao rehetra izao.
  
  ISAN'ANDININY :
  	Ry tanora ô, mba hazavao
  	(Ry tanora ô, hazavaonao)
  	Ny nosinao (nosinao)
  	Feno haizina e ! ('zao tontolo izao)
  	Ka mba vitao ny adidinao.
  
  2. Nofidiana ianao hitondra soa,
  	Dia ny famonjena lehibe tokoa.
  	Ambarao izao 'lay Fahazavana re,
  	Dia Jesosy Masoandro lehibe.
  	 Ry tanora ô, sns.
  
  3. Izao tontolo izao dia hifarana,
  	Ka ny haizim-pito ho tarangana.
  	Koa milofosa hamonjy namana,
  	'Lay Kanana re iry fa tazana?
  	 Ry tanora ô, sns.
  	
  
- 
  id: 607
  number: 607
  title: "RY TANORA VONINKAZO"
  composer: "J. J. M. Biermann"
  author: "Ravonjizafy"
  key: "Do dia Db 3/4 "
  theme1: "TANORA"
  theme2: "Ho an\'ny tanora"
  lyrics: |
  
  1. Ry tanora voninkazo,
  	Feno hatsaran-tarehy,
  	Faly sady ravoravo,
  	Feno tsiky, mihomehy,
  	Indro Ilay Mpanao anao,
  	Miantso hoe avia ! avia !
  	Anaka atolory 'zao
  	Ny fonao mpaniasia.
  
  2. Ny mpamonjy no miantso
  	Miandry anao hiara-dia,
  	Manana ny teny kanto,
  	Tsy ny eto fa ny ary.
  	<<Miomàna dieny izao
  	Hiaraka amin'i Jeso,
  	Omeo azy ny fonao,
  	Dia ho sambatra doria>>.
  
  3. Ry tanora ô ! meteza,
  	Iza no andrasanao ?
  	Moa ve haharitra ela ?
  	Nefa ny ora manindao,
  	'Njay ny feo manao hoe :
  	<<Moa tia Ahy va ianao ?
  	Jeso Tompo no miandry
  	Atolory ny fonao>>.
  	
  
- 
  id: 608
  number: 608
  title: "FAHINY FONY AHO MBOLA ZAZA"
  composer: "Ira F. Stamphill - Mamy J. Ratsirison"
  author: "A. R. Marnoël"
  key: "Do dia F 4/4 "
  theme1: "TANORA"
  theme2: "Antso"
  lyrics: |
  
  1. Fahiny fony aho mbola zaza
  	Hariva vao mitsaha-milalao.
  	Nanaraka ny làla-mahazatra
  	Tsy ela dia ny antso no injao :
  	<<Modia fa hisakafo izao
  	Hariva ny andro.
  	Modia fa antsoin'ny renina.>>
  	Dia nody ihany aho.
  
  2. Indray andro tan-tsisin'ny fandriany
  	Raha niara-nandohalika izahay,
  	Dia toa nandre feo miantso koa i Neny
  	Feo to miantso avy amin'ny Ray :
  	<<Modia fa hisakafo izao
  	Hariva ny andro.
  	Modia fa antsoin'ny renina.>>
  	Dia nody ihany aho.
  
  3. Misy sakafo voavoatra sy tsara
  	Izay miandry ahy sy anao.
  	Ny Tompo Jesosy no manambara
  	Fa hiara-misakafo aminao.
  	Modia fa ora mety izao
  	Hariva ny andro
  	Modia antsoin'ny Tomponao
  	Raiso ny akanjo.
  	
  
- 
  id: 609
  number: 609
  title: "O! RY MPINO"
  composer: "E. Rakotonirina"
  author: "E. Rakotonirina"
  key: "Do dia C 4/4 Mitsatotsatoka sy Maleaka"
  theme1: "TANORA"
  theme2: "Antso"
  lyrics: |
  
  1. O ! ry mpino izay nandray ny teny
  	Miantso anao anio ny Tomponao.
  	Miaingà re izao hilaza ireny
  	Ho faminjena ireo namanao (Henoy)
  
  ISAN'ANDININY :
  	Miantso anao izao Kristy Tompo
  	Hovalinao ve, mamalia.
  	O ! ekeo
  	Raha toa mpanompo vonona
  	Handova fiainana ary (ary)
  	'Zay omen'i Jeso tia (Jeso tia).
  
  2. O ! ry mpino, moa henonao
  	'Lay antso feno fitiavana ?
  	Koa faingàna mitory dieny izao
  	Fa ity tany anie horavàna.
  	Miantso anao, sns.
  
  3. O ! ry mpino, mitsangàna izao,
  	Hoy ny feon'Ilay Jeso Mpamonjy tia.
  	Mahereza aingao ilay fanilonao
  	Hampisinda ny haizina ety.
  	Miantso anao, sns.
  	
  
- 
  id: 610
  number: 610
  title: "RY TANORA VONINKAZO"
  composer: "Andriamboavonjiarinaivo"
  author: "Andriamboavonjiarinaivo"
  key: "Do dia D 4/4 Mavitrika"
  theme1: "TANORA"
  theme2: "Antso"
  lyrics: |
  
  1. Ry tanora voninkazo,
  	Mavitrika sy sahy
  	Tsy manana ahiahy,
  	Moa mba fantatrao
  	Fa zava-poana avokoa,
  	'Zao rehetra ary izao.
  	(Tanora ô).
  	Tsy haharitra ny tany
  	Fa toy ny voninkazo
  	Ho simba sy halazo.
  	Andrandrao ny tanjona ambony
  	Dieny ety
  	Ilay Kanana tsara ery
  	(Kanana ery)
  
  ISAN'ANDININY :
  	Hazavao ny taninao
  	(Hazavao taninao)
  	Andeha torio ny teny soa
  	('Ndeha torio teny soa)
  	Zotom-po sy hery koa
  	(Zotom-po hery koa)
  	No mendrika an'i Jeso tia
  	(An'i Jeso tia anao)
  
  2. Ry tanora voninkazo,
  	Mavitrika sy sahy
  	Tsy manana ahiahy,
  	'Ndeha hanatona
  	'Zay nomena anao ety

  	Milofosa fatratra,
  	Aza ketraka,
  	<< Miadia ady tsaran'ny finoana >>
  	Ry miaramila ! sns.
  
  5. Kristy Kapiteny tapitra ohatra
  	Izy no mpiaro ny mpanafika ;
  	Miankina aminy
  	Mafy ianao,
  	Ka aza mba ny tenanao
  	No itokianao :
  	Ry miaramila ! sns.
  

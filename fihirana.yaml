  	'Zao dia te hody aho.
  	Mitsotra mba hisakambina re,
  	'Zao dia te hody aho.
  	'Nty tamy aho, Raiko malala,
  	Raiso ny tanako.
  	'Nty tamy aho, Raiko malala,
  	Raiso ny zanakao.
  	
  

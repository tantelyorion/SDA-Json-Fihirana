  5. Raiso ny fanahiko
  	Diovy ho tempolinao ;
  	Raiso aho Tompo ô !
  	Ho Anao mihintsy 'zao.
  
  6. Ho Anao manokana,
  	Ry Mpamonjy, Tompo soa
  	Ho Anao dia Anao tokoa,

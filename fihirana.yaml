  id: 693
  number: 693
  title: "JESOSY IRERY IHANY"
  composer: "D. Rasolonjatovo"
  author: "D. Rasolonjatovo"
  key: "Do dia Bb 3/4 "
  theme1: "OLON-TOKANA - OLON-DROA - RODOBE"
  theme2: null
  lyrics: |
  
  1. Jesosy irery ihany
  No zavatra rehetra
  Na ny laza, na harena
  Dia ho simba sy ho ritra
  (Dia mora simba sady mora ritra)
  Izy no tompon'ny fahefana
  Tsy misy fetra !
  Soa maro sesehena izay
  (Tena) maharitra
  Miara-miasa, hahasoa
  Ny zava-drehetra
  (Ny zavatra rehetra)
  Ka na faly na tomany
  Jeso no banjino hatrany.
  Raha mitombo ny harena,
  Finaritra,
  (Sambatra, finaritra)
  Jesosy irery no zavatra rehetra !
  Raha sendra fitsapana
  Sy ady sarotra
  (Tojo ady sarotra)
  Jesosy irery no zavatra rehetra.
  
  2
  Jesosy irery ihany
  No zavatra rehetra
  Raha mahatsiaro toa nafoy
  Jeso Kristy no antsoy !
  Fa Izy hitantana, hiara-dia,
  Hiara-mitoetra,
  Fa Sakaiza,
  Tsy manary na aiza na aiza.
  Miara-miasa hahasoa
  Ny zava-drehetra
  Raha toa ka manirery,
  Ka izao rehetra izao
  (Mandao anao)
  Mihataka sy tsy mijery,
  Manadino, mandao !
  Jesosy irery no zavatra rehetra.
  Raha misondrotra ny laza
  Sy voninahitra
  (Sy ny voninahitra)
  Jesosy irery no zavatra rehetra.
  
  3Jesosy irery ihany
  No zavatra rehetra
  Fongana ve ny harena ?
  Jesosy ihany jerena !
  Ny havana maneso, mandatsa
  Sady tsy mitsetra,
  Fa jesosy dia onena,
  Ny olo-mahantra.
  Miara-miasa hahasoa
  Ny zava-drehetra
  (Zavatra rehetra)
  Raha manjombona ny andro,
  Jeosy no masoandro
  Raha mamiratra mazava,
  Ny lanitra,
  Jesosy irery no zavatra rehetra.
  Raha mikotroka mamely,
  Ny oram-baratra
  (Mafy ny oram-baratra)
  Jesosy irery no zavatra rehetra.
  
- 

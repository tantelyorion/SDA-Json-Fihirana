  	He ! ravo ny fanahiko
  	Fa novidin'ny ranao soa.
  
  ISAN'ANDININY :
  	Jesosy ô, 'zaho ho Anao,
  	Ianao ahy hatrizao,
  	Fa ivelomako tokoa

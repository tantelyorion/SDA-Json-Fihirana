  id: 10
  number: 10
  title: "JEHOVAH NO MPIANDRY AHY"
  composer: "Jessie Seymour Irvine - Mamy J. Ratsirison"
  author: "Jeanne Ratsirison"
  key: "Do dia F 3/4 "
  theme1: "SALAMO"
  theme2: null
  lyrics: |
  
  1. Jehovah no miandry ahy,
  	Mpiahy ny fanahy.
  	Tsy misy atahorako
  	Fa izy aroko.
  
  2. Jehovah no Mpitarika ahy
  	Sady mpitondra ahy
  	Amoron-dranon'aina re,
  	Miala sasatra e.
  
  3. Jehovah no Mpitantana ahy
  	Tsy misy mampanahy
  	Na dia mamaky ny aloky
  	Ny fahafatesana !
  
  4. Jehovah no Mpiaro ahy
  	Mamelatra ho ahy
  	Latabatra eo imason'
  	Ny fahavaloko.
  
  5. Jehovah no Mpanjakako
  	Sady be indrafo.
  	Hitoetra an-kianjanao doria
  	No faniriako ety.
  
- 
  id: 11
  number: 11
  title: "FALY AHO"
  composer: "J. P. Randriamahefa"
  author: "J. P. Randriamahefa"
  key: "Do dia Bb 4/4 Kingakinga"
  theme1: "SALAMO"
  theme2: null
  lyrics: |
  
  1. Faly aho,faly aho
  	Raha hoy izireo tamiko;
  	Andeha isika ho any,
  	Any an-tranon'i Jehovah.
  	Ny tongotray efa mijoro
  	Ao anatin'ny vavahadinao,
  	Ry Jerosalema ô!
  	Dia ianao ry Jerosalema
  	Izay efa vita.
  	Tahaka ny tanàna efa voalamina,
  	Efa voalamina tsara.
  	Any no hiakaran'ny firenena,
  	Dia ireo firenen'i Jehovah,
  	Mba hisaotra, mba hisaotra
  	Ny anaran'i Jehovah.
  
- 
  id: 12
  number: 12
  title: "O! MAMINDRA FO AMIKO"
  composer: "A. Emiliarison"
  author: "A. Emiliarison"
  key: "Do dia Eb 3/4 "
  theme1: "SALAMO"
  theme2: null
  lyrics: |
  
  1. O! mamindrà,fo amiko
  	Mba mamindrà fo Ray ô!
  	Ianao no fialofan'ny fanahiko
  	ry Ray ô!
  
  Réf
  
  Amin'ny elatrao Ray ô!
  	No hialofako
  	Mandra-pahalasan'ny loza re
  	Jehovah Andriamanitra ô!
  	Amen
  
  2. Fa hitaraina amin'ny Avo 
  	Indrindra aho,
  	Dia amin'Andriamanitra
  	Mahatanteraka ahy.
  	Amin'ny elatrao Ray ô, sns
  
  3. Anjely no hirahinao Jeso,
  	hamonjy ahy,
  	Raha toa ka misafoaka
  	ireo manenjika ahy.
  	Amin'ny elatrao Ray ô, sns
  	
- 
  id: 13
  number: 13
  title: "JESO NO MPIANDRIKO"
  composer: "D. Riemens"
  author: "(Tsy fantatra)"
  key: "Do dia Ab 4/4 "
  theme1: "SALAMO"
  theme2: null
  lyrics: |
  
  1. Jeso no Mpiandriko, (Mpiandriko)
  	Tsy mba orin'javatra aho
  	Ahi-maitso mavana
  	No andriako isan'andro,
  	Ranon'aina tsy ho ritra
  	isotroako izao
  	Fitariha-mahatoky
  	no ianteherako
  	Fa ny tehim-pamonjeny
  	Sy ny fahamarinany
  	No faneva 'zay jereko
  	Ka manala-tahotra.
  	FEON'OLON-TOKANA
  	Na dia mamaky 'lay lohasaha 
  	maizina aho
  	Dia tsy hangovitra akory
  	Ny tehinao Tompo no heriko,
  	(Heriko), Tokiko, fiononako,
  	Na dia mafy aza re, (aza re)
  	ny tsora-kazo
  	Dia tsy ho ketraka aho.
  	Ny tananao, Tompo,
  	No raisiko, (raisiko)
  	Amikirako mafy.
  
  2. He, ny zava-tsoanao
  	 amokisanao ny foko
  	Diloilo manitra no ahosotrao
  	ny loa
  	Ka ny fahavalo koa aza indro
  	fa mangaihay
  	Raha mahita ilay kapoakan'ny 
  	fahasoavanao,
  	Eny hatrizao, Jesosy
  	Ka hatrany aminao,
  	Famindrampo tsy ho lany,
  	Homba ahy mandrakizay
  	Na dia mamaky, sns.
  
- 
  id: 14
  number: 14
  title: "RY TOMPO Ô"
  composer: "A. Raoeliarijaona"
  author: "A. Raoeliarijaona"
  key: "Do dia D 2/4 "
  theme1: "SALAMO"
  theme2: null
  lyrics: |
  
  1. Ry Tompo ô, Andriamanitro Ianao,
  	mamindrà fo amiko
  	Sitrano aho,hatanjaho ny ao 
  	anatiko ao.
  	Mangovitra aho, mihozohozo koa,
  	Ka mila ny vonjy avy Aminao,
  	Ry Tompo ô, Andriamanitro Ianao,
  	Mamindrà fo aminko,
  
  2. O! miverena Ianao ka afaho,
  	Tompo ny fanahiko.
  	Vonjeo aho, Tompo ô,
  	noho ny fitiavanao.
  	Ny maty tsy hahatsiaro Anao,
  	Ireo tsy afaka hidera Anao.
  	Ry Tompo ô, Andriamanitro Ianao,
  	mamindrà fo amiko
  
- 
  id: 15
  number: 15
  title: "AVIA MIONDREHA"
  composer: "R. Whately (FFPM006)"
  author: "Ramahandry"
  key: "Do dia D 4/4 "
  theme1: "ANDRIAMANITRA"
  theme2: "Mpamorona"
  lyrics: |
  
  1. Avia, miondreha,
  	Ry vazan-tany ô,
  	Fa lehibe Jehovah,
  	Sy masina tokoa;
  	Miankohofa tsara
  	Manatona Azy 'zao;
  	Haneho fanajana
  	Ilay Mpanao anao.
  
  2. Andriananahary !
  	Manaiky izahay
  	Fa aminao ny hery
  	Tsy hay toherina,
  	Tsy misy maharara
  	Ny tianao hatao,
  	Fa Ianao Mpitondra
  	Izao rehetra izao.
  
  3. Re any lavitra any
  	Izao ny herinao,
  	Ka ism-bazan-tany
  	Hiondrika aminao;
  	Mpanjaka sy Mpitsara
  	Mahery Ianao;
  	Miadana ny tany
  	Miankina aminao.
  
- 
  id: 16
  number: 16
  title: "ENDREY AMBONY LOATRA"
  composer: "I. D. Sankey"
  author: "Rajoelison"
  key: "Do dia Eb 6/4 "
  theme1: "ANDRIAMANITRA"
  theme2: "Mpamorona"
  lyrics: |
  
  1. Endrey ambony loatra,
  	Tsy tratry ny sainay,
  	He avo tafahoatra
  	Ny herinao, ry Ray
  	Ny lanitra sy tany,
  	'Zay asan-tananao,
  	Mitory lavitra any
  	Ny voninahitrao.
  
  2. Tsy takatra mihintsy
  	'Zay vitanao ry Ray;
  	Ianao di tsy nitsisty
  	Mba hamonjena anay.
  	Fa indro ilay havoana
  	Mitafy haizim-be,
  	Mitory fisoloana
  	Sy famelana re.
  
  3. Ry Tompom-pamonjena,
  	He menatra izahay
  	Fa ratsy nefa ekena
  	Ho zanaky ny Ray.
  	Atolotray tontolo
  	Fa tadiavinao
  	Ny fonay, ry Mpisolo,
  	Satria navotanao
  
- 
  id: 17
  number: 17
  title: "NY HASOAVANAO"
  composer: "Carey"
  author: "F. Ramanantsialonina"
  key: "Do dia Ab 3/4 "
  theme1: "ANDRIAMANITRA"
  theme2: "Mpamorona"
  lyrics: |
  
  1. Ny hasoavanao
  	Sy ny fitiavanao
  	Jehovah ô,
  	:,:Narotsaka ho anay
  	Mba hifalianay
  	Ka saotra atolotray
  	Mandrakiza.:,:
  
  2. Ianao Mpamorona,
  	'zahay foronina
  	Hidera Anao.
  	:,:Fa lehibe tokoa
  	Ny voninahitrao,
  	Ny saotra sy ny haja koa
  	Ho Anao tokoa.:,:
  
  3. Hanoa Anao 'zahay,
  	Ho irakao indray,
  	Ry Tomponay
  	:,Ka mba tahionao
  	Sy hamasinonao,
  	Ho tena olom-baovao
  	Hiasa ho Anao
  	
- 
  id: 18
  number: 18
  title: "MISAORA AN\'I ZANAHARY"
  composer: "L.M.S."
  author: "Maintimolaly"
  key: "Do dia Bb 4/4 "
  theme1: "ANDRIAMANITRA"
  theme2: "Mpamorona"
  lyrics: |
  
  1. Misaora an'i Zanahary,
  	'Zao olona tontolo izao
  	Dia mankalazà Azy,
  	Fa anton'izao rehetra izao.
  
  2. Izay zavatra nomeny
  	Mahafaly, mahasoa,
  	Toy ny andro fararano,
  	Toy ny andro mipoaka.
  
  3. Dia ampitomboy ny sainay
  	Hahalala ny teninao,
  	Hahafantatra ny marina
  	Izay sitraky ny fonao.
  	
- 
  id: 19
  number: 19
  title: "TSARA, MAHAFINARITRA"
  composer: "Royal wOak - Mamy J. Ratsirison"
  author: "Jeanne Ratsirison"
  key: "Do dia Ab 4/4 "
  theme1: "ANDRIAMANITRA"
  theme2: "Mpamorona"
  lyrics: |
  
  
  ISAN'ANDININY
  
  Tsara, mahafinaritra
  	Ny zava-boarinao (voarinao).
  	Endrey izany lanitra
  	Maneho ny Tomponay (Tomponay).
  	1. Ireo voninkazo soa
  	Tena fatratra koa
  	Ka mitory sy manambara koa
  	Ny voninahitrao.
  	Tsara, sns.
  
  2. Ireo tendrombohitra,
  	Ny lohasaha koa,
  	Ny volana, ny kintana,
  	Dia voninahitrao.
  	Tsara, sns.
  
  3. He ny Masoandro koa
  	'Zay mamiratra soa,
  	Ny ranomasim-be ary,
  	Dia voninahitrao
  	Tsara, sns.
  
  4. He ny ali-maizim-be
  	Sy fahazavana e!
  	Mitory sy milaza re
  	Ny voninahitrao
  	Tsara, sns.
  	
- 
  id: 20
  number: 20
  title: "ANDRIAMANITRA FITIAVANA"
  composer: "Josué A. Rabarison"
  author: "Josué A. Rabarison"
  key: "Do dia Eb 4/4 Maredona"
  theme1: "ANDRIAMANITRA"
  theme2: "Mpamorona"
  lyrics: |
  
  1. Andriamanitra fitiavana,
  	'Zay Mpamorona mahery tokoa
  	Manome anao (ireo), 
  	ireo zava-tsoa.
  	Dia sakafo ampy sy fitsaharana
  

  	Manintona, mamoaka
  	Fofo-manitra tokoa.
  	Fa rahariva dia halazo,
  	Ary fantatra
  	Ho potika, hihintsana
  	'Lay voninkazo soa.
  	Tsy aleo ve, sns.
  
  3. O ! inona no tombotsoa
  	Mahazo izao sy izao
  	Kanefa dia ho potika
  	Ny hatanoranao.
  	Dieny mbola misy
  	Ny fotoana iainanao
  	Anio, meteza hanavao
  	Ireo lasanao.
  	Tsy aleo ve, sns.
  	
  

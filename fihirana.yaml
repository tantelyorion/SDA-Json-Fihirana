  key: "Do dia Bb 6/4 "
  theme1: "FANAHY MASINA"
  theme2: null
  lyrics: |
  
  1. Jesosy ô, arotsahy,
  	Hivatravatra tokoa,
  	Ho aminay ny Fanahy
  	'Lay ranonorana soa.
  
  ISAN'ANDININY :
  
  Ry andon'aina (andon'aina)
  	Tondrahy izahay
  	Fa tena karakaina,
  	Velombelomy indray.
  	Amen, amen.
  

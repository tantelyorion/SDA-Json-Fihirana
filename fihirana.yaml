  	mamonjy ny mania.
  
  3. Ny masoko atodiho
  	Hibanjina Anao
  	Ny tanako tariho
  	Hanao ny asanao.
  
  4. Ny sofiko halady
  	Hihaino ny hafatrao
  	Ny tongotro ho tomady,
  	Hanaraka Anao.
  
  5. Ny vavako ho kinga
  	Hanambara Anao.
  	Baiboly no hapinga
  	Hiaro ny didinao.
  
  6. Ny foko syny aiko
  	Omeko anjakao
  	Ny tenako, ny saiko
  	Diovy ho lapanao.
  
- 

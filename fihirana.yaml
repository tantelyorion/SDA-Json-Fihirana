  5. Akaikinao no hahitana,
  	Eny, eo akaikinao,
  	Ny tavanao 'zay fahazavana
  	Sy tokiko izao.
  
  6. Akaikinao tsy ho ela intsony
  	Ho tena akaikinao,
  	Rehefa tonga any ambony
  	Eo antrehanao.
  	
  

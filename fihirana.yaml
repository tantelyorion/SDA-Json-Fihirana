  id: 382
  number: 382
  title: "RY VATOLAMPY MANDRAKIZAY"
  composer: "Fr. Gay"
  author: "A. R. Marnoël"
  key: "Do dia Eb 3/4 "
  theme1: "FIAINANA KRISTIANA"
  theme2: "Fibebahana - Fiovam-po"
  lyrics: |
  
  1. Ry Vatolampy mandrakizay,

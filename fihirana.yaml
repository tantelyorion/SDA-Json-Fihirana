  lyrics: |
  
  1. Ry Jeso, Zoky be fitia !
  	Avia, mitantàna,
  	Fandrao 'zahay maniasia
  	Avilin'i Satana.
  
  ISAN'ANDININY :
  	Ry Jeso ô ! tahio 'zahay
  	Fa mbola kely saina
  	He ! tsy mba hendry, tsy mahaymahay,
  	Ka mora ambakaina.
  
  2. Maniry izahay, Jeso !

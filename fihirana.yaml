- 
  id: 172
  number: 172
  title: "O RY FANAHIN\'NY RAINAY !"
  composer: "W. H. Gladstone"
  author: "A. R. Marnoël"
  key: "Do dia D 3/4 Malefaka sady miadana"
  theme1: "FANAHY MASINA"
  theme2: null
  lyrics: |
  
  1. O, ry Fanahin'ny Rainay
  	Hevero ny taranakay
  	'Zay very fa manaraka
  	Ny rivotra sy aloka.
  
  2. Omeo fiteny izahay
  	Sy feo mazava, fo mahay
  	Miantso sy mitia tokoa,
  	Hitory koa ny teny soa.
  
  3. Ny haizim-be mba hazavao,
  	Ny fonay koa ovay ho vao.
  	Fankahalana, vono koa,
  	Soloy fitia sy aina moa.
  
  4. Ny hazo fijaliana anie
  	Hamirapiratra avobe,
  	Hanintona ny Nosinay
  	Hiankohokany Nosinay
  	Hiankohoka eo amin'ny Ray.
  
- 
  id: 173
  number: 173
  title: "VALIO NY HATAKAY"
  composer: "Haydn"
  author: "F. Ramanantsialonina"
  key: "Do dia A 6/4 Malefaka"
  theme1: "FANAHY MASINA"
  theme2: null
  lyrics: |
  
  1. Valio ny hatakay re,
  	Fanahy Masina ô
  	'Zay hery sady tokinay,
  	Sy fitahiana.
  	Mamelona fanahy.
  	Manala ahiahy.
  	Fohazy, tsilovy,
  	Arovinao 'zahay.
  
  2. Raha misy halemena
  	Nitondra fietrena,
  	Fanahy ô, midina
  	Hitondra aim-baovao,
  	Hanangana ny rava
  	Ity mpanomponao.
  	Ho tonga irakao re,
  	Fanahy ! avotinao.
  
  3. Reseo ny hevitray 'zao,
  	Hanoa Anao indray.
  	Fa kely tsy mahomby,
  	Ampionao 'zahay.
  	Izany fahotana
  	'Zay manameloka
  	Kosehonao hiala
  	Fa aminay ny antranao.
  	
- 
  id: 174
  number: 174
  title: "MITSAOKA ANAO \'ZAHAY"
  composer: "Haydn"
  author: "A. R. Marnoël"
  key: "Do dia G 3/4 Milantolanto"
  theme1: "FANAHY MASINA"
  theme2: null
  lyrics: |
  
  1. Mitsaoka Anao 'zahay,
  	Ry Zanahary,
  	'Zay namonjy anay
  	Tamin'ny ota.
  	Nomenao anay ny Fanahinao
  	Ho mariky ny fanavotanao,
  	Tombokasen'ny voninahitrao
  	Izay atafy anay mpanota.
  
  2. Ianao nanafaka anay
  	Tsy ho andevo,
  	Ny fanahy no manambara aminay
  	Fa tonga zanakao izao 'zahay,
  	Izay voavidin'ny ran'i Jeso
  	Ka dia isaina handova indray
  	Fanjakana 'zay very fahizay.
  
  3. Ento hanaraka ny hazavanao
  	Izahay, Fanahy Mpitarika ô,
  	Koa aoka re tsy hangina Ianao
  	fa atoroy anay ny lalana
  	Ka dia hizotra tokoa izahay
  	Tarihinao ry Fanahin'ny Ray.
  
  4. Tohano hery izahay fa malemy,
  	Ampionony raha mila ho kivy fo
  	Ka mba ampidino ho ao am-po,
  	Ho tanjaka sady hery tokoa,
  	Ny mba ho tody an-danitra ao
  	Sy mba handova ny fanjakanao.
  	
- 
  id: 175
  number: 175
  title: "O, BABOY \'ZAHAY HO ANAO RE"
  composer: "(Tsy fantatra)"
  author: "A. R. Marnoël"
  key: "Do dia Ab 3/4 Milantolanto"
  theme1: "FANAHY MASINA"
  theme2: null
  lyrics: |
  
  1. O, baboy 'zahay ho Anao re,
  	Ry Fanahy Masina ô!
  	Ny afonao hirehitra anie
  	Hanafana anay izao.
  
  ISAN'ANDININY :
  
  Avia Fanahy ô!
  	Aoka ho re fa eto Ianao.
  	Atafio anay ny hery
  	Ka diovinao 'zahay.
  	Tafio hery,
  	Diovinao 'zahay.
  
  2. Fanahin'ny fanantenana,
  	Mariho ny handrinay.
  	Omeo koa fahalalana
  	Ny lova miandry anay.
  	Avia Fanahy, sns
  
  3. Hafanao 'zahay hanompo
  	An'Ilay namonjy anay,
  	Ka hanome an'ny Tompo
  	Manontolo ny fonay.
  	Avia Fanahy, sns
  
  4. Ry Fanahy, aina, laza,
  	Ahitsio ny fiainanay
  	Mba handresy lalandava
  	Ka ho tonga vao indray.
  	Avia Fanahy, sns
  	
- 
  id: 176
  number: 176
  title: "RY FANAHY MPANAZAVA"
  composer: "Elevine Heede"
  author: "Rajaobelina, M. J. Meeg, J. Johnson"
  key: "Do dia C 3/4 "
  theme1: "FANAHY MASINA"
  theme2: null
  lyrics: |
  
  1. Ry Fanahy Mpanazava
  	Miandrandra Anao 'zahay ;
  	Aza ela, fa tongava
  	Taomy ny fanahinay,
  	Mba ho fantatray mazava
  	'Zay lazain'ny Teninao ;
  	Areheto lalandava
  	Ao am-po ny afonao.
  
  2. Ry Jesosy ! Mitenena
  	Araka ny fombanao,
  	Aminay izay manantena
  	Mba handre ny feonao ;
  	Fo marary sy manahy
  	Mba tsaboy sy iantrao ;
  	Ny te hino, fa tsy sahy,
  	Anehoy ny olatrao.
  
  3. Rainay Mpanome ny soa
  	Mba henoy ny hatakay,
  	Ka ny tananao tsitoha
  	Iarovinao anay ;
  	Ny tanora mba tahio,
  	Ny vaventy hafanao,
  	Mba ho hitanay anio
  	Fa aty ny tenanao.
  	
- 
  id: 177
  number: 177
  title: "IZAY MISY NY FANAHIN\'NY TOMPO"
  composer: "Stephen R. Adams - Mamy J. Ratsirison"
  author: "Esther Bary"
  key: "Do dia Eb 4/4 "
  theme1: "FANAHY MASINA"
  theme2: null
  lyrics: |
  
  1. Izay misy ny Fanahin'ny Tompo
  	Dia misy hery sy fiadanana,
  	Ka na dia manjombona aza re
  	Izany fiainana
  	Tsy ho kivy, manana
  	'Lay Fanahy mampahery 'zany fo.
  	
  
- 
  id: 178
  number: 178
  title: "MANATREHA, RY FANAHY O!"
  composer: "Dotte Ramboa sy David Huntsinger - Mamy J. Ratsirison"
  author: "A. R. Marnoël"
  key: "Do dia D 3/4 "
  theme1: "FANAHY MASINA"
  theme2: null
  lyrics: |
  
  1. Manatreha ry Fanahy Masina ô !
  	Manatreha eto Ianao izao,
  	Ry Rainay mahery, be famindram-po,
  	Manetreha anay Ianao.
  	Tongava mba hanasitrana anay,
  	Fa Ianao irery no mahavonjy anay.
  	manatreha, ry Fanahy Masina ô.
  	Ka fenoy Anao 'zahay.
  
  2. Ô ! avia, ry Fanahy Masina ô,
  	Manatreha eto Ianao izao,
  	Ry Rainay mahery, be famindram-po,
  	Manatreha anay Ianao.
  	Tompo, vokiso fa noana izahay
  	Velombelominao ny fanahinay.
  	manatreha, ry Fanahy Masina ô.
  	Ka fenoy Anao 'zahay.
  	
- 
  id: 179
  number: 179
  title: "FANAHY MASINA O!"
  composer: "J. Harker - Mamy J. Ratsirison"
  author: "A. R. Marnoël"
  key: "Do dia Eb 3/4 "
  theme1: "FANAHY MASINA"
  theme2: null
  lyrics: |
  
  1. Fanahy Masina ô,
  	Ovay ny fiainako
  	Hanana ny fitiavanao
  	Hanao ny asanao
  
  2. Fanahy Masina ô,
  	Diovy ny foko
  	Hiray safidy Aminao
  	Hiaritra toloko.
  
  3. Fanahy Masina ô,
  	Raiso aho ho Anao
  	Ka amin'ilay afonao
  	Hafanao mba hanao.
  
  4. Fanahy Masina ô,
  	Akambano izahay
  	Mba hiray hina ho Anao
  	Anio mandrakizay.
  	
- 
  id: 180
  number: 180
  title: "RAISO NY FONAY FANAHY O!"
  composer: "John Wesley Calvert - Mamy J. Ratsirison"
  author: "A. R. Marnoël"
  key: "Do dia Eb 6/4 "
  theme1: "FANAHY MASINA"
  theme2: null
  lyrics: |
  
  1. Raiso ny fonay, Fanahy ô,
  	Amboary ho lapanao.
  	Fitia sy hasoavanao
  	Mba apetraho ao.
  
  ISAN'ANDININY :
  
  Midina amin'ny herinao
  	Ka hamasino izahay.
  	Ka ny fiainanay hatokanao
  	Ho tena an'ny Ray.
  
  2. Ny afonao hanadio ny fo
  	Ho tonga sorona,
  	Voatolotra ho Anao tokoa,
  	Anao Mpamorona.
  	Midina amin'ny, sns.
  
  3. Midina toy ny rivotra
  	Mamelombelona
  	hanehoanay ny avotra
  	Amin'ny olona.
  	Midina amin'ny, sns.
  	
- 
  id: 181
  number: 181
  title: "HE, INJAO MAMELOMBELONA"
  composer: "Doris Akers"
  author: "D. Rasolonjatovo"
  key: "Do dia F 4/4 "
  theme1: "FANAHY MASINA"
  theme2: null
  lyrics: |
  
  1. He injao mamelombelona ahy
  	'Lay Fanahy Masina
  	Avy amin'ny Ray.
  	Mampitsiky mampifalifaly
  	'Lay Fanahy Masina
  	Avy amin'ny Ray.
  
  ISAN'ANDININY :
  
  Voromailala avy amin'ny Ray
  	Ô ! aza miala
  	Aza miala aminay.
  	Ô ! mba fenoy ny fitiavanao
  	Ka mba tahio ny fonay
  	Ka mba tahio re, ry Ray,
  	Tahio hidera Anao.
  
  2. He, manova, eny manafay
  	'Lay Fanahy Masina
  	Avy amin'ny Ray.
  	'Ndeha re ho hendry
  	Ka handray
  	'Lay Fanahy Masina
  	Avy amin'ny Ray.
  	Voromailala, sns
  	
- 
  id: 182
  number: 182
  title: "EFA IVELOMAKO"
  composer: "A. Raoeliarijaona"
  author: "A. Raoeliarijaona"
  key: "Do dia F 4/4 "
  theme1: "FANAHY MASINA"
  theme2: null
  lyrics: |
  
  1. Efa ivelomako tokoa, Jeso,
  	Ato am-poko ny fitiavanao.
  	Nefa tiako koa raha izao tontolo izao
  	No handray ny fahasoavanao.
  
  ISAN'ANDININY :
  
  O! reseo anio ny halemeko.
  	Mihainoa ny vavako, Jeso,
  	Ampidino eto ny Fanahinao
  	Hampahery ny olonao Jeso.
  
  2. Ny fahalalako ny fitiavanao
  	Sy ny famonjena atolotrao,
  	Hanameloka ahy raha izao tontolo izao
  	Tsy hilazako ny fitiavanao.
  	O! reseo anio ny halemeko
  
  3. Tompo ô, henoy
  	Ny vavaka ao am-po
  	Ô ! iraho ny Fanahinao
  	Hanafana anay sy hampahery anay
  	Ary koa hitari-dalana.
  	
- 
  id: 183
  number: 183
  title: "RY FANAHY MASINA O!"
  composer: "M. M. Wells"
  author: "Rajoelison"
  key: "Do dia G 3/4 "
  theme1: "FANAHY MASINA"
  theme2: null
  lyrics: |
  
  1. Ry Fanahy Masina ô,
  	'Zay Mpitari-dalana,
  	Asehoy anay Jeso,
  	Hany lala-marina.
  	Manantena Anao 'zahay
  	Mba hitantana anay,
  	Hiantso hoe : <<Avia aty ! >>
  	O ! tazano Kalvary.
  
  2. Hitoeranao anie,
  	Ho fonena-masinao,
  	'Zao nyh fonay meloka e,
  	Rehefa nodiovinao.
  	O ! reseo ny tahotray,
  	Aoka ho sahy izahay,
  	Irak'i Jesosy tia,
  	Maty teny Kalvary.
  
  3. Ampianaro mba hanoa
  	'Zany didi-masinao,
  	Sy hanaraka tokoa
  	'Zay rehetra sitrakao.
  	He ! arovy tsy handà,
  	Efa diso, mamelà,
  	Tano ho mpanara-dia
  	An'i Jeso be fitia.
  
  4. Raha akaiky Izy izao,
  	Avy mba handray anay,
  	Mainka hakekezinao,
  	Tomoera aminay.
  	Aoka hiandrandra re,
  	Feno toky, ravo e,
  	Ento, ry Fanahy tia
  	Ho mpandova ny ary.
  
- 
  id: 184
  number: 184
  title: "AVIA, FANAHY MASINA O !"
  composer: "H. Baker"
  author: "W. E. Cousin"
  key: "Do dia F 3/4 "
  theme1: "FANAHY MASINA"
  theme2: null
  lyrics: |
  
  1. Avia, Fanahy Masina ô !
  	Midina eto aminay :
  	Fenoy ny hasoavanao
  	Ny fonay noforoninao.
  
  2. Tongava ry Mpananatra ô !
  	Nomen'Andriamanitray ;
  	Ho loharano velona
  	Hiboiboika ao am-po.
  
  3. Sokafy ny fanahinay
  	Hidiram-pitiavana ;
  	Ny tenanay malemy koa
  	Ampaherezonao anie.
  
  4. Reseo ny fahavalonay ;
  	Onony koa ny tahotray ;
  	Tantano ao an-dalana
  	Hahatraranay ny lanitra.
  
  5. Tahio mba hitiavanay
  	Ny Ray sy Jeso zanany,
  	Sy hitokianay Anao,
  	Izay Fanahy Masina.
  	
  
- 
  id: 185
  number: 185
  title: "NY TENINAO REHETRA"
  composer: "David Ramanambintana"
  author: "E. Andrianjafitrimo"
  key: "Do dia Eb 4/4 "
  theme1: "NY TENYN\'ANDRIAMANITRA"
  theme2: null
  lyrics: |
  
  1. Ny teninao rehetra,
  	Ry Tompo tia anay !
  	No tsy mba manam-petra
  	Fa to mandrakizay ;
  	Ho levona avokoa
  	Izao rehetra izao,
  	Haharitra tokoa
  	'Zao teninao izao
  
  2. Ny tenin'ny Baiboly
  	No sabatra entinay
  	Handresy ny devoly,
  	'Lay fahavalonay ;
  	Raha misy mampahory,
  	Ka osa izahay,
  	Ny teninao mahery
  	Manjary tanjakay.
  
  3. Fa teny mamy koa
  	Ho an'ny mpankato
  	Ka loharano soa
  	Miboika ao am-po,
  	Ho fanomezan-toky
  	Ny azon'ny manjo,
  	Sy hai-mahavoky
  	Mamelona ny fo.
  
  4. Fa teny mampisava
  	Ny haizim-be aty,
  	Fanilo manazava
  	Ny dia ho ary ;
  	Manolo-pahendrena,
  	Mananatra ny fo,
  	Milaza famonjena
  	Sy lova tsy ho lo.
  	
  
- 
  id: 186
  number: 186
  title: "JIRO MAZAVA"
  composer: "E. S. Lorenz"
  author: "Rajoelison"
  key: "Do dia Ab 4/4 Marisidrisika"
  theme1: "NY TENYN\'ANDRIAMANITRA"
  theme2: null
  lyrics: |
  
  1. Jiro mazava eo an-dalan-tery
  	Ny teninao, ry Ray an-danitra !
  	Mitarika ny dian'ny olom-bery
  	Ho ao an-tany mahafinaritra.
  
  ISAN'ANDININY
  
  Sitrako indrindra
  	Ny hamaky 'zany,
  	Hanaraka ny toroheviny,
  	Hampiely koa ny fahazavany
  	Sy hanambara izao ny heriny.
  
  2. Fandrika maro
  	No mivelatra eny
  	An-dalana izay diaviko ;
  	Nefa matoky
  	Fa indro re ny Teny
  	Dia mitsilo ny finoako.
  	Sitrako indrindra, sns.
  
  3. Raha mamely re ny fahoriana
  	Ka kivy sady ketraka ny fo,
  	Ny Teninao mitory fifaliana,
  	Mitondra fiononana tokoa.
  	Sitrako indrindra, sns.
  
  4. Mandroso isan'andro
  	Izao ny diako,
  	Manitsy 'lay kanana ambony ao
  	Ny fahazavana hany hitokiako,
  	Tompo malala, dia ny Teninao.
  	Sitrako indrindra, sns.
  
- 
  id: 187
  number: 187
  title: "JESO NY FITIAVANAO"
  composer: "Borthiansky"
  author: "F. Ramanantsialonina"
  key: "Do dia D 3/4 Antonony"
  theme1: "NY TENYN\'ANDRIAMANITRA"
  theme2: null
  lyrics: |
  
  1. Jeso ny fitiavanao,
  	Mitondra ao am-poko ao
  	Ny fanavaozana tokoa,
  	'Lay fitahiana mahasoa.
  	Tokinay ny didinao ;
  	Avotray ny teninao.
  
  2. Ny fanompoanay Anao,
  	Nanjary fifaliana.
  	Tsy zioga koa ny didinao ;
  	Nitondra fitahiana.
  	Aro, sy hery, tanjakay,
  	Fiarovana ho anay.
  
  3. Ny fitsapana, raha tonga izao,
  	Tena ao Satana mizahozaho,
  	Ny hany fanavotana :
  	Ny didinao no fiarovana
  	Resy koa ny halemena,
  	Hery vaovao atafy anay.
  
  4. Ka ny Fanahy Masinao,
  	Hampahatsiaro anay izao,
  	Fa efa zanakao 'zahay
  	Ho mpanompo tsara indray
  	Ka handova famonjena :
  	Ilay Kanana sy Edena.
  	
  
- 
  id: 188
  number: 188
  title: "MISAOTRA ANAO IZAHAY"
  composer: "Mozart"
  author: "J. Rabarijoël"
  key: "Do dia D 3/4 Miadana"
  theme1: "NY TENYN\'ANDRIAMANITRA"
  theme2: null
  lyrics: |
  
  1. Misaotra Anao 'zahay, ry Ray ô,
  	Noho ny Teny Masinao to
  	Tenin'ny aina, Teny tsara,
  	Mamelombelona anay.
  	Feno fitiavana tokoa.
  
  2. Ampianaro hanova toetra
  	Hanjary tena olom-baovao ;
  	Ka ny Fanahy ampitoero,
  	Hitari-dàlana anay
  	Ho tonga any aminao
  
  3. Ny Teninao no sabatray e,
  	Izay handresenay ilay ratsy,
  	Fa tena hery, vatolampy
  	'Zay azonay iankinana,
  	Maharitra mandrakizay.
  	
  
- 
  id: 189
  number: 189
  title: "AMPAHIRATO AHO"
  composer: "(Tsy fantatra)"
  author: "Rajoelison"
  key: "Do dia Ab 6/4 "
  theme1: "NY TENYN\'ANDRIAMANITRA"
  theme2: null
  lyrics: |
  
  1. Ampahirato aho 'zao
  	Hahita ny fitiavanao,
  	'Lay fahazavana mamiratra,
  	Mitarika ao an-danitra,
  	O, misehoa Ianao,
  	Ry kintan'ny maraina ô,
  	Hanoro làlana ahy izao
  	Ho aminao
  
  2. Ampaladio ny sofiko
  	Hihaino ny Mpamonjiko :
  	Fa tiako indrindra izao ny handre
  	'Lay feony mahafaly re.
  	O, mitenena Ianao,
  	Ry Tompo 'Zay Mpanavotra ô,
  	Hanitsy re ny diako 'zao
  	Ho aminao.
  
  3. Sokafy koa ny vavako
  	Hilaza 'Lay Jesosiko
  	Izay nijaly tao Kalvary
  	Mba handovako ny ary.
  	O, mba tendreo ny molotro,
  	Ry Kristy 'Zay Mpisolo ô,
  	Hiantso ireo mpanota izao
  	Ho aminao.
  	
  
- 
  id: 190
  number: 190
  title: "MITENENA RY JEHOVAH"
  composer: "S. Razafindrakoto"
  author: "S. Razafindrakoto"
  key: "Do dia D 4/4 "
  theme1: "NY TENYN\'ANDRIAMANITRA"
  theme2: null
  lyrics: |
  
  1. Mitenena ry Jehovah,
  	Fa mihaino izahay.
  	Ambarao ny sitrakao
  	Ho amin'ny mpanomponao.
  	Aoka ny Fanahinao
  	Ho ao anatinay izao.
  	Mitenena ry Jehovah,
  	Fa mihaino izahay.
  	
  
- 
  id: 191
  number: 191
  title: "HE MORA RAY NY ZIOGANAO"
  composer: "Bortniansky"
  author: "A. R. Marnoël"
  key: "Do dia F 4/4 Marisidrisika"
  theme1: "NY TENYN\'ANDRIAMANITRA"
  theme2: null
  lyrics: |
  
  1. He! mora Ray ny zioganao
  	Tiako ny didinao.
  	Tena tsara sy madio,
  	Ka ampio fa hankato.
  	Manazava izao ny dia
  	Ka miaro tsy hania
  	Ahiratonao ny saiko
  	Ankatoavako Anao.
  
  2. Tsy sarotra ny didinao
  	Ho an'ny naterakao.
  	Ny handresy azony atao,
  	Raha miankina aminao.
  	Aminao tsy mampanahy
  	Fa ianao no tokinay.
  	Raha kivy ny fanahy
  	Dia ampaherezonao.
  
  3. Andevon'ny ota ety
  	Fa nafahan'i Kristy.
  	Ka he, lova no omenao
  	Asan'ny Fanahinao.
  	Tsy mba Tompo vinitra be,
  	Na manameloka re,
  	Fa ianao Rainay be fitia
  	No miantso ny mania
  
  4. Ho tsarovako hatrany
  	Tompo ô, ny didinao.
  	Ny mitandrina izany
  	No hataoko hatrizao
  	Ahitsio re ny diako
  	Hankato ny teny soa
  	Aminao no hifaliako
  	Sady hiononako.
  
- 
  id: 192
  number: 192
  title: "HE TOY NY TANIMBOLY SOA"
  composer: "Old Melody - Mamy J. Ratsirison"
  author: "Jeanne Ratsirison"
  key: "Do dia Bb 4/4 "
  theme1: "NY TENYN\'ANDRIAMANITRA"
  theme2: null
  lyrics: |
  
  1. He, toy ny tanimboly soa,
  	Jeso, ny teninao.
  	'Zay vonona hitady moa
  	Mahazo mioty ao.
  	Ny voninkazo manitra
  	Mamerovero ao,
  	Hanjary amboara fatratra
  	Manome aina vao.
  
  2. Toa kintana mamiratra
  	Ny teninao Kristy,
  	Ka he mandefa taratra
  	Mitsilo 'zany dia.
  	He sabatra maranitra
  	'Zay anafihana,
  	Hambabo ho ao an-danitra
  	Ny fo manaiky Anao.
  
  3. Izay iriko, Tompo soa,
  	Ho tia ny teninao ;
  	Fitaovam-piadiana koa
  	Ho enti-miady ao,
  	Ho jiro hanazava ahy
  	An-dàlana izao,
  	Hitarika ireo fanahy
  	Hiandany aminao.
  	
  
- 
  id: 193
  number: 193
  title: "O ! SAMBATRA NY FO"
  composer: "A. Raoeliarijaona"
  author: "D. Rasolonjatovo"
  key: "Do dia D 4/4 "
  theme1: "NY TENYN\'ANDRIAMANITRA"
  theme2: null
  lyrics: |
  
  1. Ô, sambatra ny fo, Jeso,
  	Miverina aminao ;
  	Mandray ny hasoavanao
  	Ka tonga vaovao.
  
  ISAN'ANDININY :
  	Tsy fefiky ny ranobe
  	(Tsy fefika izahay Jeso ô)
  	Nanafotra hatrizay,
  	Nahazo hery fa nandre
  	(Nandre ny feonao)
  	Ny feonao indray.
  	Ô, sambatra ny fo, Jeso,
  	Miverina aminao ;
  
  2. He ! tretrika tokoa, Jeso,
  	Mifikitra aminao,
  	Migoka ny fitiavanao,
  	Ka tonga vaovao.
  	Tsy fefiky ny ranobe, sns.
  
  3. Tazony mafy aho, Jeso,
  	Tsy hiala aminao
  	Ho velon'ny fitiavanao,
  	Ho tonga vaovao.
  	Tsy fefiky ny ranobe, sns.
  	
  
- 
  id: 194
  number: 194
  title: "NY TENINAO TSY MIOVA"
  composer: "A. Raoeliarijaona"
  author: "A. Raoeliarijaona"
  key: "Do dia Eb 3/4 "
  theme1: "NY TENYN\'ANDRIAMANITRA"
  theme2: null
  lyrics: |
  
  1. Ny teninao tsy miova hatrizao,
  	Jeso be fitia,
  	Dia toky ho ahy
  	Ka aina hivelomako ety.
  	Ny teninao mampahery ny fo
  	Velomy ao anatiko ao.
  
  2. Ny teninao 'zay fanilon'ny dia
  	No mitantana ahy hanaraka Anao,
  	Misakana ahy tsy hania.
  	Ny teninao manazava ny fo
  	Velomy ao anatiko ao.
  
  3. Ny teninao 'zay nomenao ho ahy
  	No mampianatra ahy
  	Fa na aiza aleha
  	Dia momba ahy hatrany Ianao.
  	Ny teninao, vatolampin'ny fo,
  	Velomy ao anatiko ao.
  	
  
- 
  id: 195
  number: 195
  title: "RY JESO ! MBA HENOINAO"
  composer: "W. H. Gladstone"
  author: "A. M. Fredoux Peake"
  key: "Do dia D 3/4 "
  theme1: "NY TENYN\'ANDRIAMANITRA"
  theme2: null
  lyrics: |
  
  1. Ry Jeso mba henoinao
  	Ny feonay mpanomponao
  	Izay mivavaka aminao,
  	Mitady fitahiana.
  
  2. Vokiso ny fanahinay,
  	Ny teninao no haninay,
  	Hahaizanay mamahana
  	Ny reraka ao an-dalana.
  
  3. Ampaherezonao izao
  	Ny tananay mpanomponao,
  	Hanohana ny olonao
  	Miraviravy tanana.
  
  4. Omeo fo mazoto re !
  	Tolory fahendrena be ;
  	Tarihonao ny hevitray ;
  	Tendreo koa ny molotray.
  
  5. He ! tsinontsinona izahay,
  	Malemy sady tsy mahay ;
  	Ka dia ampaherezonao
  	Hanaovanay ny sitrakao.
  	
  
- 
  id: 196
  number: 196
  title: "ANDEHA ISIKA HANANDRA-PEO"
  composer: "E. Rakotoson"
  author: "E. Rakotoson"
  key: "Do dia Eb 3/4 "
  theme1: "NY FIANGONANA"
  theme2: "Fonombohana"
  lyrics: |
  
  1. Andeha isika hanandram-peo hoe :
  	Masina Jehovah Ray
  	Masina, masina, masina,
  	Jehovah Ray.
  
  VAVAKA MANDOHALIKA
  	Masina, masina, masina,
  	Jehovah Ray. Amen.
  	
  
- 
  id: 197
  number: 197
  title: "O! RAY MALALA, ASEHOY"
  composer: "FFPM233"
  author: "W. E. Cousins"
  key: "Do dia Bb 4/4 Marisidrisika"
  theme1: "NY FIANGONANA"
  theme2: "Fonombohana"
  lyrics: |
  
  1. O ! Ray malala asehoy
  	Ny hasoavanao ;
  	Sasao ho afa-keloka
  	'Zahay ho zanakao :
  
  ISAN'ANDININY :
  	Ho mafy ny fiezakay
  	Handia ny làlanao,
  	Tsy hisy hijanonay,
  	Raha tsy an-tranonao.
  
  2. O ! Ray malala, mba henoy
  	Ny feonay zanakao ;
  	Tantano aoa an-dàlana
  	Hankany aminao :
  	Ho mafy, sns.
  
  3. O ! Ray malala, hitanao
  	Ny hasambaranay ;
  	Ny avotr'ain'ny Zanakao
  	No itokianay :
  	Ho mafy, sns.
  	
  
- 
  id: 198
  number: 198
  title: "TOERANA TONY"
  composer: "Ralph Carmichael"
  author: "A. R. Marnoël"
  key: "Do dia C 4/4 Milamina sady malefaka"
  theme1: "NY FIANGONANA"
  theme2: "Fonombohana"
  lyrics: |
  
  1. Toerana tony iray,
  	Mangina tsara ery.
  	Ao ny saiko tnen'ny Ray,
  	Mandravaka azy koa
  	'Reo felam-boninkazo soa
  	Ka mamiratra ery.
  	Eo no andaniako
  	Fotoana mamiko,
  	Migoka ny fitiavanay
  	Rehefa avy eo
  	Vonon-kanatrika ny asa
  	Amim-pitiavana.
  
  2. Toerana masina
  	Ity toerana ity,
  	'Zay anatrehana ny Ray.
  	Eto andraisana
  	Sy anovozana tokoa
  	Ny fitahian'ny Ray.
  	Eto amokisana,
  	Ampaherezana
  	Ny saina sy fanahy koa
  	Ka raha miala eto,
  	Vonon-kanatrika ny asa
  	Amim-pifaliana.
  	
  
- 
  id: 199
  number: 199
  title: "RY JESO VORY IZAHAY !"
  composer: "G. Smart"
  author: "E. E. Cousins"
  key: "Do dia Bb 3/4 "
  theme1: "NY FIANGONANA"
  theme2: "Fonombohana"
  lyrics: |
  
  1. Ry Jeso ! vory izahay,
  	Fa andronao anio,
  	Dia avy mba hivavaka
  	Ety an-tranonao.
  
  2. Ka na aiza na aiza ny olonao
  	No vory toy izao,
  	Ny herinao mba asehoy,
  	Efao ny teninao.
  
  3. Ny hira ikambananay
  	Aty an-tranonao,
  	Ekeo ho fanandratana
  	Ny voninahitrao.
  
  4. Ny vavaka tononinay
  	Eo anatrehanao,
  	Mba raiso ho fanatitra
  	Ankasitrahanao.
  
  5. Ny teny fitarainana
  	Ataon'ny ory koa
  	Soloy fifaliana ;
  	Hisaoranay Anao.
  
  6. Ny teninao halahatra
  	Hambininao anie,
  	Hamelom-pitiavana
  	Am-pon'izay mandre.
  	
  
- 
  id: 200
  number: 200
  title: "MIHIRA FIHIRAM-PIFALIANA"
  composer: "J. Mac Granaham"
  author: "F. Ramanantsialonina"
  key: "Do dia Bb 4/4 Marisika"
  theme1: "NY FIANGONANA"
  theme2: "Fotoam-pivavahana"
  lyrics: |
  
  1. Mihirà fihiram-pifaliana
  	Hankalaza Ilay Tomponao.
  	Asandrato feo fiderana.
  	Hoby, hosana no atao
  
  ISAN'ANDININY :
  
  Derao (derao), derao (derao)
  	Ny Tompo Mpanavotra anao
  	Hirao (hirao), hobio (hirao)
  	Jehovah Mpamorona anao.
  
  2. Ka aoka ny feo fifaliana
  	Hisandratra ambony ao.
  	Hanako ho re eran-tany,
  	Hanambara fitia manavao.
  	Derao, derao, sns.
  
  3. Isika dia olom-bonjena,
  	Firenena 'zay voatokana,
  	Navotana tao Gologota ;
  	Jesosy no nanafaka.
  	Derao, derao, sns.
  
  4. Namangy antsika tokoa
  	Ny Tompon'ny lanitra soa.
  	Nomeny ny fanantenana,
  	Handova ilay tany vao.
  	Derao, derao, sns.
  
  5. Ry Tompo Mpandahatra hendry
  	Indreto 'zahay zanakao.
  	Ho tena mpanompo voatendry
  	Hanoa sy hanaraka Anao.
  	Derao, derao, sns.
  	
- 
  id: 201
  number: 201
  title: "INDRO NY FAHARETAN\'NY OLOMASINA"
  composer: "Rabenadimby"
  author: "Rabenadimby"
  key: "Do dia D 4/4 Maesteso"
  theme1: "NY FIANGONANA"
  theme2: "Fotoam-pivavahana"
  lyrics: |
  
  1. -MASINA
  
  :,: Indro ny faharetan'ny olo-masina :,:
  	Dia izay mitandrina ny didin'Andriamanitra
  	Sy ny finoana an'i Jesosy
  	:,: Amena, Amena, Amena. :,:
  	
  
- 
  id: 202
  number: 202
  title: "JESOSY O ! TARIHONAO"
  composer: "L. J. Raharijaona"
  author: "L. J. Raharijaona"
  key: "Do dia D 4/4 Miadana - Malefaka"
  theme1: "NY FIANGONANA"
  theme2: "Fotoam-pivavahana"
  lyrics: |
  
  1. 
  	(202-Ny fiangonanay : Fihirana Edisiona Vaovao fanao am-paosy)
  	1
  	Jesosy ô ! tarihonao
  	Sy mba tsinjovy
  	Ny Fiangonanay.
  	Tantano ny Fanahinay
  	Ho mendrika ny Anaranao !
  
  2. Jesosy ô ! vimbinonao
  	Mba hifankatia
  	Ny fiangonanay ;
  	Sokafinao ny molotray
  	Hanandratra ny Anaranao !
  
  3. Jesosy ô ! raketonao
  	Mba ho ao amin'ny
  	Fiangonanay
  	Ny Teny 'zay nambaranao,
  	Hitari-dàlana anay.
  	
  
- 
  id: 203
  number: 203
  title: "MANGINA !  MANGINA !"
  composer: "W. H. Doane"
  author: "Rajoelison"
  key: "Do dia Bb 4/4 Calme et doux"
  theme1: "NY FIANGONANA"
  theme2: "Fotoam-pivavahana"
  lyrics: |
  
  1. Mangina ! Mangina !
  	Henoy fa injao,
  	Ny Tompo irina
  	Manatona anao.
  	Henoy fa mandona
  	Am-ponao izao :
  	Miandry, mifona,
  	Te hiditra ao.
  
  2. Mangina ! Mangina !
  	Moa henonao ve ?
  	'Lay feo fifaliana
  	Miantso hoe :
  	<< Avia, ry mpania,
  	Omeko anao,
  	Anao ho doria,
  	Ny lanitra izao >>
  
  3. Mangina ! Mangina !
  	Mandalo ny ety.
  	Andrao dia sondriana,
  	Katsaho ny ary.
  	Anio aza ela,
  	Henoy re 'lay feo.
  	Ny Tompo mamela
  	Ka raiso ekeo.
  
  4. Mangina ! Mangina !
  	Feo mamy tokoa,
  	Mitory hafaliana,
  	'Njao re ao am-po.
  	Ekeko ry Tompo,
  	Mangina aho izao ;
  	Mangina ny foko
  	Hihaino Anao.
  
- 
  id: 204
  number: 204
  title: "JESO O! INDRETO IZAHAY"
  composer: "J. Ramahaisahy"
  author: "J. Ramahaisahy"
  key: "Do dia Ab 4/4 "
  theme1: "NY FIANGONANA"
  theme2: "Fotoam-pivavahana"
  lyrics: |
  
  1. Jeso ô, indreto izahay mpanomponao
  	Avy hankalaza sy hanaja Anao izao.
  	Raisonao ny saotra izay aterinay anio
  	Ka ny vavakay re mba valio.
  	Aza avelanao ho reraka izahay
  	Fa tohano hery mba haharitra ;
  	KA raha ho avy Ianao, dia ho vonona
  	Izahay rehetra vory eto izao.
  
  2. Ry Fanahy ô, midina, aza ela re !
  	Ny fiasanao mangina zava-dehiba.
  	'Zao no zavatra irina : hamasinonao re
  	Ny fiainanay mba ho Anao.
  	O ! ampaherezo isan'andro anie
  	Ka tantanonao re mba ho todisoa
  	Ao an-danitra, dia ho sambatra
  	Handiva lova izay maharitra.
  
  3. Ray ô, mamalia ny vavakay atao izao,
  	Raiso ho toy ny hanitra ankasitrahanao
  	KA diovinao ny tena, saina sy fanahy,
  	Atokàny re mba ho Anao.
  	Manantena lanitra sy tany vaovao
  	Izahay rehetra vory eto izao ;
  	KA ho sambatra, ao an-danitra:
  	Hiara-paly aminao mandrakizay.
  	
  
- 
  id: 205
  number: 205
  title: "ANDRIANANAHARY"
  composer: "J.P.  Diykes"
  author: "J. A. Houlder"
  key: "Do dia E 4/4 "
  theme1: "NY FIANGONANA"
  theme2: "Fotoam-pivavahana"
  lyrics: |
  
  1. Andriananhary
  	Masina indrindra !
  	Ny anjelinao
  	Iza mitoetra aminao
  	Mifamaly hoe :
  	Masina indrindra
  	Andriananahary,
  	Telo 'Zay Iray.
  
  2. Andriananhary
  	Masina indrindra !
  	Na tsy hita aza izao
  	Ny voninahitrao,
  	Masina indrindra
  	Ianao irery
  	Andriananahary,
  	Telo 'Zay Iray.
  
  3. Zava-manan'aina
  	Samy mankalaza
  	Sady manambara Anao
  	'Zay Tompony izao;
  	Ianao irery no mitahy azy,
  	Andriananahary,
  	Telo 'Zay Iray.
  
  4. Andriananhary
  	Feno hatsarana !
  	HE ! ny fitahianao
  	Izay mpanomponao;
  	Tsara dia tsara ny omenao azy,
  	Andriananahary,
  	Telo 'Zay Iray.
  
  5. Andriananhary
  	Masina indrindra !
  	Izahay mpanomponao
  	Ta hankalaza Anao;
  	Feno fahendrene, feno fiantrana,
  	Andriananahary,
  	Telo 'Zay Iray.
  	
  
- 
  id: 206
  number: 206
  title: "O ! HENOY NY ANTSON\'NY MPAMONJY SOA"
  composer: "Gilmour"
  author: "A. R. Marnoël"
  key: "Do dia F 4/4 "
  theme1: "NY FIANGONANA"
  theme2: "Fotoam-pivavahana"
  lyrics: |
  
  1. O ! henoy
  	Ny antson'ny Mpamonjy soa :
  	<<Ny ampahafolony re ento,
  	Mamin'ny fanatitra an-tsitrapo,
  	Ho ao an-tempolin'i Jeso.>>
  
  ISAN'ANDININY :
  	<<Ka tsapao amin'izany Aho
  	Dia ho hitanareo tokoa,
  	Handrotsa-pitahiana Aho
  	Dia ho vanona sy tsara ny voa.>>
  
  2. Hoy indray ny Tompo amintsika izao :
  	Ny fanatitra izay omena
  	Dia ho famonjena ireo namanao
  	Ary koa ny firenena.
  	Ka tsapao amin'izany, sns.
  
  3. Atolory ny talenta sy ny fo
  	Ho fanatitra tsra indrindra.
  	Ny andro sy ny vola ary hery koa,
  	Mba ho an'ny Avo indrindra.
  	Ka tsapao amin'izany, sns.
  	
  
- 
  id: 207
  number: 207
  title: "O ! NY FANATITRA ENTINAY"
  composer: "Z. M. Meredith - Mamy J. Ratsirison"
  author: "Jeanne Ratsirison"
  key: "Do dia Eb 3/4 "
  theme1: "NY FIANGONANA"
  theme2: "Fotoam-pivavahana"
  lyrics: |
  
  1. O, ny fanatitra entinay
  	raiso, ekeo ry Ray
  	Mba arotsahy ho aminay
  	Ny fitahianao. Amen !
  	
  
- 
  id: 208
  number: 208
  title: "FANOMEZANA TONGALAFATRA"
  composer: "Herbert A. Work - Mamy J. Ratsirison"
  author: "Jeanne Ratsirison"
  key: "Do dia G 6/4 "
  theme1: "NY FIANGONANA"
  theme2: "Fotoam-pivavahana"
  lyrics: |
  
  1. Fanomezana tongalafatra
  	Natolotra mba ho fanatitra.
  	Dia hanitra 'zay nentin'i Maria
  	Nanosorany an'i Jeso tia.
  
  2. Ny saina nanosika hanome,
  	Hanolotra ny fofo-manitra e,
  	Dia he, tena ambony lavitra,
  	Mendrika noho 'lay fanomezana.
  
  3. Ry Tompo malala avia handra
  	Ny fanatitra 'zay arotsakay.
  	Na kely tsy mendrika, ô ekeo,
  	Ny fonay manolotra no jereo.
  	
  
- 
  id: 209
  number: 209
  title: "MISY TOERANA MAMIN\'NY FOKO"
  composer: "W. S. Pitts"
  author: "D. Razakaria"
  key: "Do dia Bb 4/4 "
  theme1: "NY FIANGONANA"
  theme2: "Fotoam-pivavahana"
  lyrics: |
  
  1. Misy toerana mamin'ny foko,
  	Tsy hohadinoiko mandrakizay;
  	Fiangonana soa ka koloiko,
  	Tsy hafioko fa tranon'ny Ray.
  
  ISAN'ANDININY:
  	Koa andeha re ho (ao ianao)
  	Asaiko ianao mba handroso 
  	Hamangy ny fiangonanay.
  	Fiangonana soa ka koloiko,
  	Tsy hafioko fa tranon'ny Ray.
  
  2. Raha sehatra ny ady mafy
  	Ny fiainana diavinay;
  	Tsy manahy fa Jeso manafy
  	Hery vaovao ny fiangonanay.
  	Koa andeha re ho ao ianao, sns.
  
  3. Fitiavan'ny mpirahalahy,
  	Fifalian'ny fanaovan-tsoa;
  	Valim-bavaka amen'ny Fanahy,
  	Samy hitanay ao avokoa.
  	Koa andeha re ho ao ianao, sns.
  
  4. Tsy ho ela izahay dia hifindra
  	Fa ho avy Ilay Tomponay,
  	Ka halaza sy tena hirindra
  	Fa voavonjy ny fiangonanay.
  	Koa andeha re ho ao ianao, sns.
  
  
  
- 
  id: 210
  number: 210
  title: "O! TOERA-MAHAFINARITRA"
  composer: "Cleland Bl Macfee"
  author: "Esther Bary"
  key: "Do dia Db 4/4 "
  theme1: "NY FIANGONANA"
  theme2: "Fotoam-pivavahana"
  lyrics: |
  
  1. -MAHAFINARITRA
  
  1
  	O ! toera-mahafinaritra
  	Akaikinao, ry Ray.
  	Fa tony sy milamina,
  	Eo miadana izahay.
  
  ISAN'ANDININY :
  	Jesosy voatahy.
  	Hazony aho izao
  	Mba ho mpanompo sahy
  	Akaikin'ny fonao.
  
  2. O ! toera-mahafinaritra
  	Akaikinao, ry Ray.
  	Eo re no tena lanitra
  	Anasanao anay.
  	Jesosy voatahy, sns.
  
  3. O ! toera-mahafinaritra
  	Akaikinao, ry Ray.
  	Fa toera-mahasambatra
  	Eo ho faly izahay.
  	Jesosy voatahy, sns.
  	
  
- 
  id: 211
  number: 211
  title: "AOKA HOMBAN\'NY ELATRAO"
  composer: "M. Randriamiarana"
  author: "M. Randriamiarana"
  key: "Do dia Eb 4/4 "
  theme1: "NY FIANGONANA"
  theme2: "Fotoam-pivavahana"
  lyrics: |
  
  1. Aoka homban'ny elatrao ;
  	Ny fifankatiavanay.
  	Ny Fanahy Masinao
  	No hitarika anay.
  
  ISAN'ANDININY :
  	Ny fiainana any an-danitra
  	'Zay feno fitiavana.
  	No irinay hiainanay
  	Dieny ety ka hatrary.
  	Ry fitiavana ô,
  	Meteza hiaraka aminay.
  
  2. Kendrena mba hirindra
  	Sy ho tsara indrindra
  	Hatrizao ny fiainanay,
  	Ho voninahitry ny Ray.
  	Ny fiainana, sns.
  
  3. Enga anie 'zahay izao
  	Samy hotoloranao
  	Ilay tany vaovao
  	Mirindra sy mirenty ao.
  	Ny fiainan-danitra
  	'Zay feno fitiavana.
  	No irinay hiainanay
  	Dieny ety ka hatrary.
  	Andriamanitra ô,
  	Meteza hiaraka aminay.
  	
  
- 
  id: 212
  number: 212
  title: "RY TOMPO ZANAHARINAY"
  composer: "L. Bourgeois"
  author: "Hira Anglikana"
  key: "Do dia A 4/4 "
  theme1: "NY FIANGONANA"
  theme2: "Fotoam-pivavahana"
  lyrics: |
  
  1. Ry Tompo Zanaharinay,
  	Manati-tsaotra izahay,
  	Fa efa novelominao
  	Ka tratra izao anio izao.
  
  2. Ny haizina efa lasa izao,
  	Mazava no naposakao;
  	Levony koa ny otanay,
  	Ka hazavao ny hevitray.
  
  3. Ny asanay atao anio
  	Atrehonao ka mba tahio,
  	Hatao ho voninahitrao,
  	Handraisanay ny hantranao.
  
  4. Derainay Ianao, ry Ray,
  	Derainay Jeso Tomponay,
  	Derainay ny fanahy koa,
  	Derainay fa Mpamonjy soa.
  	
  
- 
  id: 213
  number: 213
  title: "HE TSARA NY MPIRAHALAHY"
  composer: "C. Malan"
  author: "A. R. Marnoel"
  key: "Do dia C 4/4 Mientanentana"
  theme1: "NY FIANGONANA"
  theme2: "Fotoam-pivavahana"
  lyrics: |
  
  1. He ! tsara ny mpirahalahy
  	Iray fitia mivory 'zao 
  	Ka hazavainao, ry Fanahy,
  	Entanin'ilay afonao.
  	Ny vavaka sy hira ataony
  	Dia tena fofomanitra
  	Ny vavaka sy hira ataony
  	Tafakatra ao an-danitra.
  
  2. Eo anoloanao, ry Mpamonjy,
  	Firaisan'olo-masina.
  	Eo no mihoby ny voavonjy,
  	Voafidy sy voafantina.
  	Eo izy no mifalifaly
  	Amin'ny fo finaritra ;
  	Eo izy no mifalifaly
  	Mihoby ny Mpanavotra.
  
  3. Ka n'aiza n'aiza ivoriana
  	Dia misy hoby avokoa,
  	Manjaka ao ny fifaliana
  	Fa tena henika ny soa.
  	Ny famindrampo taminao ;
  	Ny fiangonanao mahazo
  	Ny hery tena manavao.
  
  4. Ry Rainay tsara arotsahy,
  	Hitondra fiadanana,
  	Ny hasoavan'ny Fanahy
  	Noho 'Lay Mpanalalana ;
  	Ka mba ho fitia mandrakizay
  	Ho santatr'ilay tany vao,
  	Eny, ho fitia mandrakizay
  	No hampiray ny olonao.
  
- 
  id: 214
  number: 214
  title: "EO AMIN\'I JESO"
  composer: "yyyy"
  author: "A. R. Marnoël"
  key: "Do dia Db 3/4 Marisika"
  theme1: "NY FIANGONANA"
  theme2: "Fotoam-pivavahana"
  lyrics: |
  
  1. Eo amin'i Jeso
  	Na dia eto an-tany,
  	Mifaly re ny fo
  	Fa voavonjiny.
  	Eo amin'ny hazo
  	'Zay nijalian'ny Tompo.
  	Ny fo ho sambatra
  	Sy tretrika tokoa.
  
  2. Eo misy ny fitia
  	'Zay iraisan'ny mpino,
  	Najoro ho doria,
  	Tsy mety hadino
  	Eo no mitaratra
  	'Lay hazavana tsara
  	Toa jiron-danitra :
  	Filazantsara soa.
  
  3. Eo koa 'lay lalana
  	Mahavonjy na ety ;
  	'Zay ahafahana
  	Amin'ny ratsy ety ;
  	Eo ahitana koa
  	Sakaiza tena tsara
  	'Zay be famindrapo
  	Be fitiavana.
  
  4. Eo koa 'lay lanivoa
  	Notrabaran'ny ota,
  	Eo koa 're tanan-droa
  	Mpandray ny mpanota,
  	O ! Ray iantrao izao
  	Fa novidinao 'zahay ;
  	Fihino an-tratranao
  	'Zahay ho tena iray.
  	
  
- 
  id: 215
  number: 215
  title: "IZAO ANIO IZAO"
  composer: "S. S. Wesley"
  author: "Randriavoavonjy"
  key: "Do dia Eb 4/4 "
  theme1: "NY FIANGONANA"
  theme2: "Ny Sabata"
  lyrics: |
  
  1. Izao anio izao re,
  	Jehovah Tomponay
  	Sabata masinao e
  	Ka ho tsaroanay.
  	Ianao nanendry izany
  	Mba hitsaharanay.
  	Nohamasininao re
  	Ka masina aminay.
  
  2. 'Zahay ankehitriny
  	Mivory eto 'zao,
  	Tahaka ny fahiny
  	Nataon'ny zanakao.
  	Misaotra Anao 'zahay re,
  	Ry Andriamanitra ô,
  	Henoy ny vavakay 'zao
  	Anio Sabatanao.
  
  3. Rahatrizay 'zahay
  	Ary an-tranonao,
  	O ! sambatra tokoa
  	Hahita tava Anao.
  	Haneho fanajana,
  	Hiondrika aminao ;
  	Hihira fiderana
  	Sabata toy izao.
  	
  
- 
  id: 216
  number: 216
  title: "NY SABATANAO RY TOMPO"
  composer: "Randriavoavonjy"
  author: "Randriavoavonjy"
  key: "Do dia Eb 3/4 "
  theme1: "NY FIANGONANA"
  theme2: "Ny Sabata"
  lyrics: |
  
  1. Ny Sabatanao ry Tompo,
  	No tsarovanay izao ;
  	Ka mivory ny mpanompo
  	Mankato ny didinao
  	Entinay ny fanajana
  	Sy ny saotra ho Anao,
  	Ary hira fiderana
  	Nohon'ny voninahitrao.
  
  2. Andro masina indrindra
  	Notahinao fahizay ;
  	Tsy miova, tsy mifindra,
  	Andronao Jehovah Ray.
  	Andro nitsaharanao
  	Ka mba itsaharanay ;
  	Ao an-tany vaovao
  	Mbola ho tsaroana indray.
  
  3. Tompo ô, tariho izahay
  	Mba hanao ny sitrakao ;
  	Ary hitandremanay
  	Ny Sabata Masinao.
  	Na aiza toeran-kivoriana,
  	Raha Sabata toy izao,
  	Arotsahy ny fitahiana
  	Ho amin'ny vahoakanao.
  	
  
- 
  id: 217
  number: 217
  title: "TSAROANAY TOKOA IZAO"
  composer: "R. Henriksen"
  author: "F. Ramanantsialonina"
  key: "Do dia Ab 6/4 "
  theme1: "NY FIANGONANA"
  theme2: "Ny Sabata"
  lyrics: |
  
  1. Tsaroanay tokoa izao
  	Sabata masinao
  	'Zay mahafaly, mahasoa,
  	Maneho ny hajanao.
  
  ISAN'ANDININY :
  	Ry Tompo, deraina Ianao
  	Fa Mpahary tokoa
  	Tahionao 'ty andro 'ty
  	'Zay lova hatrary.
  
  2. Ry Tompo ô, misaotra Anao
  	Izahay zanakao
  	Ny teninao 'zay manavao,
  	Manova ny fonay.
  	Ry Tompo, sns.
  
  3. He ! tazanay sahady re
  	Ny voninahitrao.
  	Fa andro soa sy lehiba
  	natokana ho Anao.
  	Ry Tompo, sns.
  
  4. Tohano ny mpanomponao
  	Hatoky tsara izao.
  	Hanaja sy hitandrina
  	Ny andro masina.
  	Ry Tompo, sns.
  
- 
  id: 218
  number: 218
  title: "MIDERA ANAO \'ZAHAY"
  composer: "Ancien and modern"
  author: "B. Andriantsizafy"
  key: "Do dia Bb 4/4 "
  theme1: "NY FIANGONANA"
  theme2: "Ny Sabata"
  lyrics: |
  
  1. Midera Anao 'zahay,
  	Ry Ray malala,
  	Fa tratr'izao andro soa lehibe
  	Dia ny Sabatanao
  	'Zay fifalianay
  	Ka dera saotra no atolotray.
  
  ISAN'ANDININY :
  	Enga anie, Jeso,
  	Hitohy hatrary
  	'Zao fiderana izao
  	'Zay entinay.
  
  2. Ny fitahianao,
  	Ny herinao koa
  	Nampanantenainao
  	Homena anio,
  	Mba arotsahy, Jeso,
  	Aty am-ponay
  	Ho hery manavao ny tenanay.
  	Enga anie, Jeso, sns.
  
  3. 'Zay tadiavinay
  	Anio, Jeso ô !
  	Ny hitoeranay ao aminao ;
  	Ny asa izay atao
  	Aoka, Jeso ô !
  	Ho eo ambany fitarihanao.
  	Enga anie, Jeso, sns.
  
  4. Ka ny Fanahinao
  	Hitoetra am-ponay
  	Hahaizanay mba hanaja Anao ;
  	Sy hahatonga anay
  	Mba ho mpandova
  	'Lay lanitra ary ny tany vaovao
  	Enga anie, Jeso, sns.
  	
  
- 
  id: 219
  number: 219
  title: "TSAROANAY MAIVANA"
  composer: "A. Raoeliarijaona"
  author: "A. Raoeliarijaona"
  key: "Do dia D 3/4 Moderato - Animato"
  theme1: "NY FIANGONANA"
  theme2: "Ny Sabata"
  lyrics: |
  
  1. Tsaroanay maivana ny adinay ;
  	Ny hasasaranay tsy henonay.
  	Fa fitsaharana atolotrao
  	Ka fifalianay ny Sabatanao.
  
  ISAN'ANDININY :
  	Raiso re, Tompo ô,
  	Ny saotra vokatry ny fo
  	Fa taratra avy ao Edenanao
  	Ny fiadanan'ny Sabatanao.
  
  2. Ny sainay reraka, mahery indray
  	Fa aina velona no azonay ;
  	Ny fonay reraka, tohananao,
  	Mahery noho ny Sabatanao.
  	Raiso re, Tompo ô, sns.
  
  3. Ny fiadananao hiainanay,
  	Ny fitahianao no tanjakay,
  	Fa hitanay tokoa ny herinao
  	Avy ao anatin'ny Sabatanao.
  	Raiso re, Tompo ô, sns.
  
  4. Maniry izahay hanompo Anao
  	Sy mba hitandrina ny didinao.
  	O, hamasino re ho zanakao,
  	Hahay manaja ny Sabatanao.
  	Raiso re, Tompo ô, sns.
  	
  
- 
  id: 220
  number: 220
  title: "SABATA MASINAO"
  composer: "Rasamoelina"
  author: "Rasamoelina"
  key: "Do dia G 4/4 "
  theme1: "NY FIANGONANA"
  theme2: "Ny Sabata"
  lyrics: |
  
  1. Sabata Masinao,
  	Andriamanitray,
  	No nitsaharanao,
  	Ka itsaharanay.
  	Sabata Masinao,
  	Ry Tompo tianay,
  	Izao anio izao
  	Ka ifalianay.
  
  ISAN'ANDININY :
  	Sabata Masinao,
  	Andriamanitray,
  	No nitsaharanao,
  	Ka itsaharanay.
  
  2. Sabata Masinao,
  	Jehovah Tompo soa.
  	No voatahinao
  	Ka maminay tokoa.
  	Sabata Masinao, sns.
  
  3. Sabata Masinao,
  	Ry Ray malalanay,
  	Nohamasininao
  	Ka hamasininay.
  	Sabata Masinao, sns.
  
  4. Sabata Masinao,
  	Ry Jeso Tomponay,
  	No tena andronao
  	Ka ivavahanay.
  	Sabata Masinao, sns.
  	
  
- 
  id: 221
  number: 221
  title: "AZA MANADINO AHY"
  composer: "FFPM617"
  author: "Ramahandry"
  key: "Do dia F 4/4 "
  theme1: "NY FIANGONANA"
  theme2: "Ny Sabata"
  lyrics: |
  
  1. Aza manadino ahy,
  	Ry Mpihaino vavaka !
  	Aza mba manary ahy
  	Hanalavitra Anao ;
  	Mitodiha, ry Mpanjaka !
  	Ka jereo ny olona ;
  	Aza manadino ahy,
  	Ry Mpihaino vavaka !
  
  2. Ianao no fiereko,
  	Vatolampy heriko ;
  	Na kamboty aza aho,
  	Faly manana Anao ;
  	Afa-tahotra ny foko,
  	Raha miandrandra Anao ;
  	Aza manadino ahy,
  	Ry Mpihaino vavaka !
  
  3. Eny, Ianao no Raiko,
  	Ka hatoniko izao ;
  	Nefa ny fahadalako
  	Aza mba heverinao;
  	O ! ampifalio aho,
  	Ka ombay ny elatrao ;
  	Aza manadino ahy,
  	Ry Mpihaino vavaka !
  
  4. Tabataba lalandava
  	No mba hitako izao,
  	Ka izahoi te ho tonga
  	Ao am-pitsaharanao ;
  	Mitenena ry Jehovah !
  	mamalia ahy izao ;
  	Aza manadino ahy,
  	Ry Mpihaino vavaka !
  	
  
- 
  id: 222
  number: 222
  title: "NY ANDRO MASIN\'NY SABATA"
  composer: "William B. Bradbury - Mamy J. Ratsirison"
  author: "A. R. Marnoël"
  key: "Do dia Bb 4/4 "
  theme1: "NY FIANGONANA"
  theme2: "Ny Sabata"
  lyrics: |
  
  1. Ny andro masin'ny Sabata
  	Dia voatahy
  	Ka tiako indrindra
  	Noho ny fitahiana hita ao.
  	Atsahatray ny asanay ;
  	Avela ny lalao.
  	Dia miomana hivavaka
  	Sy hamaky teny.
  
  2. He ! tiako koa ny mianatra
  	Sekoly Sabata.
  	Mihaino ny tantara soa
  	Milaza an'i Jeso.
  	Ny sabata hariva indray
  	manao ny asa soa ;
  	mamangy sy mihira koa
  	Eran'ny tanàna.
  
  3. Fa raha milentika indray
  	Ilay masoandro
  	Dia he ! mivory indray
  	'Zahay hisaotra ilay Ray.
  	He tiako re ny Sabata
  	'Zay itahiana anay
  	Ka ho tsarovako tokoa
  	Mandritra ny andro.
  	
  
- 
  id: 223
  number: 223
  title: "ANIO NO ANDRO"
  composer: "W. M. J. Kirkpatrick"
  author: "D. Rasolonjatovo"
  key: "Do dia Ab 4/4 "
  theme1: "NY FIANGONANA"
  theme2: "Ny Sabata"
  lyrics: |
  
  1. Anio no andro natao ho anay
  	Andro masina :
  	Fihaonanay aminao, ry Ray,
  	Hifandraisana.
  	Ka faly izahay
  	Tafahaona indray.
  	Mihaona aminao, ry Ray,
  	'Zao Sabata izao.
  
  2. Fa heniky ny fitiavanao
  	Ny androm-piainanay
  	Ka he tratr'izao
  	Sabata izao
  	Hitsaharanay.
  	Tsaroanay soa tokoa
  	Ny fitiavanao.
  	Misaotra Anao 'zahay, ry Ray,
  	Fa notahianao
  
  3. He ! andro notahianao anio,
  	Tompo tsara ô,
  	Ka diovy re ny fonay hadio
  	Mba ho zanakao.
  	Tompo tia, ô ! avia,
  	Raiso re izao.
  	Diovy re ny fonay hadio
  	Dia ho lapanao.
  	
  
- 
  id: 224
  number: 224
  title: "INDRO FA MISOKA IZAO"
  composer: "Willson F. Sewin - Mamy J. Ratsirison"
  author: "Jeanne Ratsirison"
  key: "Do dia Ab 6/4 "
  theme1: "NY FIANGONANA"
  theme2: "Ny Sabata"
  lyrics: |
  
  1. Indro fa misoka izao
  	'Lay masoandro tazanao.
  	Manatona avia derao
  	Ny Mpamorona anao.
  	Ankalazao.
  
  ISAN'ANDININY :
  	Dera, haja, saotra.
  	Atolotray,
  	Ho Anao, Jehovah Ray.
  	Mendrika asandratray
  	Mandrakizay.
  
  2. Ny ota maro izay natao
  	Tompo ô, mba avelao
  	O ! diovy ka sasao
  	Ny fonay re anjakao
  	Mba ho Anao
  	Dera, haja, saotra, sns.
  
  3. Ny fiadananao izao
  	Ampombay ny olonao
  	Hampitony, hanavao
  	Ka hameno hatrizao
  	Ny fiainanay.
  	Dera, haja, saotra, sns.
  
  4. O ! ekeo ny vavakay
  	Sy ny saotra entinay
  	Ka ny voninahitra
  	Ho Anao maharitra
  	Mandrakizay.
  	Dera, haja, saotra, sns.
  	
  
- 
  id: 225
  number: 225
  title: "ANDRO MALAZA SY MENDRIKA SOA"
  composer: "Raymond Browning"
  author: "D. Rasolonjatovo"
  key: "Do dia Bb 6/8 "
  theme1: "NY FIANGONANA"
  theme2: "Ny Sabata"
  lyrics: |
  
  1. Andro malaza sy mendrika soa
  	'Lay andro izay nitsaharan'ny Ray.
  	Ny zavaboary he mifaly avokoa
  	He ! faly fa hiala sasatra indray.
  	Ry Zanahary, Tompo tia ô !
  	Ampifalio izao ny fonay,
  	Mba tsy hanary ny fombanao.
  	Tsy hanadino ilay hatrizay,
  	Ilay Sabata natao ho anay,
  	Ilay tsangambaton'ny Ray.
  
  2. Andro tsy tontan'ny ela hatrizay
  	Na dia natopan'ny onja aza izao.
  	Andro natao hamantarana izay,
  	Ireo vahoaka manaraka Anao.
  	Ry Zanahary, Tompo tia ô !
  	Ampifalio izao ny fonay,
  	Mba tsy hanary ny fombanao.
  	Tsy hanadino ilay hatrizay,
  	Ilay Sabata amantarana anay,
  	Ilay famantaran'ny Ray.
  
  3. O ! andro masina, kanto tokoa
  	Mamirapiratry ny endrikao,
  	Andraisanay fitahiana sy soa
  	'Lay andro masina izay manavao
  	Ry Zanahary, Tompo tia ô !
  	Ampifalio izao ny fonay,
  	Mba tsy hanary ny fombanao.
  	Tsy hanadino ilay hatrizay,
  	Ilay Sabata anamasinana anay,
  	Sy manavao ny fonay.
  	
  
- 
  id: 226
  number: 226
  title: "FOTOANA SOA"
  composer: "R. Henriksen"
  author: "S. Razanajatovo"
  key: "Do dia Ab 6/4 Allegro"
  theme1: "NY FIANGONANA"
  theme2: "Sekoly Sabata"
  lyrics: |
  
  1. Fotoana soa sy mamiko,
  	Jeso Mpamonjiko,
  	Ny mianatra eo an-tongotrao
  	Ny teny masinao
  
  ISAN'ANDININY :
  	Mitenena, Tompo ô !
  	Ao am-poko Ianao
  	Ka aoka ny finoako re
  	Hitombo hery anie
  
  2. Iriko indrindra, Jeso ô !
  	Handrehitra tokoa
  	Ny afon'ny fitiavako
  	Izay voambaranao.
  	Mitenena, sns.
  
  3. Ny teninao ianarako
  	Manetsika ahy ho tia
  	'Lay andronao andrasako :
  	<< Jesosy ô ! avia >>
  	Mitenena, sns.
  	
  
- 
  id: 227
  number: 227
  title: "NY ANDRONAO RY TOMPONAY"
  composer: "(Tsy fantatra)"
  author: "F. Ramanantsialonina"
  key: "Do dia Db 4/4 "
  theme1: "NY FIANGONANA"
  theme2: "Sekoly Sabata"
  lyrics: |
  
  1. Ny andronao, ry Tomponay,
  	Milaza ao am-ponay ao
  	Fa lehibe ka sitrakay
  	'Lay fitiavanao izao.
  
  2. Sabatanao dia lova soa,
  	Nomena hitsaharana.
  	Ka fitahiana sy tombotsoa,
  	Tena hasambarana.
  
  3. Ny hafatrao, ny teninao,
  	Mamelombelona ny fo
  	No renay izao ka sitrakay.
  	Fanavaozana tokoa.
  
  4. Ny herin'ny : FANAHINAO
  	Hanampy anay mpanompo
  	Mba hankato ny didinao,
  	Hiadananay tokoa.
  
- 
  id: 228
  number: 228
  title: "EO AN-TONGOTRAO RY JESO"
  composer: "HL176"
  author: "A. R. Marnoël"
  key: "Do dia G 6/4 Marisika"
  theme1: "NY FIANGONANA"
  theme2: "Sekoly Sabata"
  lyrics: |
  
  1. -TONGOTRAO RY JESO
  
  1
  	Eo an-tongotrao, ry Jeso,
  	Tonga hianatra
  	Izahay ka alefaso
  	Ilay Mpananatra.
  
  ISAN'ANDININY
  	Tompo ô ! ambarao
  	Ilay fitia ambony ;
  	Mba ho tspanay hatrizao,
  	Ny tena vidiny.
  
  2. Hazavain'ity Sekoly
  	Ka hita ilay hazo,
  	Teo nandresy ny devoly
  	Ilay Mpanjakanay.
  	Tompo ô! ambarao, sns.
  
  3. Asehoy anay, ry Tompo,
  	Fahitana vaovao;
  	Atoroy aty am-ponay
  	'Zay tena lalanao.
  	Tompo ô! ambarao, sns.
  
  4. Eo an-tongotrao, ry Jeso,
  	Tonga hianatra
  	Ny fanahinay vokiso
  	Ny mofon-danitra.
  	Tompo ô! ambarao, sns.
  
- 
  id: 229
  number: 229
  title: " TAZONY AHO"
  composer: "J. Gloeser"
  author: "Rajoelison"
  key: "Do dia F 4/4 "
  theme1: "NY FIANGONANA"
  theme2: "Vavaka"
  lyrics: |
  
  1. Tazony aho hatrizao
  	Ho eo anilanao, ry Ray,
  	Hanaraka ny dianao
  	Anio mandrakizay ;
  	He mora kivy 'zany fo
  	Ka mba tohanonao tokoa
  	Fikiro tsy hiala,
  	fandrao misalasala.
  
  2. Raha sendra ka variana ety
  	Sy mankafy ny tany
  	Ka manadino ny ary,
  	Tazony mafy ihany
  	Lazao fa tsara lavitra
  	'Lay toeram-boninahitra
  	Miandry ao ambony
  	Tsy misy ota intsony.
  
  3. Tsinjovinao ny diako izao,
  	Arovy sy tantano
  	O ! asehoy ny herinao
  	Raha tondraka ny rano
  	Tazony re ny tanako
  	Ka andrandrao ny masoko
  	Hibanjina hatrany
  	Ilay Kanana any.
  	
  
- 
  id: 230
  number: 230
  title: "O, TENY FIKASANA"
  composer: "Mrs G. H. Morris"
  author: "Rajoelison"
  key: "Do dia Bb 4/4 "
  theme1: "NY FIANGONANA"
  theme2: "Vavaka"
  lyrics: |
  
  1. O ! Teny fikasana soa indrindra
  	Kristy mitarika ny lalako
  	Ny tanany no mampirindra
  	Ny momba ny fiainako.
  
  ISAN'ANDININY :
  	He ! sambatra aho re
  	Nametraka aminao 'zao
  	Ny androko Mpamonjy tia
  	Ny fiainako tontolo
  	Satria Ianao nisolo
  	'Reo fahotako marobe.
  
  2. Ny masonao mitazana ny diako
  	Ny saina atolotrao, mitarika
  	Any aminao no hitodiako,
  	Ny lanitra no marika
  	He ! sambatra aho re, sns.
  
  3. Na dia tsy hitako izay hombana
  	Fa maizina ny eo alohako
  	Ny tananao no he ! mitana
  	Tsy misy hatahorako.
  	He ! sambatra aho re, sns.
  
  4. Endrey ny hasambarana sy toky
  	mahampoka izao ny fiainako
  	Fa manana Anao ho zoky
  	Mandahatra ny lalako.
  	He ! sambatra aho re, sns.
  	
  
- 
  id: 231
  number: 231
  title: "ANTSOY JESO"
  composer: "A. Ekrede"
  author: "Rajoelison"
  key: "Do dia G 4/4 Miadana"
  theme1: "NY FIANGONANA"
  theme2: "Vavaka"
  lyrics: |
  
  1. Antsoy Jeso, raha tonga ny maraina
  	'Zay mampivelatra ny raozy soa.
  	Antsoy Jeso fa Izy anton'aina
  	Mamelona ny fo sy saina koa.
  
  2. Antsoy Jeso mba ho mpiara-dia
  	An-dàlana izay diavinao ;
  	Antsoy Jeso, Sakaiza tena tia,
  	Ho aro, toky sady tanjakao.
  
  3. Antsoy Jeso, raha sendra ka tomany
  	Tsindrin'ny ota be izay natao ;
  	Antso Jeso, Ilay nitondra izany,
  	Ka maty mba hanavotra anao.
  
  4. Antsoy Jeso, ny vavakao ho reny,
  	Ny sentonao tsy miafina aminy ;
  	Antsoy Jeso, inoy re ny Teny ;
  	Ny zava-tsarotra halaminy.
  
  5. Antsoy Jeso, raha mila ho variana
  	Amin'izao fiainana eto izao ;
  	Antsoy Jeso fa Izy fifaliana,
  	Harena soa sy tena lovanao.
  
  6. Antsoy Jeso, raha tonga ny hariva,
  	Manaloka ny haizim-pasana ;
  	Ny masoandronao koa efa iva,
  	Antsoy Jeso,  'zay Fitsanganana.
  	
  
- 
  id: 232
  number: 232
  title: "MIHAINOA TOMPO O!"
  composer: "H. A. Miller"
  author: "Rajoelison"
  key: "Do dia Eb 4/4 "
  theme1: "NY FIANGONANA"
  theme2: "Vavaka"
  lyrics: |
  
  1. Mihainoa, Tompo ô !
  	Ny fivavakay anio.
  	Raisonao ankehitrio
  	Ny fisaoranay Anao.
  
  2. Manatreha, Tompo ô,
  	'Reto zanakao anio ;
  	Akaikezo ka tahio ;
  	Hafanao ho tia Anao.
  
  3. Mamelà, ry Tompo ô,
  	Ny otanay rehetra anio ;
  	Dia ovay sy ahitsio
  	Izahay ho olonao.
  
  4. Mitariha, Tompo ô,
  	'Reto ondrinao anio,
  	Dia arovy ka ampio
  	Mba ho tonga am-balanao. Amen
  	
  
- 
  id: 233
  number: 233
  title: "TOMPO MALALA, FENO HATSARANA"
  composer: "Luttroth"
  author: "J. Rabarijoël"
  key: "Do dia Eb 4/4 Andantino"
  theme1: "NY FIANGONANA"
  theme2: "Vavaka"
  lyrics: |
  
  1. Tompo malala feno hatsarana,
  	Tena irinay ny hahita Anao,
  	O ! asehoy aminay hatrizao,
  	:,: Ny herinao mahavonjy tokoa. :,:
  
  2. Tompo Tsitoha, Tompo tena tia,
  	Mamboatra fonenan-tsoa tokoa,
  	O ! aza avela, baboy avokoa
  	:,: Mba ho Anao re ny fonay izao. :,:
  
  3. Tompo mahery, aza ela loatra
  	Fa sasa-miandry Anao ny olonao
  	O ! misehoa amin-kery izao.
  	:,: Ianao irery no fiononanay. :,:
  
  4. Tompo, faingàna fa tsy mahatamana
  	Ny tany izay onenanay izao,
  	Irinay ny hitoetra aminao.
  	:,: Anilanao, eo no honenanay. :,:
  
  
  
- 
  id: 234
  number: 234
  title: "RY RAY O, HENOY"
  composer: "Hoffmann"
  author: "J. Rabarijoël"
  key: "Do dia C 4/4 Moderato"
  theme1: "NY FIANGONANA"
  theme2: "Vavaka"
  lyrics: |
  
  1. Ry Ray ô, henoy ny vavakay
  	Atolotray ankehitrio
  	Mba ho fankasitrahanay
  	Ny fitiavanao anay.
  	Na ratsy aza izahay,
  	Nandà ny sitraponao,
  	Tsy nankato ny teny soa,
  	Dia mbola nomenao indrafo.
  	Isaoranay ny anaranao.
  
  2. Ny tena irinay hatrizao :
  	Hanompo sy hanaja Anao,
  	Hanao 'zay tianao tokoa
  	Sy hankato ny didinao.
  	Ny fonay manontolo, re,
  	Ny hery sy ny sainay,
  	Ny andro manontolo, e,
  	Ho entinay eo an-tongotrao,
  	Ry Ray ô, ka raiso hatrizao.
  
  3. Raha avy ilay andro lehibe
  	Hihaonanay ao aminao,
  	Hasandratray ny hira, re,
  	Hidera ny fitiavanao.
  	Ry Ray, diovy ny fonay,
  	Havaozy ny toetray
  	Ho mendrika ny lanitra,
  	Ho tretrika sy finaritra.
  	Henoy re ny vavakay. Amen.
  	
  
- 
  id: 235
  number: 235
  title: "MBA MAMINDRA FO"
  composer: "D. Razafindramanana"
  author: "D. Razafindramanana"
  key: "Do dia C 6/4 "
  theme1: "NY FIANGONANA"
  theme2: "Vavaka"
  lyrics: |
  
  1. Mba mamindrà fo aminay Tompo ô !
  	Fa mila ho reraka ny fonay.
  	He ! indro miankohoka 
  	Eo amin'ny tongotrao 'zahay,
  	Mitady fiainana.
  	Ny fitianao no hianteheranay izao.
  	Mpanota izahay ka mibebaka
  	Dia mangataka aminao ny hery,
  	Mba mihainoa, Tompo ô !
  
  2. Raha sendra ka diso ny alehanay,
  	Tariho sy tantano ny dianay.
  	Tsy mba misy izay itokianay ety
  	Afa-tsy izay lazainao fa mendrika.
  	Ny fitiavanao no hianteheranay izao.
  	Mpanota izahay, ka tsy mendrika
  	Ny hiantso ny Anaranao, Ray,
  	Ekeo ny fivavakay.
  
  3. Raha solafaka ety ny fiainanay
  	Areno fa kely ny herinay.
  	Eo aminao no miantoraka 'zahay, ry Jeso,
  	Mifona fa meloka.
  	Ny fitiavanao no hianteheranay izao.
  	Raha avy Ianao, Ianao Jeso ô  !
  	Aoka ho isan'ny voaomana tokoa,
  	Ny mpanompokelinao.
  	
  
- 
  id: 236
  number: 236
  title: "TOMPO MALALA"
  composer: "Raobijaona"
  author: "Raobijaona"
  key: "Do dia D 4/4 "
  theme1: "NY FIANGONANA"
  theme2: "Vavaka"
  lyrics: |
  
  1. Tompo malala ô ! jereo 'zahay,
  	Fa osa ny fo tsy arovanao.
  	Ka arotsahy ao anatinay,
  	Hiasa ao am-po, ny Fanahinao.
  
  ISAN'ANDININY :
  	Henoy ny feonay
  	Mitalaho izao.
  	O ! mba ekeo, ry Ray,
  	'Zao vavakay izao.
  
  2. Tompo malala ô ! ampionao
  	Ireto ondry mila hery vao.
  	Omeo saina vonona hatrizao
  	Mba ho mpandresy 'reto zandrinao
  	Henoy ny feonay, sns.
  
  3. Tompo malala ô ! aza afoinao
  	'Reto fanahy, eny mitoreo.
  	O ! mba trotroy eo an-tratranao.
  	Tompo malala, mba ekeo re.
  	Henoy ny feonay, sns.
  	
  
- 
  id: 237
  number: 237
  title: "JESOSY O! MPAMONJY"
  composer: "Raobojaona"
  author: "Raobojaona"
  key: "Do dia F 6/4 "
  theme1: "NY FIANGONANA"
  theme2: "Vavaka"
  lyrics: |
  
  1. Jesosy ô ! Mpamonjy
  	Ombay ny herinao
  	Ny fiezahanay
  	Hanatona Anao.
  	Raha indro mafy ny ady
  	Ka maizina ny dia,
  	Ianao Jeso tia,
  	Ianteheranay.
  
  2. Raha indro ka mahery
  	'zany filan'ny nofo,
  	O ! aza avela ho resy
  	'Zahay mpanomponao.
  	O ! aza afoinao re
  	Fa osa izahay.
  	Ianao manan-kery
  	Mahavonjy anay.
  
  3. Sasao madio ny fonay
  	Mba hitoeranao,
  	Ry Tompo tia any
  	Ekeo hatrizao,
  	Ka izahay mpanota
  	Ho mendrika tokoa
  	Handova famonjena
  	Raha ho avy Ianao.
  	
  
- 
  id: 238
  number: 238
  title: "TOMPO O! MBA TONEO"
  composer: "E. Razakarivony"
  author: "E. Razakarivony"
  key: "Do dia F 4/4 "
  theme1: "NY FIANGONANA"
  theme2: "Vavaka"
  lyrics: |
  
  1. Tompo ô, mba toneo re,
  	'Zato tebitebin-tsaiko.
  	Mila hampivadi-po
  	Sady sarotra tsy haiko.
  	Mampihorohoro lava
  	Sy mandreraka ny fo ;
  	Nefa raha tonenao
  	Dia ho resy ny manjo.
  
  2. Tompo ô ! ampangino re,
  	'Zato herin'onja iainako
  	Misamboaravoara
  	Mila hanafotra ny fiainako.
  	Izaho mantsy ra sy nofo,
  	Olombelona ihany ;
  	Ka ny heriko tsy ampy
  	hanoherana izany.
  
  3. Tompo ô ! mba sitrano re,
  	'Zato ratra ato am-poko ;
  	Ka sosloy fifaliana
  	Izany sento sy toloko.
  	Fa izay sitraninao,
  	Tsy ho orin-java-tsoa.
  	Eny, sambatra aoka izany,
  	Tena tretrika tokoa.
  	
  
- 
  id: 239
  number: 239
  title: "AKAIKY AHY NY TOMPO"
  composer: "B. D. Ackley"
  author: "D. Rasolonjatovo"
  key: "Do dia D 4/4 "
  theme1: "NY FIANGONANA"
  theme2: "Vavaka"
  lyrics: |
  
  1. Akaiky ahy, akaiky ny Tompo
  	Raha mitaraina aho.
  	Eny, fitia mitafotafo,
  	Raha mitaraina aho.
  	Raha mitaraina aminy aho,
  	Raha mitalaho aminy aho,
  	Izy manambara fa hihaino,
  	Raha mitaraina aho.
  
  2. Tsy lavitra ahy ny fitiavany,
  	Raha mitaraina aho,
  	Fa omeny ho ahy ny rany,
  	Raha mitaraina aho.
  	Raha mitaraina aminy aho,
  	Raha mitalaho aminy aho,
  	Izy efa tia ka he mamonjy,
  	Raha mitaraina aho.
  
  3. Ho lovako izao ny tany,
  	Raha mitaraina aho.
  	Ho foiny ho ahy izany,
  	Raha mitaraina aho.
  	Raha mitaraina aminy aho,
  	Raha mitalaho aminy aho,
  	Satro-diadema omeny ahy.
  	Raha mitaraina aho.
  	
  
- 
  id: 240
  number: 240
  title: "NY FITAHIANAO RE, RY TOMPO TIA"
  composer: "Netherland Folk Song - Mamy J. Ratsirison"
  author: "Jeanne Ratsirison"
  key: "Do dia D 3/4 "
  theme1: "NY FIANGONANA"
  theme2: "Vavaka"
  lyrics: |
  
  1. Ny fitahianao re, ry Tompo tia,
  	No mba arotsahy aminay eto anio
  	Ireo tsorankazo manitsy ny dia
  	Isaoranay Anao ka avia mba ampio.
  
  2. Ianao 'zay Mpitarika tsara indrindra
  	Tsy mba mahafoy fa mitantana anay
  	Fa he mampahery ary mampirindra
  	Nt dia ho tody ao ho mandrakizay.
  
  3. Ireo fanejehana dia tsy mankaiza
  	Ka tsy hampimalo anay olonao
  	Fa ho voninahitrao na aiza na aiza
  	'Zahay ho tena vavolombelonao.
  	
  
- 
  id: 241
  number: 241
  title: "MPIANDRY TIA O!"
  composer: "John W. Peterson - Mamy Ratsirison"
  author: "A. R. Marnoël"
  key: "Do dia C 6/4 "
  theme1: "NY FIANGONANA"
  theme2: "Vavaka"
  lyrics: |
  
  1. Mpiandry tia ô !
  	Vonjeo re fa very aho
  	Mpiandry tia ô !
  	Vonjeo fa he mitalaho.
  	Notadiavinao aho ka hita
  	Dia nentinao nody aho.
  	Voavonjy, eny, tafita
  	Tsy nania intsony aho.
  	Mpiandry tia ô !
  	Vonjeo re fa very aho
  	Mpiandry tia ô !
  	Vonjeo fa he mitalaho.
  
  2. Tompo tia ô !
  	Mpamonjy, Mpitarika,
  	Akaikinao tano aho tsy hisaraka.
  	Notadiavinao aho ka hita,
  	Dia nentinao nody aho.
  	Voavonjy, eny, tafita
  	Tsy nania intsony aho.
  	Tompo tia ô !
  	Mpamonjy, Mpitarika,
  	Akaikinao tano aho tsy hisaraka.
  	
  
- 
  id: 242
  number: 242
  title: "RAHA MIVAVAKA IANAO"
  composer: "Audrey Mieir - Mamy J. Ratsirison"
  author: "Esther Bary"
  key: "Do dia G 3/4 "
  theme1: "NY FIANGONANA"
  theme2: "Vavaka"
  lyrics: |
  
  1. Raha mivavaka ianao
  	Hotsaroanao ve 'lay anarako ?
  	Mila fanampiana aho
  	Ka miangavy anao.
  	O ! mba tsarovy re.
  
  ISAN'ANDININY :
  	Sakaiza ô, tsy hadinoko
  	Fa tsaroako tokoa ianao.
  	Sakaiza ô, matokia ianao,
  	Fa ho entiko am-bavaka.
  
  2. Raha mivavaka ianao
  	Mba tonony izany anarako
  	Mila an'i Jeso ho mpiahy aho
  	Ka mangataka ho ahy.
  	Sakaiza ô, sns.
  
  3. Tsy hadinoko ianao
  	Raha mivavaka aho
  	Ka mahereza re
  	Tia anao ny Ray,
  	Itokio izay, ario ny ahiahy.
  	Sakaiza ô, sns.
  	
  
- 
  id: 243
  number: 243
  title: "TOMPO O! IRIKO IANAO"
  composer: "Tryggare Kan YngenVara L. M."
  author: "Esther Bary"
  key: "Do dia D 3/4 "
  theme1: "NY FIANGONANA"
  theme2: "Vavaka"
  lyrics: |
  
  1. Tompo ô ! iriko Ianao
  	Mba hifehy ny sitrapoko.
  	O ! baboy ny fo hitony
  	Dia ho foana ny toloko.
  
  2. Ny ainao no he nomenao
  	Mba ho sorona ho ahy.
  	Fiadanana omenao,
  	Tsy mba misy mampanahy.
  
  3. Aoka re ny sitraponao,
  	Ray malala, no hatao 'zao
  	Hiray fo, fanahy sy saina,
  	Dia tsy hisy ny taraina.
  	
  
- 
  id: 244
  number: 244
  title: "TOMPO MAHERY"
  composer: "D. Rasolonjatovo"
  author: "D. Rasolonjatovo"
  key: "Do dia Eb 4/4 "
  theme1: "NY FIANGONANA"
  theme2: "Vavaka"
  lyrics: |
  
  1. Tompo mahery,
  	Henoy 'zahay
  	Vonjeo sao very
  	Jereo, ry Ray
  	Ny eo anilanao, Ray
  	Tsy mitoreo
  	Raha sendra loza indray
  	O ! aza mba mandao.
  
  ISAN'ANDININY :
  	Ry Tompo ô mba arovy
  	Ho zanakao 'zahay
  	Malemy ka mba tsinjovy
  	'Ndrao dia mirona indray
  	Ny eo anilanao Ray
  	Tsy mitoreo.
  	Anilanao Ray no mba maminay.
  	Ry Ray ô, mba jereo.
  
  2. Tompon'aina
  	O ! mihainoa
  	Fa mitaraina
  	Raiso ny fo
  	Tantano ho Anao Ray
  	Ny zanakao.
  	Tsy hifandao fa hiray
  	O ! aza mba mandao
  	Ry Tompo ô mba arovy, sns.
  
  3. Tompo henoy re
  	'Zahay izao
  	Aoka mba ho re
  	Ny feonao
  	Ny vavakay ry Ray ô
  	O ! mba valio.
  	Mba tsy hangaihay.
  	O ! aza mba mandao
  	Ry Tompo ô mba arovy, sns.
  	
  
- 
  id: 245
  number: 245
  title: "RY TOMPO O! AMPIO"
  composer: "A. Raoeliarijaona"
  author: "A. Raoeliarijaona"
  key: "Do dia F 4/4 "
  theme1: "NY FIANGONANA"
  theme2: "Vavaka"
  lyrics: |
  
  1. RY TOMPO Ô ! AMPIO
  	1
  Ry Tompo ô ampio
  Ny fiangonanao.
  Avia ka mba tahio
  Ny hery avy aminao
  Hitory teny soa,
  Hilaza ny hafatrao
  Ka hanafaingana tokoa
  Ny fiavianao.
  
  2
  Tohano ireo mpitory,
  Ry Tompo be fitia,
  Fa miasa mba hamory
  Ny ondry 'zay mania ;
  Raha sendra fahoriana
  Jereo fa irakao
  Ka mba ho fifaliana
  No hanompoany Anao.
  
  3Ry Tompo mitenena,
  Fohazy ny olonao
  Mba hisy hanolo-tena
  Fa vitsy ny mpanao.
  Ny fony hafanao,
  Ry Tompo lehibe,
  Ekeo ny voady 'zay atao
  Izaho koa handeha.
  
- 
  id: 246
  number: 246
  title: "RY RAINAY O, MONENA"
  composer: "D. Rabarijoël"
  author: "D. Rabarijoël"
  key: "Do dia D 3/4 "
  theme1: "NY FIANGONANA"
  theme2: "Vavaka"
  lyrics: |
  
  1. Ry Rinao ô, monena
  	Aty anatinay.
  	Ny sitrakao ekena
  	Ho tena sitrakay.
  	Ny otanay rehetra,
  	Ny fomba ratsy koa
  	Tsy hisy hitoetra,
  	Ariana avokoa. (avokoa).
  
  2. Antomotra ny andro
  	Hihaonana aminao ;
  	Avia, ry masoandro,
  	Irinay Ianao
  	Handroaka tokoa
  	Ny haizim-be ety
  	Sy hanazava koa
  	Ny dia hatrary. (hatrary).
  
  3. Ny herin'ny Fanahy
  	Aoka hanavao anay
  	Ho afaka ahiahy,
  	Ho faly ny fonay,
  	Ho tafaray tokoa
  	Amin'ny fonao, Ray.
  	Ho zanaka mamoa
  	Anao mandrakizay. (ho doria).
  
  
  
- 
  id: 247
  number: 247
  title: "NA BETSAKA NY MPANDEHA"
  composer: "Gardiner L. M."
  author: "Esther Bary"
  key: "Do dia Ab 3/4 "
  theme1: "NY FIANGONANA"
  theme2: "Vavaka"
  lyrics: |
  
  1. Na betsaka ny mpandeha
  	Na mikotaba ny antoko,
  	Mivoitra ny mpirehareha
  	Ny teninao no henoiko.
  
  2. Avy amin'ireo mahantra
  	Sy ireo sahirana, trotraka,
  	Ireo noana sy maratra
  	Ny fonao dia mangoraka.
  
  3. 'Lay kapoaka nisotroanao
  	Mitahiry ny hasoavanao
  	Mbola eo amin'ny endrikao
  	Ilay fangoraham-ponao.
  
  4. Mba atoroy ny olona
  	Ny lalana izay nizoranao
  	Hahatonga azy ho vonona
  	Handray ilay tanàna vao.
  	
  
- 
  id: 248
  number: 248
  title: "TSAPAKO"
  composer: "Deara Arson"
  author: "Deara Arson"
  key: "Do dia C 4/4 Miova D alohan\'ny hiditra andininy faha-4"
  theme1: "NY FIANGONANA"
  theme2: "Vavaka"
  lyrics: |
  
  1. Tsapako, Raiko ô,
  	Tsapako, tsapako
  	Ny fitiavanao any
  	Isan'andro izao.
  	Ka mangataka aminao,
  	Omeo fo mahay mankasitraka
  	'Ty zanakao.
  
  ISAN'ANDININY :
  	Mankasitraka, mankasitraka.
  	Ka misaotra Anao
  	Ry malala ô.
  	Ka mangataka aminao,
  	Omeo fo mahay mankasitraka
  	'Ty zanakao.
  
  2. Hitako, hitako,
  	Hitako, hitako ny fiahianao
  	Ahy isan'andro izao
  	Ka mangataka aminao
  	Omeo fo mahay mankasitraka
  	'Ty zanakao.
  	Mankasitraka, sns.
  
  3. Iainako, iainako
  	Iainako, eny ny fiarovanao
  	Manarona ny tenako
  	Ka mangataka aminao
  	Omeo fo mahay mankasitraka
  	'Ty zanakao.
  	Mankasitraka, sns.
  
  4. Tsinjoko, tsinjoko,
  	Tazako, hitako 'Lay Tany Vao
  	Omenao hivantanako
  	Ka omeo ahy anio ny finoana
  	Mafy orina,
  	Ry Raiko ô !
  	Mankasitraka, sns.
  	
  
- 
  id: 249
  number: 249
  title: "MANATONA RY MPANIA"
  composer: "G. C. Case"
  author: "F. Ramanantsialonina"
  key: "Do dia D 9/8 Malefaka"
  theme1: "NY FIANGONANA"
  theme2: "Seremônia"
  lyrics: |
  
  1. Manatona, ry mpania,
  	Fa miantso anao ny Ray.
  	Izy Tompo be fitia,
  	Tia anao mandrakizay.
  
  ISAN'ANDININY
  
  O! avia, ô! avia.
  	Fa mandray anao ny Ray.
  	Mamalia, ka modia
  	Fa ho zanaka indray.
  
  2. Dieny misy ny fotoana,
  	Miverena hanavao.
  	Fa ny eto dia ho foana,
  	Sao hanenina ianao.
  	O! avia, ô! avia., sns.
  
  3. 'Zao no androm-pamonjena
  	Hararaoty, tadidio.
  	Hanarenana ny tena,
  	Ka ny otanao ario.
  	O! avia, ô! avia., sns.
  
  4. O ! ry Zokiko lalaiko,
  	Tano aho ho namanao.
  	Ka ny saiko sy ny aiko,
  	Entiko hanaja Anao.
  	O! avia, ô! avia., sns.
  
- 
  id: 250
  number: 250
  title: "RY RAIKO, FENO HANTRA"
  composer: "I. D. Sankey"
  author: "R. Baron"
  key: "Do dia Bb 6/4 "
  theme1: "NY FIANGONANA"
  theme2: "Seremônia"
  lyrics: |
  
  1. Ry Raiko feno antra,
  	Inty ny zanakao,
  	Ny foko dia mahantra
  	Raha lavitra aminao ;
  	Fa tany karankaina
  	Izao tontolo izao,
  	Ka reraka ny aina
  	Mihataka aminao.
  
  2. Nivezivezy aho
  	Nikaro-java-tsoa,
  	Izay rehetra hita
  	Nandramana avokoa ;
  	Nandany taona maro,
  	Nanaran-tsitrapo ;
  	Kanefa tsy nahazo
  	Izay mahafa-po.
  
  3. Mamitaka mihitsy
  	Izao tontolo izao,
  	Ny mamy dia mangidy,
  	'Zay tena soa tsy ao ;
  	Koa aza mba adalainy
  	Intsony re, ry fo !
  	Andeha mba ho hendry
  	Hatramin'ny anio.
  
  4. Ry Jeso mofon'aina
  	Ry ranon'aina koa !
  	Ianao no mahatony
  	Izay filan'ny fo ;
  	Ianao no mahavoky,
  	Ianao no manome
  	Izay irin'ny foko,
  	Dia hasambaram-be.
  	
  
- 
  id: 251
  number: 251
  title: "RAISO HO ANAO NY FOKO"
  composer: "J. Rajoely"
  author: "J. Rajoely"
  key: "Do dia D 4/4 "
  theme1: "NY FIANGONANA"
  theme2: "Seremônia"
  lyrics: |
  
  1. Raiso ho Anao ny foko,
  	Ry Jeso malalako ô,
  	Mandrosoa fe he vohako ;
  	Manjakà irery ao.
  
  2. Hitanao ny ahi-dratsy
  	'Zay mamaka lalina ao,
  	Mba ongoty ka soloy
  	Voninkazo tianao.
  
  3. Ny fitiavako rantsano
  	Fa mirantsandrantsana be,
  	Rantsana iray no tano,
  	'Lay mifikitra aminao.
  
  4. Mba tohano ny finoako
  	Hirazonany aminao
  	Ka ho hery hizakako
  	Fitondrana sitrakao.
  
  5. Enga ny fanantenana
  	Fisantarako ny ary
  	Mba tsy hanam-oiovana
  	Mandra-pialako aty.
  
  6. Ny fiainako rehetra
  	Amboary sy hatsarao
  	Dia hamoa tsy misy fetra
  	Mba ho voninahitrao.
  	
  
- 
  id: 252
  number: 252
  title: "JESO O, AMPIANARO"
  composer: "Raobijaona"
  author: "Raobijaona"
  key: "Do dia Bb 4/4 "
  theme1: "NY FIANGONANA"
  theme2: "Seremônia"
  lyrics: |
  
  1. Jeso ô ! ampianaro
  	Ny lalànao izahay
  	Ka ny fonay hamasino ;
  	Ahitsio ny fiainanay.
  
  ISAN'ANDININY :
  	Eo aminao Jeso ô !
  	No tsara ho anay
  	(Soa tokoa, hery koa, aina vao)
  	Raisonao
  	O ! raiso re.
  	(Ho Anao, raiso re 'zahay).
  
  2. Afa-tahotra ny fonay,
  	Raha ny fanahinao
  	No miasa ho anay,
  	Mandra-pahatonga anay.
  	Eo aminao Jeso ô, sns.
  
  3. Ianao no vatolampy
  	Tanjona iononam-po.
  	Eo fiarovana ampy
  	hahatony 'zany fo.
  	Eo aminao Jeso ô, sns.
  

  id: 611
  number: 611
  title: "NY ANDRONAO TANORA"
  composer: "J. Rakotomananjanahary"
  author: "J. Rakotomananjanahary"
  key: "Do dia D 6/8 Animato"
  theme1: "TANORA"
  theme2: "Antso"
  lyrics: |
  
  1. Ny andronao tanora izao
  	No tena fatratra
  	Hisian'ny hery
  	Tena feno hiasana re

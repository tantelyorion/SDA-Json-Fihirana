  id: 348
  number: 348
  title: "\'ZAHO TE HO TIA ANAO TOKOA"
  composer: "Johannes Beck"
  author: "Rajoelison"
  key: "Do dia E 4/4 "
  theme1: "FITORIANA NY FILAZANTSARA"
  theme2: "Valin\'ny antso"
  lyrics: |
  
  1. 'Zaho te ho tia Anao tokoa,
  	Te ho tia Anao, Jeso.
  	Fa izany no ilain'ny fo,
  	Ho tia Anao Jeso.
  	Tsy mba misy ety an-tany
  	'Zay mahafa-ô izao ;
  	Ny iriko 'zao ihany :
  	Jeso ho tia Anao.
  
  2. 'Zaho te hanoa Anao tokoa,
  	Te hanoa Anao, Jeso.
  	'Zany re no fifalian'ny fo,
  	Hanoa Anao, Jeso.
  	Ny ota dia mampitomany,
  	Zioga mampahory izao,
  	Koa ny tiako izao ihany :
  	Jeso, hanoa Anao.
  
  3. 'Zaho dia maniry ho faty koa
  	Miaraka aminao, Jeso,
  	Sy hitsangana indray tokoa
  	Mba ho Anao, Jeso.
  	Mamy indrindra re izany
  	Tafakambana aminao ;
  	Ny iriko 'zao ihany ;
  	Jeso, ho tena Anao.
  
  4. 'Zaho te hiara-dia tokoa,
  	Hiaraka aminao Jeso,
  	Amin-dala-mora mafy koa,
  	Tsy handao Anao, Jeso.
  	Ny handroso hatrany hatrany
  	No ekeko hatrizao,
  	Mandra-pahatongako any,
  	Jeso, anilanao.
  	
  
- 
  id: 349
  number: 349
  title: "ENDREY NY FANIRIAKO"
  composer: "H. Morris"

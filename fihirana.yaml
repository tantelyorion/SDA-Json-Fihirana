  id: 519
  number: 519
  title: "RAHOVIANA RE"
  composer: "Hiram-bahoaka"
  author: "A. R. Marnoël"
  key: "Do dia A 6/4 Haingakaingana"
  theme1: "FIAINANA KRISTIANA"
  theme2: "Fanantenana"
  lyrics: |
  
  1. Rahoviana re ho hitanay
  	'Lay tanjon'i Kanana ?
  	Hifarana eo ny dianay
  	Ary ny fitsapana,
  	Fa ao ny Tompo Mpiandry
  	Hanolotra ny sandry
  	Handray anay mba hiditra
  	Ho ao an-danitra.
  
  ISAN'ANDININY
  
  Ho tena sambatra,
  	Sambatra, sambatra,
  	Ho tena sambatra
  	Raha ao an-danitra.
  	Hifankahita tava,
  	Hifaly toy ny zaza
  	Hihira hoe: 
  	<< Haleloia, ho Anao Jehovah ô! >>
  	
  
  2. Akory re amin'izay
  	Nyh hatsaran'ny hira,
  	Hataon'ireo zana-dRay
  	Sy irony miaramila.
  	Isika tsy hangina,
  	Hiaraka mihira
  	Hiredona toa ranobe
  	Fa voavonjy e !
  	Ho tena sambatra,sns.
  
  3. 'Reo voavonjy marobe
  	Miakanjo lava fotsy
  	Mihoby aok'izany re
  	Ny avotr'i Jesosy
  	Ny hobim-pandresena
  	Hitohy sesehena
  	<< Ha an'ny Zanak'ondry anie ny saotra, laza be >>
  	Ho tena sambatra,sns.
  
  4. Akory re amin'izay 
  	Ny hafaliantsika,
  	Hahita maso Ilay Ray
  	'Zay tena tia antsika
  	Hakamban'ny fitia
  	Ho tena ira doria
  	Fialonana, ditra, ady koa
  	Soloiny zava-tso
  	Ho tena sambatra,sns.
  
- 

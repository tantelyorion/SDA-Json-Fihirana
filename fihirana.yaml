  	Ho feno ilay kapoaka
  	Raha eo anilanao ;
  	Ny ratsy dia voaroaka
  	Ho resy sady lao.
  	Ampidiro ato am-poko, sns.
  
  3. Ny zava-tsoa indrindra
  	Iriko hatrizao
  	Hiaraka mamindra
  	Jesosy Aaminao,
  	Ho jiro hanazava
  	Ny dian'ny maro re,
  	'Zay tsinjo lalandava
  	Anaty alim-be.
  	Ampidiro ato am-poko, sns.
  
